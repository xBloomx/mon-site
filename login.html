<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion - F.Dussault</title>

    <link rel="apple-touch-icon" href="assets/logo_app.png">
    <link rel="icon" type="image/png" href="assets/logo_app.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --app-bg: #1e1f26;
            --btn-yellow: #fcca46; 
            --text-light: #e0e0e0;
            --card-bg: #2b2c36;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--app-bg); 
            color: var(--text-light);
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--btn-yellow);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1e1f26;
            color: white;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--btn-yellow);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--btn-yellow);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #e5b63b;
        }

        #error-message {
            color: #ff4c4c;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Connexion</h2>
        
        <div class="input-group">
            <label for="email">Courriel</label>
            <input type="email" id="email" placeholder="nom@exemple.com" required>
        </div>
        
        <div class="input-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="login-btn" onclick="seConnecter()">Se connecter</button>
        
        <div id="error-message">Courriel ou mot de passe incorrect.</div>
    </div>

    <script>
        // Initialisation de Supabase
        const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
        const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function seConnecter() {
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Cacher le message d'erreur au début
            errorMessage.style.display = 'none';

            if (!emailInput || !passwordInput) {
                errorMessage.innerText = "Veuillez remplir tous les champs.";
                errorMessage.style.display = 'block';
                return;
            }

            // Demande à Supabase de connecter l'utilisateur
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: emailInput,
                password: passwordInput,
            });

            if (error) {
                console.error("Erreur de connexion :", error.message);
                errorMessage.innerText = "Courriel ou mot de passe incorrect.";
                errorMessage.style.display = 'block';
            } else {
                console.log("Connexion réussie !");
                // Si ça fonctionne, on l'envoie vers l'application
                window.location.href = 'index.html';
            }
        }
    </script>

</body>
</html>
