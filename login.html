<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connexion - F.Dussault</title>

    <link rel="apple-touch-icon" href="assets/logo_app.png">
    <link rel="icon" type="image/png" href="assets/logo_app.png">

    <script src="assets/shared/console-filter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <link rel="stylesheet" href="assets/shared/shared.css">

    <style>
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--app-bg); 
            color: var(--text-light);
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Safe areas pour téléphones avec encoche/Dynamic Island */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            box-sizing: border-box;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--btn-yellow);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1e1f26;
            color: white;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--btn-yellow);
        }

        /* --- NOUVEAU : STYLE POUR L'ŒIL --- */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 45px; /* Laisse de l'espace pour l'icône */
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .eye-btn:hover {
            color: var(--text-light);
        }

        .eye-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--btn-yellow);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #e5b63b;
        }

        #error-message {
            color: #ff4c4c;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <form class="login-container" onsubmit="event.preventDefault(); seConnecter();">
        <h2>Connexion</h2>
        
        <div class="input-group">
            <label for="email">Courriel</label>
            <input type="email" id="email" placeholder="nom@exemple.com" required>
        </div>
        
        <div class="input-group">
            <label for="password">Mot de passe</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="button" class="eye-btn" onclick="togglePassword()" title="Afficher le mot de passe">
                    <svg id="eye-icon" viewBox="0 0 24 24">
                        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.25 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="login-btn">Se connecter</button>
        
        <div id="error-message">Courriel ou mot de passe incorrect.</div>
    </form>

    <script>
        // Initialisation de Supabase

        // --- NOUVEAU : Fonction pour afficher/masquer le mot de passe ---
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                // Change l'icône pour l'œil ouvert
                eyeIcon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            } else {
                pwdInput.type = 'password';
                // Change l'icône pour l'œil barré
                eyeIcon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.25 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
            }
        }

        async function seConnecter() {
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Cacher le message d'erreur au début
            errorMessage.style.display = 'none';

            if (!emailInput || !passwordInput) {
                errorMessage.innerText = "Veuillez remplir tous les champs.";
                errorMessage.style.display = 'block';
                return;
            }

            // Demande à Supabase de connecter l'utilisateur
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: emailInput,
                password: passwordInput,
            });

            if (error) {
                console.error("Erreur de connexion :", error.message);
                errorMessage.innerText = "Courriel ou mot de passe incorrect.";
                errorMessage.style.display = 'block';
            } else {
                console.log("Connexion réussie !");
                // Si ça fonctionne, on l'envoie vers l'application
                window.location.href = 'index.html';
            }
        }
    </script>

</body>
</html>
