<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soumissions F.Dussault</title>
    
    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>
    
    <style>
        /* =========================================
           1. VARIABLES & LAYOUT GÉNÉRAL
           ========================================= */
        :root { 
            --app-bg: #1e1f26;
            --btn-yellow: #fcca46; 
            --blue-bg: #d1e9ff; 
            --btn-green: #28a745;
            --btn-red: #ff4d4d;
            --btn-grey: #343a40;
            --btn-blue: #3498db;
            --btn-orange: #ff9800;
            --text-light: #e0e0e0;
            --card-bg: #2b2c36;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--app-bg); color: var(--text-light);
            margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden;
        }

        .svg-icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; display: inline-block; vertical-align: middle; flex-shrink: 0; }

        .main-content {
            flex: 1; display: flex; flex-direction: column;
            position: relative; background-color: var(--app-bg); overflow: hidden;
        }

        /* =========================================
           2. VUE TABLEAU DE BORD
           ========================================= */
        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }

        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; color: #888; pointer-events: none; display:flex; align-items:center;}

        .tabs-container { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-tab { 
            background: #1a1b23; color: #aaa; border: 1px solid #444; 
            padding: 10px 20px; border-radius: 8px; font-weight: bold; 
            font-size: 13px; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 8px;
        }
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .quote-list { display: flex; flex-direction: column; gap: 10px; }
        
        /* =========================================
           DESIGN SOUMISSION (BUREAU / DESKTOP)
           ========================================= */
        .quote-item { 
            background-color: var(--card-bg); 
            padding: 12px 20px; 
            border-radius: 10px; 
            display: grid;
            grid-template-columns: 80px 1fr 140px 130px 100px 44px;
            align-items: center; 
            gap: 15px;
            transition: transform 0.2s, background-color 0.2s; 
            cursor: pointer; 
            border: 1px solid transparent;
            border-left: 4px solid transparent; 
            margin-bottom: 8px;
        }
        .quote-item:hover { 
            transform: translateX(5px); 
            background-color: #343542; 
            border-left-color: var(--btn-yellow); 
        }
        
        .inv-id { font-weight: bold; color: var(--btn-yellow); font-size: 15px; }
        .inv-client { font-weight: bold; font-size: 16px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-divider { display: none; } /* Caché sur PC */
        .inv-author { font-size: 14px; color: #888; font-style: italic; display: flex; align-items: center; gap: 6px; }
        .inv-author .svg-icon { width: 14px; height: 14px; }
        .inv-date { color: #aaa; font-size: 14px; text-align: right; font-weight: 500; }
        
        .inv-status { font-size: 12px; padding: 4px 10px; border-radius: 6px; font-weight: bold; display:flex; align-items:center; gap:5px; width: fit-content; }
        .status-attente { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.5); }
        .status-convertie { background: rgba(40, 167, 69, 0.2); color: var(--btn-green); border: 1px solid rgba(40, 167, 69, 0.5); }
        .status-brouillon { background: #444; color: white; border: 1px solid #555; }

        .inv-actions { display: flex; justify-content: flex-end; align-items: center; }
        .btn-icon { background: #444; border: none; width: 36px; height: 36px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color:white; flex-shrink: 0;}
        .btn-icon:hover { background: #555; }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: var(--btn-red); border: 1px solid transparent; }
        .btn-delete:hover { background: var(--btn-red); color: white; }

        /* =========================================
           3. VUE ÉDITEUR (RUBAN)
           ========================================= */
        #view-editor { display: none; flex-direction: column; height: 100%; }

        .top-bar { height: auto; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; background: rgba(30, 31, 38, 0.95); border-bottom: 1px solid #333; z-index: 101; flex-wrap: wrap; }
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-1px); }
        
        .btn-back { background-color: var(--btn-grey) !important; color: white !important; }
        .btn-back:hover { background-color: #23272b !important; }
        
        .btn-save { background-color: var(--btn-green) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-save:hover { background-color: #218838 !important; }
        
        .btn-send { background-color: var(--btn-blue) !important; color: white !important; }
        .btn-send:hover { background-color: #2980b9 !important; }
        
        .btn-convert { background-color: var(--btn-blue) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-convert:hover { background-color: #2980b9 !important; }
        
        .btn-unlock { background-color: var(--btn-orange) !important; color: white !important; }

        .scroll-area { flex: 1; overflow: auto; padding: 15px 0; display: block; touch-action: auto; }

        /* =========================================
           4. STYLE PAPIER / SOUMISSION
           ========================================= */
        .page { 
            width: 8.5in; height: 11in; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            box-sizing: border-box; display: flex; flex-direction: column; position: relative; 
            margin: 0 0 20px 0; color: black; padding: 0.25in; flex-shrink: 0;
        }
        input { outline: none; border-radius: 0; }
        input:focus { background-color: transparent !important; border-bottom: 2px solid #000 !important; }

        #quote-container { display: block; width: 8.5in; transform-origin: top left; transition: transform 0.1s ease-out; padding-bottom: 50px; }
        .page.quote-style { padding: 0.25in; }

        .top-section { width: 100%; }
        .header-main { width: 100%; margin-top: -15px; margin-bottom: 0px; text-align: center;}
        .header-main img { width: 100%; height: auto; display: block; }
        .header-main h2 { margin: 2px 0 2px 0; font-family: Arial, sans-serif; letter-spacing: 6px; font-weight: 900; color: #333; font-size: 20px; text-transform: uppercase;}

        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2px; }
        .info-column { display: flex; flex-direction: column; gap: 1px; }
        .field { display: flex; align-items: flex-end; font-size: 12px; font-weight: bold; min-height: 22px; }
        .field label { white-space: nowrap; margin-right: 5px; }
        .field input { background-color: var(--blue-bg) !important; border: none; border-bottom: 1px solid black; flex-grow: 1; height: 18px; padding: 0 5px; }

        .banner-cmmtq { width: 100%; margin: 4px 0 4px 0; text-align: center; }
        .banner-cmmtq img { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* TABLEAU PRINCIPAL */
        .main-table { width: 100%; border-collapse: collapse; border: none; margin-bottom: 5px; } 
        .main-table thead { border-top: 4px double black; }
        .main-table th { border: 1px solid black; font-size: 9px; background: #eee; padding: 2px; }
        .main-table td { border: 1px solid black; height: 23px; background-color: var(--blue-bg); padding: 0; }
        .main-table tbody tr:last-child td { border-bottom: 4px double black; }
        .main-table input { width: 100%; height: 100%; background: transparent; border: none; padding: 0 5px; box-sizing: border-box; font-size: 12px; color: black; font-weight: bold;}

        /* BAS DE PAGE */
        .bottom-section { margin-top: auto; width: 100%; }

        .time-wrapper { width: 100%; border: 1px solid black; border-collapse: collapse; table-layout: fixed; margin-top: 0; }
        .time-label-col { width: 110px; border-right: 1px solid black; padding: 5px; vertical-align: top; }
        .time-label-col span { font-size: 8px; font-weight: bold; }
        .time-label-col h2 { font-size: 18px; margin: 5px 0 0 0; font-weight: 900; }

        .inner-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .row-headers td { border-right: 1px solid black; border-bottom: 1px solid black; height: 30px; font-size: 8px; font-weight: bold; text-align: center; vertical-align: top; padding-top: 2px; }
        .row-sublabels td { font-size: 9px; font-weight: bold; text-align: center; padding: 2px 0; border-right: none; }
        .row-inputs td { padding: 2px 5px; vertical-align: middle; border-right: none; height: 26px; }
        .input-box { background-color: var(--blue-bg); border-bottom: 1px solid black; display: flex; align-items: center; padding: 0 3px; height: 18px; }
        .input-box input { background: transparent; border: none; width: 100%; height: 100%; text-align: center; font-size: 10px; font-weight: bold; color: black;}
        .flex-group { display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: bold; }
        .last-col { border-right: none !important; }

        .footer-grid { display: grid; grid-template-columns: 1fr 1fr 150px; align-items: end; margin-top: 5px; gap: 10px; }

        .sig-box { width: 100%; text-align: center; }
        .display-sig { border: none; border-bottom: 1px solid #000; background-color: var(--blue-bg); width: 100%; height: 45px; cursor: pointer; object-fit: contain; }
        .sig-text { font-size: 10px; font-weight: bold; margin-top: 2px; }

        .quote-num-box { text-align: right; padding-bottom: 5px; display: flex; justify-content: flex-end; align-items: flex-end; }
        .red-quote-input { color: #dc3545; font-weight: bold; font-size: 18px; font-family: 'Courier New', Courier, monospace; text-align: right; border: none; background-color: var(--blue-bg); width: 100%; margin: 0; padding: 0 5px; }
        .red-quote-input::placeholder { color: #ffcccc; font-size: 12px; }

        /* MODALES ET ZOOM */
        #sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: white; padding: 15px; border-radius: 8px; text-align: center; width: 90%; max-width: 800px; }
        #modal-canvas { border: 2px dashed #444; background: #fff; width: 100%; height: 350px; touch-action: none; }
        .modal-btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-ok { background: var(--btn-green); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}
        .btn-clear { background: var(--btn-yellow); color: black; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .btn-cancel { background: var(--btn-red); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 31, 38, 0.95); padding: 5px 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #555; }
        .zoom-controls button { background: var(--btn-yellow); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #1e1f26; }
        .zoom-controls button:active { transform: scale(0.9); }
        .zoom-controls span { color: white; font-size: 12px; font-weight: bold; min-width: 45px; text-align: center; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .custom-modal-card { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .custom-modal-title { font-size: 20px; color: var(--btn-yellow); margin-bottom: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .custom-modal-msg { color: var(--text-light); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; }
        
        .btn-modal-cancel { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-confirm { background: var(--btn-green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight:bold;}
        .btn-modal-ok { background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media (max-width: 1024px) {
            .top-bar { padding: 10px 85px 10px 10px; gap: 10px; height: 65px; overflow-x: auto; justify-content: flex-start; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .top-bar::-webkit-scrollbar { display: none; }
            .top-bar .action-btn, .spacer-mobile { flex-shrink: 0; width: auto; margin-bottom: 0; }
            .top-bar .action-btn { font-size: 11px; padding: 8px 15px; }
        }

        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; width: 100%; }
            .dash-title { padding-right: 80px; width: 100%; }
            .dash-header .action-btn { width: 100%; justify-content: center; font-size: 14px; }
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; justify-content: center; }
            .toolbar { flex-direction: column; gap: 10px; width: 100%; }
            .search-box, .search-box input { width: 100%; }
            .zoom-controls { display: none !important; }
            
            /* =========================================
               DESIGN SOUMISSION CHIC & COMPACT SANS LIGNE (MOBILE)
               ========================================= */
            .quote-item {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas: 
                    "id id"
                    "client client"
                    "author author"
                    "status date";
                align-items: center;
                gap: 4px 12px; 
                padding: 16px;
                border-radius: 12px;
                border: 1px solid #3a3b46;
                border-left: 1px solid #3a3b46;
                margin-bottom: 12px;
                position: relative;
            }
            .quote-item:hover {
                transform: translateY(-2px); 
                background-color: #30313c;
                border-color: #555;
            }
            
            .inv-id { grid-area: id; font-size: 15px; font-weight: 800; width: auto; }
            
            .inv-client { 
                grid-area: client; 
                font-size: 18px; 
                font-weight: 700; 
                margin-top: 0px; 
                margin-bottom: 4px;
                white-space: normal; 
                padding-right: 45px; 
                width: auto;
            }
            
            .inv-author { grid-area: author; font-size: 13px; margin-bottom: 8px; color: #aaa; width: auto; }
            .inv-author .svg-icon { width: 14px; height: 14px; }
            
            .inv-status { grid-area: status; justify-self: start; width: auto; }
            .inv-date { grid-area: date; text-align: right; justify-self: end; font-size: 12px; color: #888; width: auto; }
            
            .inv-actions { position: absolute; top: 16px; right: 16px; margin: 0; }
            .btn-icon { width: 36px; height: 36px; border-radius: 10px; }
        }

        @media print {
            @page { margin: 0; size: letter; }
            html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; background: white !important; }
            .top-bar, #sig-modal, .zoom-controls, #view-dashboard, .custom-modal-overlay { display: none !important; }
            #view-editor { display: flex !important; width: 100% !important; height: 100% !important; }
            .scroll-area { overflow: visible !important; padding: 0 !important; height: 100% !important; display: block !important; }
            #quote-container { margin: 0 !important; padding: 0 !important; transform: none !important; width: 100% !important; }
            .page { box-shadow: none !important; margin: 0 !important; width: 100% !important; height: 11in !important; page-break-after: always !important; padding: 0.25in !important; display: flex !important; flex-direction: column !important; }
            .field input, .main-table td, .display-sig, .input-box, .red-quote-input { background-color: transparent !important; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement du module...</div>
</div>

    <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></symbol>
    <symbol id="icon-check-circle" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></symbol>
    <symbol id="icon-alert-triangle" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></symbol>
    <symbol id="icon-refresh" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></symbol>
</svg>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Mes Soumissions</h1>
                <p>Gérez vos estimations</p>
            </div>
            <button class="action-btn" style="background-color: var(--btn-yellow);" onclick="openNewQuote()">
                <svg class="svg-icon"><use href="#icon-plus"></use></svg> Nouvelle Soumission
            </button>
        </div>
        
        <div class="tabs-container" id="quote-tabs" style="display:none;">
            <button id="tab-mine" class="btn-tab active" onclick="switchQuoteTab('mine')">
                <svg class="svg-icon" style="width:15px; height:15px;"><use href="#icon-user"></use></svg> Mes Soumissions
            </button>
            <button id="tab-all" class="btn-tab" onclick="switchQuoteTab('all')">
                <svg class="svg-icon" style="width:15px; height:15px;"><use href="#icon-inbox"></use></svg> Boîte de réception
            </button>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon"><svg class="svg-icon"><use href="#icon-search"></use></svg></span>
                <input type="text" id="searchInput" placeholder="Rechercher (Client, N°...)" onkeyup="filterQuotes()">
            </div>
        </div>
        
        <div class="quote-list" id="quoteListContainer"></div>
    </div>

    <div id="view-editor">
        <div class="top-bar">
            <button class="action-btn btn-back" onclick="askGoBack()">
                <svg class="svg-icon"><use href="#icon-back"></use></svg> Retour
            </button>
            <button class="action-btn btn-save" onclick="saveCurrentQuote(false)">
                <svg class="svg-icon"><use href="#icon-save"></use></svg> Sauvegarder
            </button>
            <button class="action-btn btn-send" id="btn-send" onclick="sendToOffice()">
                <svg class="svg-icon"><use href="#icon-send"></use></svg> Envoyer au bureau
            </button>
            
            <button class="action-btn btn-convert" onclick="convertToInvoice()">
                <svg class="svg-icon"><use href="#icon-refresh"></use></svg> Convertir en facture
            </button>
            <button class="action-btn btn-unlock" id="btn-unlock" onclick="unlockQuote()" style="display:none;">
                <svg class="svg-icon"><use href="#icon-unlock"></use></svg> Débloquer
            </button>
            
            <div style="flex:1" class="spacer-mobile"></div>
            
            <button class="action-btn" id="btn-print" style="background-color: var(--btn-yellow);" onclick="window.print()">
                <svg class="svg-icon"><use href="#icon-print"></use></svg> Imprimer
            </button>
            <button class="action-btn" id="btn-add-page" style="background-color: var(--btn-yellow);" onclick="addPage()">
                <svg class="svg-icon"><use href="#icon-file-plus"></use></svg> Page
            </button>
            <button class="action-btn" id="btn-dup-page" style="background-color: var(--btn-yellow);" onclick="duplicatePage()">
                <svg class="svg-icon"><use href="#icon-copy"></use></svg> Dupliquer
            </button>
            <button class="action-btn" id="btn-del-page" style="background-color: var(--btn-yellow);" onclick="deletePage()">
                <svg class="svg-icon"><use href="#icon-file-minus"></use></svg> Page
            </button>
            <button class="action-btn" id="btn-clear" style="background-color: var(--btn-yellow);" onclick="askClearInputs()">
                <svg class="svg-icon"><use href="#icon-eraser"></use></svg> Effacer
            </button>
        </div>
  
        <div class="scroll-area">
            <div id="quote-container"></div>
        </div>
        
        <div class="zoom-controls">
            <button onclick="adjustZoom(-0.1)">−</button>
            <span id="zoom-level">100%</span>
            <button onclick="adjustZoom(0.1)">+</button>
            <button onclick="resetZoom()" style="font-size: 14px;">↺</button>
        </div>
    </div>
</div>

            <button class="btn-cancel" onclick="closeModal()">ANNULER</button>

        <div class="custom-modal-title" id="confirmTitle">Confirmation</div>

        <div class="custom-modal-actions">
            <button class="btn-modal-cancel" onclick="closeConfirmModal()">Non</button>
            <button class="btn-modal-confirm" id="confirmYesBtn">Oui</button>

<div class="custom-modal-overlay" id="alertModal">
    <div class="custom-modal-card">
        <div class="custom-modal-title" style="color:var(--btn-yellow); display:flex; align-items:center; justify-content:center; gap:8px;">
            <svg class="svg-icon"><use href="#icon-alert-triangle"></use></svg> Information
        </div>
        <div class="custom-modal-msg" id="alertMsg">...</div>
        <div class="custom-modal-actions">
            <button class="btn-modal-ok" onclick="closeAlertModal()">Compris</button>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE & AUTHENTIFICATION ---
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myRole = 'A3'; 
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentQuoteTab = 'mine';

    // --- LE CERVEAU DES PERMISSIONS DYNAMIQUES ---
    const defaultRolesConfig = {
        'A0': { perms: ['view_all_invoices', 'view_all_po', 'access_po_tab', 'access_soumissions_tab', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'manage_news', 'view_admin'] },
        'A1': { perms: ['view_all_invoices', 'view_all_po', 'access_po_tab', 'access_soumissions_tab', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'manage_news', 'view_admin'] },
        'A2': { perms: ['view_all_invoices', 'view_all_po', 'access_po_tab', 'access_soumissions_tab', 'approve_timesheets', 'manage_tools', 'manage_calendar', 'manage_news'] },
        'A3': { perms: ['transfer_tools', 'access_po_tab', 'access_soumissions_tab'] }
    };

    function hasPermission(role, permId) {
        if (role === 'A0') return true; 
        const savedRoles = JSON.parse(localStorage.getItem('dussault_roles_v1')) || defaultRolesConfig;
        const roleData = savedRoles[role];
        if (!roleData || !roleData.perms) return false;
        return roleData.perms.includes(permId);
    }

    async function initAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        // LE VIDEUR : Expulsion si non connecté
        if (!user) {
            window.top.location.href = '../login.html';
            return;
        }

        if (user) {
            myUserId = user.id;
            const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).maybeSingle();
            if (profil) {
                myRole = profil.role;
                myUserName = profil.prenom_nom || user.email;

                if (hasPermission(myRole, 'view_all_invoices')) {
                    const tabs = document.getElementById('quote-tabs');
                    if(tabs) tabs.style.display = 'flex';
                } else {
                    currentQuoteTab = 'mine';
                }
            }
        }
        
        loadData(); 
        
        // TOUT EST VÉRIFIÉ : On lève le rideau local
        document.getElementById('security-loader').style.display = 'none';

        // Signal au Chef d'orchestre
        window.parent.postMessage({ type: 'module_ready', module: 'view-soumissions' }, '*');
    }

    function switchQuoteTab(tab) {
        currentQuoteTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        filterQuotes(); 
    }

    let quotesData = [];
    const STORAGE_KEY = 'dussault_quotes_v1';
    const INVOICE_STORAGE_KEY = 'dussault_invoices_v1';
    let currentQuoteId = null;

    // --- GESTION DES MODALES ---
    let confirmCallback = null;

    function showConfirm(msg, callback, title="Confirmation", isConvert=false) {
        document.getElementById('confirmTitle').innerHTML = `<svg class="svg-icon" style="margin-right:8px;"><use href="#icon-alert-triangle"></use></svg>` + title;
        document.getElementById('confirmMsg').innerHTML = msg;
        confirmCallback = callback;
        
        const btnYes = document.getElementById('confirmYesBtn');
        if(isConvert) {
            btnYes.style.background = "var(--btn-blue)";
            btnYes.textContent = "Convertir";
        } else {
            btnYes.style.background = "var(--btn-red)";
            btnYes.textContent = "Oui";
        }
        
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirmModal').style.display = 'none';
        confirmCallback = null;
    }

    document.getElementById('confirmYesBtn').onclick = function() {
        if (confirmCallback) confirmCallback();
        closeConfirmModal();
    };

    function showAlert(msg) {
        document.getElementById('alertMsg').innerHTML = msg;
        document.getElementById('alertModal').style.display = 'flex';
    }

    function closeAlertModal() {
        document.getElementById('alertModal').style.display = 'none';
    }

    // --- APP LOGIC ---
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            quotesData = JSON.parse(stored);
        } else {
            quotesData = [];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(quotesData));
        }
        renderQuoteList();
    }
    
    function saveData() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(quotesData)); 
        renderQuoteList(); 
    }

    const viewDashboard = document.getElementById('view-dashboard');
    const viewEditor = document.getElementById('view-editor');
    const listContainer = document.getElementById('quoteListContainer');
    const containerInvoice = document.getElementById('quote-container');

    function showDashboard() { 
        viewDashboard.style.display = 'flex'; 
        viewEditor.style.display = 'none'; 
        renderQuoteList(); 
    }
    
    function askGoBack() {
        showDashboard(); 
    }

    function toggleInputs(canEdit) {
        const allInputs = containerInvoice.querySelectorAll('input');
        const allSigs = containerInvoice.querySelectorAll('.display-sig');
        allInputs.forEach(inp => {
            if (!canEdit) { inp.setAttribute('readonly', true); inp.style.pointerEvents = 'none'; } 
            else { inp.removeAttribute('readonly'); inp.style.pointerEvents = 'auto'; }
        });
        allSigs.forEach(img => { img.style.pointerEvents = canEdit ? 'auto' : 'none'; });
    }

    function applyEditorSecurity(quoteObj) {
        const isBureau = hasPermission(myRole, 'view_all_invoices');
        const status = quoteObj ? (quoteObj.status || 'brouillon') : 'brouillon';
        const isAuthor = quoteObj ? (quoteObj.authorId === myUserId || !quoteObj.authorId) : true;
        
        let canEdit = false;
        if (!isBureau) {
            if (status === 'brouillon') canEdit = true;
        } else {
            if (status === 'brouillon' && isAuthor) canEdit = true;
        }

        const btnSave = document.querySelector('.btn-save');
        if(btnSave) btnSave.style.display = canEdit ? 'flex' : 'none';
        
        const btnSend = document.getElementById('btn-send');
        if(btnSend) btnSend.style.display = canEdit ? 'flex' : 'none';
        
        const btnAdd = document.getElementById('btn-add-page'); if(btnAdd) btnAdd.style.display = canEdit ? 'flex' : 'none';
        const btnDup = document.getElementById('btn-dup-page'); if(btnDup) btnDup.style.display = canEdit ? 'flex' : 'none';
        const btnDel = document.getElementById('btn-del-page'); if(btnDel) btnDel.style.display = canEdit ? 'flex' : 'none';
        const btnClear = document.getElementById('btn-clear'); if(btnClear) btnClear.style.display = canEdit ? 'flex' : 'none';

        const btnConvert = document.querySelector('.btn-convert');
        if (btnConvert) btnConvert.style.display = (status === 'En attente' && isBureau) ? 'flex' : 'none';

        const btnUnlock = document.getElementById('btn-unlock');
        if (isBureau && status !== 'brouillon' && status !== 'Convertie') {
            if(btnUnlock) btnUnlock.style.display = 'flex';
        } else {
            if(btnUnlock) btnUnlock.style.display = 'none';
        }

        toggleInputs(canEdit);
    }

    function unlockQuote() {
        toggleInputs(true);
        const btnSave = document.querySelector('.btn-save');
        if(btnSave) btnSave.style.display = 'flex';
        
        document.getElementById('btn-unlock').style.display = 'none';
        
        const btnAdd = document.getElementById('btn-add-page'); if(btnAdd) btnAdd.style.display = 'flex';
        const btnDup = document.getElementById('btn-dup-page'); if(btnDup) btnDup.style.display = 'flex';
        const btnDel = document.getElementById('btn-del-page'); if(btnDel) btnDel.style.display = 'flex';
        const btnClear = document.getElementById('btn-clear'); if(btnClear) btnClear.style.display = 'flex';
        
        showAlert("<div style='display:flex; align-items:center; justify-content:center; gap:8px;'><svg class='svg-icon' style='color:var(--btn-green);'><use href='#icon-unlock'></use></svg> Soumission débloquée. Vous pouvez maintenant modifier les champs.</div>");
    }

    function openExistingQuote(id) {
        const quote = quotesData.find(q => q.id === id);
        if (!quote) return;
        currentQuoteId = id;
        viewDashboard.style.display = 'none';
        viewEditor.style.display = 'flex';
        containerInvoice.innerHTML = '';
        const pageCount = quote.pageCount || 1;
        
        for(let i=0; i<pageCount; i++) {
            containerInvoice.appendChild(createQuotePageHTML());
        }
        
        const allInputs = containerInvoice.querySelectorAll('input');
        if (quote.inputValues) {
            allInputs.forEach((input, index) => { 
                if (quote.inputValues[index] !== undefined) input.value = quote.inputValues[index]; 
            });
        }
        
        const allSigs = containerInvoice.querySelectorAll('.display-sig');
        if (quote.sigValues) {
            allSigs.forEach((img, index) => { 
                if (quote.sigValues[index]) img.src = quote.sigValues[index]; 
            });
        }
        
        applyEditorSecurity(quote);
        fitToScreen();
    }

    function getNextQuoteNumber() {
        let maxId = 0;
        quotesData.forEach(q => {
            const num = parseInt(q.id.replace('S-', ''));
            if(!isNaN(num) && num > maxId) { maxId = num; }
        });
        return maxId > 0 ? "S-" + (maxId + 1) : "S-1001";
    }

    function openNewQuote() {
        currentQuoteId = null;
        viewDashboard.style.display = 'none';
        viewEditor.style.display = 'flex';
        containerInvoice.innerHTML = '';
        containerInvoice.appendChild(createQuotePageHTML());
        
        const nextNum = getNextQuoteNumber();
        const numInput = containerInvoice.querySelector('.red-quote-input');
        if(numInput) numInput.value = nextNum;
        
        applyEditorSecurity(null);
        fitToScreen();
    }

    function sendToOffice() {
        showConfirm("Une fois envoyée, cette soumission sera verrouillée. L'envoyer au bureau ?", function() {
            saveCurrentQuote(true);
        });
    }

    function saveCurrentQuote(isSending = false) {
        const firstPage = containerInvoice.querySelector('.page');
        if (!firstPage) return false;
        
        const inputs = firstPage.querySelectorAll('.top-section input');
        const clientName = inputs[0] ? inputs[0].value.trim() : "Client Inconnu";
        
        // Nouvelle gestion de la date pour assurer qu'elle ne soit JAMAIS vide
        let dateVal = inputs[4] ? inputs[4].value.trim() : "";
        if (!dateVal) {
             const today = new Date();
             dateVal = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
        }
        
        const quoteNumInput = firstPage.querySelector('.red-quote-input');
        let quoteNum = (quoteNumInput && quoteNumInput.value.trim() !== '') ? quoteNumInput.value.trim() : "S-Draft-" + Date.now().toString().slice(-4);

        const inputValues = Array.from(containerInvoice.querySelectorAll('input')).map(input => input.value);
        const sigValues = Array.from(containerInvoice.querySelectorAll('.display-sig')).map(img => img.getAttribute('src'));
        const pageCount = containerInvoice.querySelectorAll('.page').length;
        
        let currentStatus = 'brouillon';
        if (currentQuoteId) {
            const existing = quotesData.find(q => q.id === currentQuoteId);
            if (existing && existing.status) currentStatus = existing.status;
        }

        if (isSending) currentStatus = 'En attente';

        const newQuoteObj = { 
            id: quoteNum, 
            client: clientName || "Client Inconnu", 
            date: dateVal, 
            status: currentStatus,
            inputValues: inputValues, 
            sigValues: sigValues, 
            pageCount: pageCount, 
            timestamp: Date.now(),
            authorId: myUserId,
            authorName: myUserName
        };
        
        if (currentQuoteId) {
            const index = quotesData.findIndex(q => q.id === currentQuoteId);
            if (index !== -1) {
                newQuoteObj.authorId = quotesData[index].authorId || myUserId;
                newQuoteObj.authorName = quotesData[index].authorName || myUserName;

                if (currentQuoteId !== quoteNum) {
                    const exists = quotesData.find(q => q.id === quoteNum);
                    if (exists) { quotesData.splice(index, 1); quotesData.push(newQuoteObj); } 
                    else { quotesData[index] = newQuoteObj; }
                } else { quotesData[index] = newQuoteObj; }
            } else { quotesData.push(newQuoteObj); }
        } else {
            const exists = quotesData.find(q => q.id === quoteNum);
            if (exists && quoteNum.startsWith('S-Draft-')) {
                 const index = quotesData.findIndex(q => q.id === quoteNum);
                 newQuoteObj.authorId = quotesData[index].authorId || myUserId;
                 newQuoteObj.authorName = quotesData[index].authorName || myUserName;
                 quotesData[index] = newQuoteObj;
            } else { quotesData.push(newQuoteObj); }
        }
        
        currentQuoteId = quoteNum;
        saveData();
        
        if (isSending) {
            showAlert("<div style='display:flex; align-items:center; justify-content:center; gap:8px;'><svg class='svg-icon' style='color:var(--btn-green);'><use href='#icon-check-circle'></use></svg> Soumission envoyée au bureau avec succès !</div>");
            showDashboard();
        } else {
            showAlert("<div style='display:flex; align-items:center; justify-content:center; gap:8px;'><svg class='svg-icon' style='color:var(--btn-green);'><use href='#icon-check-circle'></use></svg> Brouillon sauvegardé avec succès !</div>");
            applyEditorSecurity(newQuoteObj);
        }
        return true;
    }

    // --- CONVERSION EN FACTURE ---
    function convertToInvoice() {
        showConfirm("Voulez-vous convertir cette soumission en une vraie facture ?<br><br>Elle sera copiée dans votre onglet Factures.", function() {
            
            saveCurrentQuote(); 
            
            const quote = quotesData.find(q => q.id === currentQuoteId);
            if(!quote) return;
            
            let invoices = JSON.parse(localStorage.getItem(INVOICE_STORAGE_KEY) || '[]');
            
            let maxId = 0;
            invoices.forEach(inv => {
                const num = parseInt(inv.id);
                if(!isNaN(num) && num > maxId) { maxId = num; }
            });
            const nextInvNum = maxId > 0 ? maxId + 1 : 1000;
            
            const newInvoice = {
                id: nextInvNum.toString(),
                client: quote.client,
                date: new Date().toISOString().split('T')[0], 
                inputValues: [...quote.inputValues], 
                sigValues: [...quote.sigValues],
                pageCount: quote.pageCount,
                timestamp: Date.now(),
                authorId: myUserId,
                status: 'brouillon'
            };
            
            invoices.push(newInvoice);
            localStorage.setItem(INVOICE_STORAGE_KEY, JSON.stringify(invoices));
            
            quote.status = 'Convertie';
            saveData();
            
            showAlert(`<div style='display:flex; flex-direction:column; align-items:center; gap:10px;'><svg class='svg-icon' style='color:var(--btn-green); width:30px; height:30px;'><use href='#icon-check-circle'></use></svg> <b>Succès !</b><br><span style='font-size:14px;'>La facture #${nextInvNum} a été générée. Allez dans l'onglet Factures pour la voir.</span></div>`);
            showDashboard();

        }, "Convertir en Facture", true);
    }

    function deleteQuote(id, event) {
        event.stopPropagation();
        showConfirm("Voulez-vous vraiment supprimer la soumission " + id + " ?", function() {
            quotesData = quotesData.filter(q => q.id !== id);
            saveData();
        });
    }

    function renderQuoteList(filteredData = null) {
        listContainer.innerHTML = '';
        
        const isBureau = hasPermission(myRole, 'view_all_invoices');
        let baseList = quotesData;

        if (!isBureau || currentQuoteTab === 'mine') {
            baseList = quotesData.filter(q => q.authorId === myUserId || !q.authorId);
        } else {
            baseList = quotesData.filter(q => q.status !== 'brouillon');
        }

        let listToShow = filteredData ? filteredData : baseList;
        const sortedData = [...listToShow].sort((a, b) => b.timestamp - a.timestamp);
        
        if(sortedData.length === 0) { 
            listContainer.innerHTML = '<div style="color:#888; text-align:center; padding:20px; font-style:italic;">Aucune soumission trouvée.</div>';
            return; 
        }

        sortedData.forEach(q => {
            let statusHTML = '';
            let canDelete = false;

            if(q.status === 'Convertie') {
                statusHTML = `<div class="inv-status status-convertie"><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-check-circle"></use></svg> Convertie</div>`;
            } else if (q.status === 'brouillon') {
                statusHTML = `<div class="inv-status status-brouillon"><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-file-text"></use></svg> Brouillon</div>`;
            } else {
                statusHTML = `<div class="inv-status status-attente"><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-clock"></use></svg> ${!isBureau ? 'Envoyée' : 'En attente'}</div>`;
            }

            if (q.status === 'brouillon' || q.status === 'attente' || q.status === 'En attente') {
                if (q.authorId === myUserId || isBureau) {
                    canDelete = true;
                }
            }

            let displayDate = q.date || '';
            if (!displayDate || displayDate.trim() === '') {
                const d = new Date(q.timestamp || Date.now());
                displayDate = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
            } else if (displayDate.includes('-')) {
                const parts = displayDate.split('-');
                if (parts.length === 3) displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }

            const item = document.createElement('div');
            item.className = 'quote-item';
            item.onclick = function() { openExistingQuote(q.id); };

            let deleteBtnHtml = '<div class="btn-icon" style="background:transparent; pointer-events:none;"></div>';
            if (canDelete) {
                deleteBtnHtml = `
                    <button class="btn-icon btn-delete" onclick="deleteQuote('${q.id}', event)" title="Supprimer">
                        <svg class="svg-icon"><use href="#icon-trash"></use></svg>
                    </button>`;
            } 

            item.innerHTML = `
                <div class="inv-id">${q.id}</div>
                <div class="inv-client">${q.client}</div>
                <div class="inv-author">
                    <svg class="svg-icon"><use href="#icon-user"></use></svg> 
                    ${q.authorName || 'Inconnu'}
                </div>
                <div class="inv-status">${statusHTML}</div>
                <div class="inv-date">${displayDate}</div>
                <div class="inv-actions">
                    ${deleteBtnHtml}
                </div>`;
            listContainer.appendChild(item);
         });
    }

    function filterQuotes() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        
        const isBureau = hasPermission(myRole, 'view_all_invoices');
        let baseList = quotesData;
        if (!isBureau || currentQuoteTab === 'mine') {
            baseList = quotesData.filter(q => q.authorId === myUserId || !q.authorId);
        } else {
            baseList = quotesData.filter(q => q.status !== 'brouillon');
        }

        const filtered = baseList.filter(q => {
            return (q.client.toLowerCase().includes(searchText) || String(q.id).toLowerCase().includes(searchText));
        });
        renderQuoteList(filtered);
    }

    const inputAttrs = `type="text" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false"`;
    let quotePageCount = 0;
    let globalSigCount = 0;

    function createQuotePageHTML() {
        quotePageCount++;
        globalSigCount++;
        const page = document.createElement('div');
        page.className = 'page quote-style';
        
        let rows = "";
        for(let i=0; i<20; i++) { 
            rows += `<tr><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td></tr>`; 
        }

        page.innerHTML = `
            <div class="top-section">
                <div class="header-main">
                    <img src="logo_dussault.png" alt="F. Dussault">
                    <h2>SOUMISSION / ESTIMATION</h2>
                </div>
                <div class="info-section">
                    <div class="info-column">
                        <div class="field"><label>M.</label><input ${inputAttrs}></div>
                        <div class="field"><input ${inputAttrs}></div>
                        <div class="field" style="margin-top:2px;"><label>Po client:</label><input ${inputAttrs}></div>
                        <div class="field"><label>Tél:</label><input ${inputAttrs}></div>
                    </div>
                    <div class="info-column">
                        <div class="field"><label>Date:</label><input ${inputAttrs}></div>
                        <div class="field"><label>Travail à:</label><input ${inputAttrs}></div>
                        <div class="field"><label>Adresse:</label><input ${inputAttrs}></div>
                        <div class="field"><label>Po:</label><input ${inputAttrs}></div>
                    </div>
                </div>
                <div class="banner-cmmtq"><img src="cmmtq_et_slogan.png" alt="CMMTQ"></div>
            </div>
            
            <table class="main-table">
                <thead><tr><th width="45">QUANT.</th><th>DESCRIPTION</th><th width="75">MONTANT<br>AMOUNT</th><th width="75">TOTAL</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            
            <div class="bottom-section">
                <table class="time-wrapper">
                    <tr>
                        <td class="time-label-col"><span>Valide pour 30 jours<br>Valid for 30 days</span><h2># TEMPS</h2></td>
                        <td>
                            <table class="inner-table">
                                <tr class="row-headers"><td style="width:25%">TARIF ESTIMÉ</td><td style="width:15%">CHARGE MIN.</td><td style="width:25%">TRANSPORT</td><td style="width:20%">HRE ARRIVÉE</td><td class="last-col" style="width:15%">INITIALE</td></tr>
                                <tr class="row-sublabels"><td>A.M.</td><td>INITIALE</td><td>P.M.</td><td></td><td class="last-col">INITIALE</td></tr>
                                <tr class="row-inputs"><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="input-box"><input ${inputAttrs}></div></td><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="flex-group">TOTAL <div class="input-box"><input ${inputAttrs}></div></div></td><td class="last-col"><div class="input-box"><input ${inputAttrs}></div></td></tr>
                                <tr class="row-inputs"><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="input-box"><input ${inputAttrs}></div></td><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="flex-group">TOTAL <div class="input-box"><input ${inputAttrs}></div></div></td><td class="last-col"><div class="input-box"><input ${inputAttrs}></div></td></tr>
                            </table>
                        </td>
                    </tr>
                </table>
                <div class="footer-grid">
                    <div class="sig-box"><img id="sig-p-${globalSigCount}" class="display-sig" onclick="openModal('sig-p-${globalSigCount}')"><div class="sig-text">Signature (Approbation)</div></div>
                    <div class="sig-box"><img id="sig-c-${globalSigCount}" class="display-sig" onclick="openModal('sig-c-${globalSigCount}')"><div class="sig-text">Signature du client (Acception)</div></div>
                    <div class="quote-num-box"><input type="text" class="red-quote-input" placeholder="No."></div>
                </div>
            </div>`;
        return page;
    }

    function addPage() { containerInvoice.appendChild(createQuotePageHTML()); if(currentZoom !== 1.0) updateZoom(); }
    
    function duplicatePage() {
        const pages = containerInvoice.querySelectorAll('.page');
        if (pages.length === 0) return;
        const sourcePage = pages[pages.length - 1];
        const newPage = createQuotePageHTML();
        containerInvoice.appendChild(newPage);
        const sourceTopInputs = sourcePage.querySelectorAll('.top-section input');
        const newTopInputs = newPage.querySelectorAll('.top-section input');
        sourceTopInputs.forEach((input, index) => { if(newTopInputs[index]) { newTopInputs[index].value = input.value; } });
        if(currentZoom !== 1.0) updateZoom();
    }
    
    function deletePage() { 
        if (containerInvoice.children.length > 1) { containerInvoice.removeChild(containerInvoice.lastElementChild); quotePageCount--; } 
        else { showAlert("<div style='display:flex; align-items:center; justify-content:center; gap:8px;'><svg class='svg-icon' style='color:var(--btn-red);'><use href='#icon-alert-triangle'></use></svg> Impossible de supprimer la dernière page.</div>"); }
    }
    
    function askClearInputs() { 
        showConfirm("Effacer tout le contenu de la soumission ?", function() {
            containerInvoice.querySelectorAll('input').forEach(input => input.value = '');
            containerInvoice.querySelectorAll('.display-sig').forEach(img => img.src = ''); 
        });
    }

    // --- SIGNATURES ---
    const modal = document.getElementById('sig-modal');
    const modalCanvas = document.getElementById('modal-canvas');
    const ctx = modalCanvas.getContext('2d');
    let currentTargetImgId = null, drawing = false;

    function resizeCanvas() { 
        const ratio = Math.max(window.devicePixelRatio || 1, 1); 
        modalCanvas.width = modalCanvas.offsetWidth * ratio; modalCanvas.height = modalCanvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
    }

    function openModal(id) { currentTargetImgId = id; modal.style.display = 'flex'; setTimeout(resizeCanvas, 10); }
    function closeModal() { modal.style.display = 'none'; drawing = false; }
    function clearModalCanvas() { ctx.clearRect(0, 0, modalCanvas.width, modalCanvas.height); }
    function saveSignature() { if(currentTargetImgId) document.getElementById(currentTargetImgId).src = modalCanvas.toDataURL(); closeModal(); }
    function getPos(e) { const rect = modalCanvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top }; }
    function startDrawing(e) { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); if(e.type === 'touchstart') e.preventDefault(); }
    function moveDrawing(e) { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); if(e.type === 'touchmove') e.preventDefault(); }
    modalCanvas.addEventListener('mousedown', startDrawing); window.addEventListener('mousemove', moveDrawing); window.addEventListener('mouseup', () => drawing = false);
    modalCanvas.addEventListener('touchstart', startDrawing, {passive: false}); modalCanvas.addEventListener('touchmove', moveDrawing, {passive: false}); modalCanvas.addEventListener('touchend', () => drawing = false);

    // --- ZOOM INTELLIGENT ---
    let currentZoom = 1.0; 
    const minZoom = 0.3;
    const maxZoom = 3.0;
    const zoomDisplay = document.getElementById('zoom-level');

    function fitToScreen() {
        const scrollArea = document.querySelector('.scroll-area');
        if(!scrollArea) return;
        
        const screenWidth = scrollArea.clientWidth;
        const pageWidth = 816;

        if (screenWidth > 0 && screenWidth < pageWidth) { 
            currentZoom = (screenWidth / pageWidth) * 0.98; 
        } else { 
            currentZoom = 1.0; 
        }
        
        currentZoom = Math.round(currentZoom * 100) / 100;
        updateZoom();
    }

    function updateZoom() { 
        if (currentZoom < minZoom) currentZoom = minZoom; 
        if (currentZoom > maxZoom) currentZoom = maxZoom; 
        
        containerInvoice.style.transform = `scale(${currentZoom})`; 
        
        if(zoomDisplay) {
            zoomDisplay.textContent = Math.round(currentZoom * 100) + '%'; 
        }
        
        const scrollArea = document.querySelector('.scroll-area');
        if(scrollArea) {
            const screenWidth = scrollArea.clientWidth;
            const scaledWidth = 816 * currentZoom; 
            
            if (scaledWidth < screenWidth) { 
                containerInvoice.style.marginLeft = ((screenWidth - scaledWidth) / 2) + "px"; 
            } else { 
                containerInvoice.style.marginLeft = "0px"; 
            }
        }

        const unscaledHeight = containerInvoice.offsetHeight;
        const scaledHeight = unscaledHeight * currentZoom;
        
        if (currentZoom < 1.0) { 
            containerInvoice.style.marginBottom = (scaledHeight - unscaledHeight + 50) + "px"; 
        } else if (currentZoom > 1.0) { 
            containerInvoice.style.marginBottom = (currentZoom * 400) + "px"; 
        } else { 
            containerInvoice.style.marginBottom = "100px"; 
        }
    }

    function adjustZoom(delta) { 
        currentZoom += delta; 
        currentZoom = Math.round(currentZoom * 10) / 10; 
        updateZoom(); 
    }
    
    function resetZoom() { 
        fitToScreen(); 
    } 
    
    window.addEventListener('resize', () => { 
        if (document.getElementById('view-editor').style.display === 'flex') { 
            fitToScreen(); 
        } 
    });
    
    let initialDistance = 0;
    let initialZoomState = 1.0; 
    const scrollArea = document.querySelector('.scroll-area');
    
    if (scrollArea) {
        scrollArea.addEventListener('touchstart', function(e) { 
            if (e.touches.length === 2) { 
                initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); 
                initialZoomState = currentZoom; 
            } 
        }, { passive: false });
        
        scrollArea.addEventListener('touchmove', function(e) { 
            if (e.touches.length === 2) { 
                e.preventDefault(); 
                const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); 
                if (initialDistance > 0) { 
                    const diff = currentDistance / initialDistance; 
                    currentZoom = initialZoomState * diff; 
                    updateZoom(); 
                } 
            } 
        }, { passive: false });
    }
    
    document.addEventListener('input', function(e) {
        const input = e.target; if (input.tagName !== 'INPUT') return;
        const td = input.closest('td'); if(!td) return;
        const tr = td.parentElement; const table = tr.closest('.main-table'); if (!table || td.cellIndex !== 1) return;
        if (input.scrollWidth > input.clientWidth) {
            let val = input.value; let lastSpace = val.lastIndexOf(' ');
            if (lastSpace !== -1) {
                let wordToMove = val.substring(lastSpace + 1); let textToKeep = val.substring(0, lastSpace);
                if(wordToMove.length === 0) return; input.value = textToKeep; let nextTr = tr.nextElementSibling;
                if (nextTr) { let nextTd = nextTr.children[1]; if (nextTd) { let nextInput = nextTd.querySelector('input'); if (nextInput) { let newText = nextInput.value.length > 0 ? wordToMove + " " + nextInput.value : wordToMove; nextInput.value = newText; nextInput.focus(); nextInput.setSelectionRange(wordToMove.length, wordToMove.length); } } }
            }
        }
    });
    
    document.addEventListener('keydown', function(e) {
        const input = e.target; if (input.tagName !== 'INPUT') return;
        if (e.key === 'Enter') {
            e.preventDefault(); const currentTd = input.closest('td'); const currentTr = input.closest('tr');
            if (currentTr && currentTd) { const cellIndex = currentTd.cellIndex; const nextTr = currentTr.nextElementSibling; if (nextTr) { const nextTd = nextTr.children[cellIndex]; if (nextTd) { const nextInput = nextTd.querySelector('input'); if (nextInput) { nextInput.focus(); return; } } } }
             const allInputs = Array.from(document.querySelectorAll('input')); const index = allInputs.indexOf(input); if (index > -1 && index < allInputs.length - 1) allInputs[index + 1].focus();
        }
        if (e.key === 'Backspace') {
            if (input.selectionStart === 0 && input.selectionEnd === 0) {
                const currentTd = input.closest('td'); const currentTr = input.closest('tr');
                if (currentTr && currentTd) { const cellIndex = currentTd.cellIndex; const prevTr = currentTr.previousElementSibling; if (prevTr) { const prevTd = prevTr.children[cellIndex]; if (prevTd) { const prevInput = prevTd.querySelector('input'); if (prevInput) { e.preventDefault(); prevInput.focus(); const len = prevInput.value.length; prevInput.setSelectionRange(len, len); } } } }
            }
        }
    });
    
    // Initialisation
    initAuth();

</script>
</body>
