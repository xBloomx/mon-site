<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feuilles de Temps F.Dussault</title>
    
    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --app-bg: #1e1f26; --sidebar-bg: #fcca46; --btn-yellow: #fcca46; 
            --blue-bg: #d1e9ff; --btn-green: #28a745; --btn-blue: #3498db;
            --btn-grey: #343a40; --btn-red: #ff4d4d; --btn-orange: #ff9800;
            --text-light: #e0e0e0; --card-bg: #2b2c36;
        }
        
        * { box-sizing: border-box; }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--app-bg); color: var(--text-light); margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--app-bg); overflow: hidden; }

        /* Utilitaires SVG */
        .svg-icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; display: inline-block; vertical-align: middle; flex-shrink: 0; }

        /* Badges de statut */
        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; color: white; }
        .badge-status .svg-icon { width: 12px; height: 12px; }
        .b-brouillon { background: #444; }
        .b-envoye { background: #3498db; }
        .b-attente { background: #fcca46; color: black; }
        .b-paye { background: #28a745; }
        .b-retard, .b-renvoye { background: #ff4d4d; }

        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }

        .tabs-container { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-tab { background: #1a1b23; color: #aaa; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px;}
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; color: #888; pointer-events: none; display: flex; align-items: center;}

        .invoice-list { display: flex; flex-direction: column; gap: 10px; padding-bottom:30px; }
        
        /* DESIGN FEUILLE DE TEMPS (BUREAU / DESKTOP) */
        .invoice-item { 
            background-color: var(--card-bg); 
            padding: 12px 20px; 
            border-radius: 10px; 
            display: grid;
            grid-template-columns: 240px 1fr 130px 100px 44px;
            align-items: center; 
            gap: 15px;
            transition: transform 0.2s, background-color 0.2s; 
            cursor: pointer; 
            border: 1px solid transparent;
            border-left: 4px solid transparent; 
            margin-bottom: 8px;
        }
        .invoice-item:hover { 
            transform: translateX(5px); 
            background-color: #343542; 
            border-left-color: var(--btn-yellow); 
        }
        
        .inv-id { font-weight: bold; color: var(--btn-yellow); font-size: 14px; white-space: nowrap; }
        .inv-client { font-weight: bold; font-size: 16px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; }
        .inv-divider { display: none; }
        .inv-status { display: flex; align-items: center; }
        .inv-date { color: #aaa; font-size: 14px; text-align: right; font-weight: 500; }
        .inv-actions { display: flex; justify-content: flex-end; align-items: center; }
        
        .btn-icon { 
            background: #444; 
            border: none; 
            width: 36px; 
            height: 36px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.2s; 
            color: white; 
            flex-shrink: 0;
        }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: var(--btn-red); border: 1px solid transparent;}
        .btn-delete:hover { background: var(--btn-red); color: white; }

        #view-editor { display: none; flex-direction: column; height: 100%; }

        .top-bar { height: auto; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; background: rgba(30, 31, 38, 0.95); border-bottom: 1px solid #333; z-index: 101; flex-wrap: wrap; }
        
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-1px); }

        .btn-back { background-color: var(--btn-grey) !important; color: white !important; }
        .btn-save { background-color: var(--btn-green) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-send { background-color: var(--btn-blue) !important; color: white !important; }
        .btn-unlock { background-color: var(--btn-orange) !important; color: white !important; }

        .scroll-area { flex: 1; overflow: auto; padding: 15px 0; display: block; touch-action: auto; }
        #zoom-wrapper { display: block; width: 8.5in; transform-origin: top left; transition: transform 0.1s ease-out; padding-bottom: 50px;}
        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 31, 38, 0.95); padding: 5px 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #555; }
        .zoom-controls button { background: var(--btn-yellow); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #1e1f26; }

        .page { width: 8.5in; height: 11in; background: white; color: black; padding: 0.5in; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; display: flex; flex-direction: column; position: relative; margin: 0 0 20px 0; flex-shrink: 0; }
        .page input { outline: none; font-family: inherit; }
        .page input:focus { border-bottom: 2px solid #000 !important; background: transparent !important; }

        .header-main { width: 100%; margin-bottom: 15px; text-align: left; }
        .header-main img { max-width: 100%; height: auto; display: inline-block; }
        .ts-title { text-align: center; font-size: 22px; font-weight: bold; text-decoration: underline; margin-bottom: 30px; text-transform: uppercase; color: black; }
        .ts-emp-info { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; font-size: 13px; font-weight: bold; color: black; }
        .ts-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .ts-field { background: var(--blue-bg); border: none; border-bottom: 1px solid #000; height: 26px; padding: 0 5px; font-weight: bold; flex: 1; color: black; font-size: 14px;}
        .temps-table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid black; }
        .temps-table th { border: 1px solid black; padding: 8px; font-size: 12px; text-align: center; background: #fff; color: black; font-weight: bold; }
        .temps-table td { border: 1px solid black; padding: 0; height: 28px; background-color: var(--blue-bg); }
        .cell-input { width: 100%; height: 100%; border: none !important; background: transparent; text-align: center; font-size: 13px; color: black; font-weight: bold; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .custom-modal-card { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .custom-modal-title { font-size: 20px; color: var(--btn-red); margin-bottom: 15px; font-weight: bold; }
        .custom-modal-msg { color: var(--text-light); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; }
        .btn-modal-cancel { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-confirm { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-ok { background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media (max-width: 1024px) {
            .top-bar { padding: 10px 85px 10px 10px; gap: 10px; height: 65px; overflow-x: auto; justify-content: flex-start; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .top-bar::-webkit-scrollbar { display: none; }
            .top-bar .action-btn, .spacer-mobile { flex-shrink: 0; width: auto; margin-bottom: 0; }
            .top-bar .action-btn { font-size: 11px; padding: 8px 15px; }
        }

        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            /* Marge de sécurité UNIQUEMENT sur le titre pour ne pas écraser le bouton */
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; width: 100%; }
            .dash-title { padding-right: 80px; width: 100%; }
            .dash-header .action-btn { width: 100%; justify-content: center; font-size: 14px; }
            
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; justify-content: center; }
            
            .toolbar { flex-direction: column; width: 100%; }
            .search-box, .search-box input { width: 100%; }
            
            .zoom-controls { display: none !important; }
            
            /* =========================================
               DESIGN FEUILLE DE TEMPS (MOBILE - CHIC ET COMPACT)
               ========================================= */
            .invoice-item {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas: 
                    "id id"
                    "client client"
                    "status date";
                align-items: center;
                gap: 4px 12px; 
                padding: 16px;
                border-radius: 12px;
                border: 1px solid #3a3b46;
                border-left: 1px solid #3a3b46;
                margin-bottom: 12px;
                position: relative;
            }
            .invoice-item:hover {
                transform: translateY(-2px); 
                background-color: #30313c;
                border-color: #555;
            }
            
            .inv-id { grid-area: id; font-size: 15px; font-weight: 800; width: auto; white-space: normal;}
            .inv-client { grid-area: client; font-size: 18px; font-weight: 700; margin-top: 0px; margin-bottom: 8px; white-space: normal; padding-right: 45px; width: auto; }
            .inv-status { grid-area: status; justify-self: start; width: auto; }
            .inv-date { grid-area: date; text-align: right; justify-self: end; font-size: 12px; color: #888; width: auto; }
            .inv-actions { position: absolute; top: 16px; right: 16px; margin: 0; }
            .btn-icon { width: 36px; height: 36px; border-radius: 10px; }
        }
        
        @media print {
            @page { margin: 0; size: letter; }
            html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; background: white !important; overflow: visible !important;}
            .sidebar, .top-bar, .zoom-controls, #view-dashboard, .custom-modal-overlay { display: none !important; }
            .main-content, #view-editor, .scroll-area { display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; position: static !important; padding: 0 !important; }
            #zoom-wrapper { margin: 0 !important; padding: 0 !important; transform: none !important; width: 100% !important; display: block !important; }
            .page { width: 100% !important; max-width: 100% !important; height: auto !important; min-height: 11in !important; margin: 0 !important; box-shadow: none !important; page-break-after: always !important; padding: 20px !important; display: block !important; }
            .temps-table td, .ts-field, .cell-input { background-color: transparent !important; }
            .temps-table th { background-color: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            input::placeholder { color: transparent !important; }
            ::-webkit-input-placeholder { color: transparent !important; }
        }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; inset: 0; background: #1e1f26; z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement du module...</div>

<svg style="display: none;">

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Feuilles de Temps</h1>
                <p>Création et suivi de vos heures</p>
            </div>
            <button class="action-btn" onclick="openNewTimesheet()">
                <svg class="svg-icon"><use href="#icon-plus"></use></svg> Nouvelle feuille
            </button>
        </div>

        <div class="tabs-container" id="timesheet-tabs" style="display:none;">
            <button id="tab-mine" class="btn-tab active" onclick="switchInvTab('mine')">
                <svg class="svg-icon" style="width:15px; height:15px;"><use href="#icon-user"></use></svg> Mes Feuilles
            </button>
            <button id="tab-all" class="btn-tab" onclick="switchInvTab('all')">
                <svg class="svg-icon" style="width:15px; height:15px;"><use href="#icon-inbox"></use></svg> Boîte de réception
            </button>
        </div>
        
        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon"><svg class="svg-icon"><use href="#icon-search"></use></svg></span>
                <input type="text" id="searchInput" placeholder="Rechercher (Nom, Date...)" onkeyup="filterTimesheets()">
            </div>
        </div>
        
        <div class="invoice-list" id="timesheetListContainer"></div>
    </div>

    <div id="view-editor">
        <div class="top-bar">
            <button class="action-btn btn-back" onclick="askGoBack()">
                <svg class="svg-icon"><use href="#icon-back"></use></svg> Retour
            </button>
            <button class="action-btn btn-save" id="btn-save" onclick="saveCurrentTimesheet(false)">
                <svg class="svg-icon"><use href="#icon-save"></use></svg> Sauvegarder
            </button>
            
            <button class="action-btn btn-send" id="btn-send" onclick="sendToOffice()">
                <svg class="svg-icon"><use href="#icon-send"></use></svg> Envoyer au bureau
            </button>

            <button class="action-btn btn-unlock" id="btn-unlock" onclick="unlockTimesheet()" style="display:none;">
                <svg class="svg-icon"><use href="#icon-unlock"></use></svg> Débloquer
            </button>

            <div style="flex:1" class="spacer-mobile"></div>
            
            <button class="action-btn" id="btn-print" onclick="window.print()">
                <svg class="svg-icon"><use href="#icon-print"></use></svg> Imprimer
            </button>
            <button class="action-btn" id="btn-add-page" onclick="addPage()">
                <svg class="svg-icon"><use href="#icon-file-plus"></use></svg> Page
            </button>
            <button class="action-btn" id="btn-dup-page" onclick="duplicatePage()">
                <svg class="svg-icon"><use href="#icon-copy"></use></svg> Dupliquer
            </button>
            <button class="action-btn" id="btn-del-page" onclick="deletePage()">
                <svg class="svg-icon"><use href="#icon-file-minus"></use></svg> Page

            <button class="action-btn" id="btn-clear" onclick="askClearInputs()">
                <svg class="svg-icon"><use href="#icon-eraser"></use></svg> Effacer
            </button>

        <div class="scroll-area" id="scrollArea">
            <div id="zoom-wrapper"></div>

        <div class="zoom-controls">
            <button onclick="adjustZoom(-0.1)">−</button>
            <span id="zoom-level">100%</span>
            <button onclick="adjustZoom(0.1)">+</button>
            <button onclick="resetZoom()" style="font-size: 14px;">↺</button>
        </div>
    </div>
</div>

            <button class="btn-modal-ok" onclick="closeAlertModal()">Compris</button>

</div>

<script>
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myRole = 'A3';
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentInvTab = 'mine';

    let timesheetsData = [];
    const STORAGE_KEY = 'dussault_timesheets_v1';
    let currentSheetId = null;

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'view_admin'] },
        'A2': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools'] },
        'A3': { perms: ['transfer_tools'] }
    };

    function hasPermission(role, permId) {
        if (role === 'A0') return true; 
        const savedRoles = JSON.parse(localStorage.getItem('dussault_roles_v1')) || defaultRolesConfig;
        const roleData = savedRoles[role];
        if (!roleData || !roleData.perms) return false;
        return roleData.perms.includes(permId);
    }

    async function initAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.top.location.href = '../login.html'; return; }
        myUserId = user.id;
        const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).maybeSingle();
        if (profil) {
            myRole = profil.role;
            myUserName = profil.prenom_nom || user.email;
            if (hasPermission(myRole, 'approve_timesheets')) {
                document.getElementById('timesheet-tabs').style.display = 'flex';
            } else { currentInvTab = 'mine'; }
        }
        loadData();
        document.getElementById('security-loader').style.display = 'none';
        window.parent.postMessage({ type: 'module_ready', module: 'view-temps' }, '*');
    }

    function switchInvTab(tab) {
        currentInvTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        filterTimesheets(); 
    }

    let confirmCallback = null;
    function showConfirm(msg, callback) { 
        document.getElementById('confirmMsg').textContent = msg; 
        confirmCallback = callback; 
        document.getElementById('confirmModal').style.display = 'flex'; 
        // CACHER MENU QUAND CONFIRMATION OUVERTE
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }
    
    function closeConfirmModal() { 
        document.getElementById('confirmModal').style.display = 'none'; 
        confirmCallback = null; 
        // REMONTRER MENU SI ON EST PAS DANS L'ÉDITEUR
        if (document.getElementById('view-editor').style.display !== 'flex') {
            window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
        }
    }
    
    document.getElementById('confirmYesBtn').onclick = function() { 
        if (confirmCallback) confirmCallback(); 
        closeConfirmModal(); 
    };
    
    function showAlert(msg) { 
        document.getElementById('alertMsg').textContent = msg; 
        document.getElementById('alertModal').style.display = 'flex'; 
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }
    
    function closeAlertModal() { 
        document.getElementById('alertModal').style.display = 'none'; 
        if (document.getElementById('view-editor').style.display !== 'flex') {
            window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
        }
    }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                timesheetsData = JSON.parse(stored);
                // Sécurité : s'assurer que timesheetsData est bien un tableau
                if (!Array.isArray(timesheetsData)) timesheetsData = [];
            } catch (e) { timesheetsData = []; }
        }
        filterTimesheets();
    }
    
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(timesheetsData)); filterTimesheets(); }

    const viewDashboard = document.getElementById('view-dashboard');
    const viewEditor = document.getElementById('view-editor');
    const listContainer = document.getElementById('timesheetListContainer');
    const wrapper = document.getElementById('zoom-wrapper');

    function showDashboard() { 
        viewDashboard.style.display = 'flex'; 
        viewEditor.style.display = 'none'; 
        // LE MENU RESTE LÀ OU REVIENT
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
        renderTimesheetList();
    }
    
    function askGoBack() { showDashboard(); }

    function applyEditorSecurity(sheetObj) {
        const isBureau = hasPermission(myRole, 'approve_timesheets');
        const status = sheetObj ? (sheetObj.status || 'brouillon') : 'brouillon';
        const isAuthor = sheetObj ? (sheetObj.authorId === myUserId || !sheetObj.authorId) : true;
        
        let canEdit = false;
        if (isAuthor && (status === 'brouillon' || status === 'renvoye' || status === 'attente')) canEdit = true;
        if (isBureau && (status === 'brouillon' || status === 'renvoye' || status === 'attente') && isAuthor) canEdit = true;

        document.getElementById('btn-save').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-add-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-dup-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-del-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-clear').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-send').style.display = canEdit ? 'flex' : 'none';

        const btnUnlock = document.getElementById('btn-unlock');
        if (isBureau && status !== 'brouillon' && status !== 'renvoye' && status !== 'attente') { btnUnlock.style.display = 'flex'; } 
        else { btnUnlock.style.display = 'none'; }

        const allInputs = wrapper.querySelectorAll('input');
        allInputs.forEach(inp => {
            if (!canEdit) { inp.setAttribute('readonly', true); inp.style.pointerEvents = 'none'; } 
            else { inp.removeAttribute('readonly'); inp.style.pointerEvents = 'auto'; }
        });
    }

    function unlockTimesheet() {
        const allInputs = wrapper.querySelectorAll('input');
        allInputs.forEach(inp => { inp.removeAttribute('readonly'); inp.style.pointerEvents = 'auto'; });
        document.getElementById('btn-save').style.display = 'flex';
        document.getElementById('btn-unlock').style.display = 'none';
        document.getElementById('btn-add-page').style.display = 'flex';
        document.getElementById('btn-dup-page').style.display = 'flex';
        document.getElementById('btn-del-page').style.display = 'flex';
        document.getElementById('btn-clear').style.display = 'flex';
        showAlert("🔓 Feuille de temps débloquée.");
    }

    function openNewTimesheet() {
        currentSheetId = null;
        viewDashboard.style.display = 'none';
        viewEditor.style.display = 'flex';
        // BOUTON MENU RESTE LÀ SELON TA DEMANDE
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
        wrapper.innerHTML = '';
        addPage(); 
        applyEditorSecurity(null);
        fitToScreen();
    }

    function openExistingTimesheet(id) {
        const sheet = timesheetsData.find(s => s.id === id);
        if (!sheet) return;
        currentSheetId = id;
        viewDashboard.style.display = 'none';
        viewEditor.style.display = 'flex';
        // BOUTON MENU RESTE LÀ SELON TA DEMANDE
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
        wrapper.innerHTML = '';
        if (sheet.pagesData && Array.isArray(sheet.pagesData)) {
            sheet.pagesData.forEach(pageData => {
                const newPage = createTimePageHTML();
                wrapper.appendChild(newPage);
                setupInputLogic(newPage);
                const inputs = newPage.querySelectorAll('input');
                pageData.forEach((val, idx) => { if(inputs[idx]) inputs[idx].value = val; });
            });
        } else { addPage(); }
        applyEditorSecurity(sheet);
        fitToScreen();
    }

    function saveCurrentTimesheet(isSending = false) {
        const firstPage = wrapper.querySelector('.page');
        if(!firstPage) return;
        const nameInput = firstPage.querySelector('.input-nom');
        const weekInput = firstPage.querySelector('.input-semaine-debut');
        const weekEndInput = firstPage.querySelector('.input-semaine-fin');
        let empName = nameInput ? nameInput.value.trim() : "";
        if(!empName) { empName = myUserName; if(nameInput) nameInput.value = empName; }
        const dateStr = (weekInput && weekEndInput && weekInput.value && weekEndInput.value) ? `Du ${weekInput.value} au ${weekEndInput.value}` : "Semaine en cours";
        const allPagesData = [];
        wrapper.querySelectorAll('.page').forEach(page => {
            const pageInputs = Array.from(page.querySelectorAll('input')).map(i => i.value);
            allPagesData.push(pageInputs);
        });
        const sheetId = currentSheetId || 'TS-' + Date.now();
        let currentStatus = 'brouillon';
        let existingSheet = timesheetsData.find(s => s.id === sheetId);
        if (existingSheet) { currentStatus = existingSheet.status || 'brouillon'; }
        if (isSending) currentStatus = 'envoye';
        const newSheetObj = {
            id: sheetId, client: empName, date: dateStr, pagesData: allPagesData,
            timestamp: existingSheet ? (existingSheet.timestamp || Date.now()) : Date.now(),
            authorId: existingSheet ? existingSheet.authorId : myUserId,
            authorName: existingSheet ? existingSheet.authorName : myUserName,
            status: currentStatus
        };
        if (existingSheet) { const index = timesheetsData.indexOf(existingSheet); timesheetsData[index] = newSheetObj; } 
        else { timesheetsData.push(newSheetObj); }
        currentSheetId = sheetId;
        saveData();
        if(isSending) { showAlert("📤 Envoyée au bureau."); showDashboard(); } 
        else { showAlert("✅ Sauvegardée."); applyEditorSecurity(newSheetObj); }
    }

    function sendToOffice() { showConfirm("Envoyer au bureau ?", function() { saveCurrentTimesheet(true); }); }
    function deleteTimesheet(id, event) { event.stopPropagation(); showConfirm("Supprimer ?", function() { timesheetsData = timesheetsData.filter(s => s.id !== id); saveData(); }); }

    function renderTimesheetList(filteredData = null) {
        listContainer.innerHTML = '';
        const isBureau = hasPermission(myRole, 'approve_timesheets');
        let baseList = timesheetsData;
        if (!isBureau || currentInvTab === 'mine') { baseList = timesheetsData.filter(s => s.authorId === myUserId || !s.authorId); } 
        else { baseList = timesheetsData.filter(s => s.status !== 'brouillon'); }
        let listToShow = filteredData ? filteredData : baseList;
        const sortedData = [...listToShow].sort((a, b) => b.timestamp - a.timestamp);
        if(sortedData.length === 0) { listContainer.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">Aucune feuille trouvée.</div>'; return; }
        
        sortedData.forEach(sheet => {
            let badgeHTML = ''; let st = sheet.status || 'brouillon';
            if(st === 'brouillon') badgeHTML = `<span class="badge-status b-brouillon"><svg class="svg-icon"><use href="#icon-file-text"></use></svg> Brouillon</span>`;
            if(st === 'envoye') badgeHTML = `<span class="badge-status b-envoye"><svg class="svg-icon"><use href="#icon-send"></use></svg> ${!isBureau?'Envoyée':'Reçue'}</span>`;
            
            const d = new Date(sheet.timestamp || Date.now());
            const displayDate = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
            let dateRange = sheet.date || "Semaine inconnue";
            let clientName = sheet.client || sheet.authorName || "Employé";
            
            const item = document.createElement('div');
            item.className = 'invoice-item';
            item.onclick = function() { openExistingTimesheet(sheet.id); };
            
            // LA PERMISSION POUR SUPPRIMER
            let canDelete = false;
            if (st === 'brouillon' || st === 'attente' || st === 'renvoye') {
                if (sheet.authorId === myUserId || isBureau) {
                    canDelete = true;
                }
            }
            
            let btnDelete = `<div class="btn-icon" style="background:transparent; pointer-events:none;"></div>`;
            if (canDelete) {
                btnDelete = `<button class="btn-icon btn-delete" onclick="deleteTimesheet('${sheet.id}', event)" title="Supprimer"><svg class="svg-icon" style="width:18px;height:18px;"><use href="#icon-trash"></use></svg></button>`;
            }
            
            item.innerHTML = `
                <div class="inv-id">${dateRange}</div>
                <div class="inv-client">
                    <svg class="svg-icon" style="margin-right:6px; color:#aaa; width:16px; height:16px;"><use href="#icon-user"></use></svg>
                    ${clientName}
                </div>
                <div class="inv-status">${badgeHTML}</div>
                <div class="inv-date">${displayDate}</div>
                <div class="inv-actions">${btnDelete}</div>
            `;
            listContainer.appendChild(item);
        });
    }

    function filterTimesheets() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const isBureau = hasPermission(myRole, 'approve_timesheets');
        let baseList = timesheetsData;
        if (!isBureau || currentInvTab === 'mine') { baseList = timesheetsData.filter(s => s.authorId === myUserId || !s.authorId); } 
        else { baseList = timesheetsData.filter(s => s.status !== 'brouillon'); }
        const filtered = baseList.filter(sheet => {
            const cName = sheet.client || sheet.authorName || "";
            const dName = sheet.date || "";
            return (cName.toLowerCase().includes(searchText) || dName.toLowerCase().includes(searchText));
        });
        renderTimesheetList(filtered);
    }

    function createTimePageHTML() {
        const page = document.createElement('div'); page.className = 'page';
        let rows = "";
        for(let i=0; i<20; i++) {
            rows += `<tr><td><input type="text" class="cell-input date-input" placeholder="JJ/MM/AAAA"></td><td><input type="text" class="cell-input"></td><td><input type="text" class="cell-input" style="text-align:left; padding-left:10px;"></td><td><input type="text" class="cell-input"></td></tr>`;
        }
        page.innerHTML = `<div class="header-main"><img src="logo_dussault.png" alt="F. Dussault"></div><div class="ts-title">FEUILLE DE TEMPS</div><div class="ts-emp-info"><div class="ts-row"><span style="width:130px;">Nom de l'employé:</span><input type="text" class="input-nom ts-field"></div><div class="ts-row" style="margin-top:5px;"><span style="width:90px;">Semaine du:</span><input type="text" class="input-semaine-debut ts-field date-input" placeholder="JJ/MM/AAAA"><span style="margin:0 10px;">au</span><input type="text" class="input-semaine-fin ts-field date-input" placeholder="JJ/MM/AAAA"></div></div><table class="temps-table"><thead><tr><th style="width:15%">Date</th><th style="width:15%"># Bon</th><th style="width:55%">Adresse</th><th style="width:15%">Heures</th></tr></thead><tbody>${rows}</tbody></table>`;
        return page;
    }

    function enforceDateFormat(e) { 
        let input = e.target; let v = input.value.replace(/\D/g, ''); if (v.length > 8) { v = v.substring(0, 8); }
        let formatted = ''; if (v.length > 4) { formatted = v.substring(0, 2) + '/' + v.substring(2, 4) + '/' + v.substring(4, 8); } 
        else if (v.length > 2) { formatted = v.substring(0, 2) + '/' + v.substring(2); } else { formatted = v; } input.value = formatted; 
    }

    function setupInputLogic(pageElement) {
        const inputs = Array.from(pageElement.querySelectorAll('input'));
        pageElement.querySelectorAll('.date-input').forEach(input => { input.addEventListener('input', enforceDateFormat); });
        const startInput = pageElement.querySelector('.input-semaine-debut');
        const endInput = pageElement.querySelector('.input-semaine-fin');
        const firstTableDateInput = pageElement.querySelector('.temps-table tbody tr:first-child .date-input');
        if(firstTableDateInput && startInput && endInput) {
            firstTableDateInput.addEventListener('input', function() {
                const val = this.value;
                if(val.length === 10) { 
                    const parts = val.split('/');
                    if(parts.length === 3) {
                        const day = parseInt(parts[0], 10); const month = parseInt(parts[1], 10) - 1; const year = parseInt(parts[2], 10);
                        const enteredDate = new Date(year, month, day);
                        if(!isNaN(enteredDate.getTime())) {
                            const dayOfWeek = enteredDate.getDay(); const startDate = new Date(enteredDate); startDate.setDate(startDate.getDate() - dayOfWeek);
                            const endDate = new Date(startDate); endDate.setDate(endDate.getDate() + 6);
                            startInput.value = String(startDate.getDate()).padStart(2, '0') + '/' + String(startDate.getMonth() + 1).padStart(2, '0') + '/' + startDate.getFullYear();
                            endInput.value = String(endDate.getDate()).padStart(2, '0') + '/' + String(endDate.getMonth() + 1).padStart(2, '0') + '/' + endDate.getFullYear();
                        }
                    }
                }
            });
        }
        inputs.forEach((input, index) => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { 
                    e.preventDefault(); const td = input.closest('td'); 
                    if (td) { 
                        const tr = td.closest('tr'); const colIndex = Array.from(tr.children).indexOf(td); const nextTr = tr.nextElementSibling; 
                        if (nextTr) { const nextTd = nextTr.children[colIndex]; const nextInput = nextTd ? nextTd.querySelector('input') : null; if (nextInput) { nextInput.focus(); return; } } 
                    } 
                    if (index + 1 < inputs.length) { inputs[index + 1].focus(); }
                } else if (e.key === 'Backspace' && input.value === '') { if (index - 1 >= 0) { inputs[index - 1].focus(); } }
            });
            input.addEventListener('paste', function(e) {
                e.preventDefault(); const clipboardData = (e.clipboardData || window.clipboardData).getData('text'); 
                const rows = clipboardData.split(/\r\n|\n|\r/); const currentTd = input.closest('td'); if (!currentTd) { input.value = clipboardData.trim(); return; } 
                const currentTr = currentTd.closest('tr'); const table = currentTr.closest('table'); const startRowIndex = Array.from(table.querySelectorAll('tbody tr')).indexOf(currentTr); const startColIndex = Array.from(currentTr.children).indexOf(currentTd); const tableRows = table.querySelectorAll('tbody tr');
                rows.forEach((rowText, i) => { 
                    if (startRowIndex + i < tableRows.length && rowText.trim() !== "") { 
                        const cells = rowText.split('\t'); const targetRow = tableRows[startRowIndex + i]; 
                        cells.forEach((cellText, j) => { if (targetRow.children[startColIndex + j]) { const targetInput = targetRow.children[startColIndex + j].querySelector('input'); if (targetInput) { targetInput.value = cellText.trim(); if(targetInput.classList.contains('date-input')) { targetInput.dispatchEvent(new Event('input')); } } } }); 
                    } 
                });
            });
        });
    }

    function addPage() { const newPage = createTimePageHTML(); wrapper.appendChild(newPage); setupInputLogic(newPage); }
    function deletePage() { if (wrapper.children.length > 1) { wrapper.removeChild(wrapper.lastElementChild); } else { showAlert("Impossible de supprimer."); } }
    function duplicatePage() { 
        const pages = wrapper.querySelectorAll('.page'); if (pages.length === 0) return; 
        const sourcePage = pages[pages.length - 1]; const newPage = createTimePageHTML(); wrapper.appendChild(newPage); setupInputLogic(newPage); 
        const sourceInputs = sourcePage.querySelectorAll('.ts-emp-info input'); const newInputs = newPage.querySelectorAll('.ts-emp-info input'); 
        sourceInputs.forEach((input, index) => { if(newInputs[index]) { newInputs[index].value = input.value; } }); updateZoom(); 
    }
    function askClearInputs() { showConfirm("Effacer tout ?", function() { wrapper.querySelectorAll('input').forEach(input => input.value = ''); }); }

    let currentZoom = 1.0; const minZoom = 0.3; const maxZoom = 3.0; const zoomDisplay = document.getElementById('zoom-level');
    function fitToScreen() {
        const scrollArea = document.getElementById('scrollArea'); if(!scrollArea) return;
        const screenWidth = scrollArea.clientWidth; const pageWidth = 816;
        if (screenWidth > 0 && screenWidth < pageWidth) { currentZoom = (screenWidth / pageWidth) * 0.98; } else { currentZoom = 1.0; }
        currentZoom = Math.round(currentZoom * 100) / 100; updateZoom();
    }
    function updateZoom() { 
        if (currentZoom < minZoom) currentZoom = minZoom; if (currentZoom > maxZoom) currentZoom = maxZoom; 
        wrapper.style.transform = `scale(${currentZoom})`; if(zoomDisplay) { zoomDisplay.textContent = Math.round(currentZoom * 100) + '%'; }
        const scrollArea = document.getElementById('scrollArea');
        if(scrollArea) {
            const screenWidth = scrollArea.clientWidth; const scaledWidth = 816 * currentZoom; 
            if (scaledWidth < screenWidth) { wrapper.style.marginLeft = ((screenWidth - scaledWidth) / 2) + "px"; } else { wrapper.style.marginLeft = "0px"; }
        }
        const unscaledHeight = wrapper.offsetHeight; const scaledHeight = unscaledHeight * currentZoom;
        if (currentZoom < 1.0) { wrapper.style.marginBottom = (scaledHeight - unscaledHeight + 50) + "px"; } 
        else if (currentZoom > 1.0) { wrapper.style.marginBottom = (currentZoom * 400) + "px"; } else { wrapper.style.marginBottom = "100px"; }
    }
    function adjustZoom(delta) { currentZoom += delta; currentZoom = Math.round(currentZoom * 10) / 10; updateZoom(); }
    function resetZoom() { fitToScreen(); } 
    window.addEventListener('resize', () => { if (document.getElementById('view-editor').style.display === 'flex') { fitToScreen(); } });
    
    let initialDistance = 0; let initialZoomState = 1.0; const scrollArea = document.getElementById('scrollArea');
    scrollArea.addEventListener('touchstart', function(e) { if (e.touches.length === 2) { initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); initialZoomState = currentZoom; } }, { passive: false });
    scrollArea.addEventListener('touchmove', function(e) { if (e.touches.length === 2) { e.preventDefault(); const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); if (initialDistance > 0) { const diff = currentDistance / initialDistance; currentZoom = initialZoomState * diff; updateZoom(); } } }, { passive: false });

    initAuth();
</script>
