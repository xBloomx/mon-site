<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feuilles de Temps F.Dussault</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --app-bg: #1e1f26;
            --sidebar-bg: #fcca46; 
            --btn-yellow: #fcca46; 
            --blue-bg: #d1e9ff; 
            --btn-green: #28a745;
            --btn-blue: #3498db;
            --btn-grey: #343a40;
            --btn-red: #ff4d4d;
            --btn-orange: #ff9800;
            --text-light: #e0e0e0;
            --card-bg: #2b2c36;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--app-bg); 
            color: var(--text-light);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .main-content {
            flex: 1; display: flex; flex-direction: column;
            position: relative; background-color: var(--app-bg);
            overflow: hidden;
        }

        #view-dashboard {
            padding: 30px; height: 100%; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }

        .tabs-container { display: flex; gap: 10px; }
        .btn-tab { background: #1a1b23; color: #aaa; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; color: #888; pointer-events: none; }

        .invoice-list { display: flex; flex-direction: column; gap: 10px; padding-bottom:30px; }
        .invoice-item { background-color: var(--card-bg); padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s, background-color 0.2s; cursor: pointer; border-left: 5px solid transparent; }
        .invoice-item:hover { transform: translateY(-2px); background-color: #343542; border-left: 5px solid var(--btn-yellow); }
        
        .inv-info { display: flex; gap: 20px; align-items: center; flex: 1; flex-wrap: wrap; }
        .inv-id { font-weight: bold; color: var(--btn-yellow); font-size: 16px; width: 220px; } 
        .inv-client { font-weight: bold; font-size: 16px; color: white; flex: 1; min-width:150px; }
        .inv-author { font-size: 13px; color: #888; font-style: italic; width: 120px;}
        .inv-status { width: 150px; }
        .inv-date { color: #aaa; font-size: 13px; width: 150px; text-align: right; }
        
        .inv-actions { display: flex; gap: 10px; margin-left: 20px;}
        .btn-icon { background: #444; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { background: #555; }
        .btn-delete { background: rgba(220, 53, 69, 0.1); color: var(--btn-red); border: 1px solid transparent; }
        .btn-delete:hover { background: var(--btn-red); color: white; }

        #view-editor { display: none; flex-direction: column; height: 100%; }

        .top-bar { height: auto; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; background: rgba(30, 31, 38, 0.95); border-bottom: 1px solid #333; z-index: 101; flex-wrap: wrap; }
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-1px); }

        .btn-back { background-color: var(--btn-grey) !important; color: white !important; }
        .btn-save { background-color: var(--btn-green) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-send { background-color: var(--btn-blue) !important; color: white !important; }
        .btn-unlock { background-color: var(--btn-orange) !important; color: white !important; }

        .scroll-area { flex: 1; overflow: auto; padding: 0; display: block; position: relative; touch-action: pan-x pan-y; }
        #zoom-wrapper { position: absolute; top: 0; left: 0; width: 8.5in; display: block; transform-origin: 0px 0px; transition: transform 0.1s ease-out; }

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 31, 38, 0.95); padding: 5px 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #555; }
        .zoom-controls button { background: var(--btn-yellow); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #1e1f26; }

        .page { width: 8.5in; height: 11in; background: white; color: black; padding: 0.5in; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; display: flex; flex-direction: column; position: relative; margin-bottom: 20px; margin-left: auto; margin-right: auto; flex-shrink: 0; }
        .page input { outline: none; font-family: inherit; }
        .page input:focus { border-bottom: 2px solid #000 !important; background: transparent !important; }

        .header-main { width: 100%; margin-bottom: 15px; text-align: left; }
        .header-main img { max-width: 100%; height: auto; display: inline-block; }
        .ts-title { text-align: center; font-size: 22px; font-weight: bold; text-decoration: underline; margin-bottom: 30px; text-transform: uppercase; color: black; }
        .ts-emp-info { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; font-size: 13px; font-weight: bold; color: black; }
        .ts-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .ts-field { background: var(--blue-bg); border: none; border-bottom: 1px solid #000; height: 26px; padding: 0 5px; font-weight: bold; flex: 1; color: black; font-size: 14px;}
        
        .temps-table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid black; }
        .temps-table th { border: 1px solid black; padding: 8px; font-size: 12px; text-align: center; background: #fff; color: black; font-weight: bold; }
        .temps-table td { border: 1px solid black; padding: 0; height: 28px; background-color: var(--blue-bg); }
        .cell-input { width: 100%; height: 100%; border: none !important; background: transparent; text-align: center; font-size: 13px; color: black; font-weight: bold; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .custom-modal-card { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .custom-modal-title { font-size: 20px; color: var(--btn-red); margin-bottom: 15px; font-weight: bold; }
        .custom-modal-msg { color: var(--text-light); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; }
        .btn-modal-cancel { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-confirm { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-ok { background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media (max-width: 1024px) {
            .top-bar { padding: 10px 70px 10px 10px; gap: 10px; height: 65px; justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .top-bar::-webkit-scrollbar { display: none; }
            .top-bar .action-btn, .spacer-mobile { flex-shrink: 0; width: auto; margin-bottom: 0; }
            .top-bar .action-btn { font-size: 11px; padding: 8px 15px; }
        }

        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; padding-right: 70px; }
            .dash-header .action-btn { width: 100%; justify-content: center; }
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; text-align: center; }
            .invoice-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .inv-info { flex-direction: column; align-items: flex-start; gap: 5px; width: 100%; }
            .inv-actions { align-self: flex-end; margin-left: 0; margin-top: -35px; }
            .zoom-controls { display: none !important; }
        }

        /* ✅ VERSION CORRIGÉE : PLUS DE SPACER ET HAUTEUR SÉCURISÉE */
        @media print {
            @page {
                size: letter portrait;
                margin: 0;
            }

            html, body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                width: 100% !important;
                height: 100% !important;
                overflow: visible !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            #zoom-wrapper {
                transform: none !important;
                position: static !important;
                width: 100% !important;
            }

            .scroll-area {
                overflow: visible !important;
                height: auto !important;
            }

            /* ❌ ON CACHE LE SPACER (C'EST LUI QUI FAISAIT LA 2E PAGE) */
            .top-bar,
            .zoom-controls,
            #view-dashboard,
            .custom-modal-overlay,
            #scroll-spacer {
                display: none !important;
            }

            /* ✅ ON RÉDUIT LÉGÈREMENT LA HAUTEUR MAX POUR NE PAS DÉBORDER */
            .page {
                width: 8.5in !important;
                height: auto !important;
                max-height: 10.3in !important; /* Laisse de la place pour l'URL du navigateur */
                margin: 0 !important;
                padding: 0.3in !important;
                box-sizing: border-box !important;

                page-break-after: avoid !important;
                page-break-inside: avoid !important;

                overflow: hidden !important;
                box-shadow: none !important;
                border: none !important;
            }

            .temps-table {
                width: 100% !important;
                border-collapse: collapse !important;
                border: 1px solid black !important;
                margin-top: 10px !important;
            }

            .temps-table th,
            .temps-table td {
                border: 1px solid black !important;
            }

            /* Ajustement parfait pour les lignes */
            .temps-table td {
                height: 25px !important; 
            }

            .temps-table td,
            .ts-field,
            .cell-input {
                background: transparent !important;
            }

            .temps-table th {
                background: white !important;
                color: black !important;
            }

            input::placeholder {
                color: transparent !important;
            }
        }
    </style>
</head>
<body>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Feuilles de Temps</h1>
                <p>Création et suivi de vos heures</p>
            </div>
            <button class="action-btn" onclick="openNewTimesheet()"><span>+</span> NOUVELLE FEUILLE</button>
        </div>

        <div class="tabs-container" id="timesheet-tabs" style="display:none;">
            <button id="tab-mine" class="btn-tab active" onclick="switchInvTab('mine')">👤 Mes Feuilles</button>
            <button id="tab-all" class="btn-tab" onclick="switchInvTab('all')">📥 Boîte de réception (Bureau)</button>
        </div>
        
        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Rechercher (Nom, Date...)" onkeyup="filterTimesheets()">
            </div>
        </div>
        
        <div class="invoice-list" id="timesheetListContainer"></div>
    </div>

    <div id="view-editor">
        <div class="top-bar">
            <button class="action-btn btn-back" onclick="askGoBack()">⬅ Retour</button>
            <button class="action-btn btn-save" id="btn-save" onclick="saveCurrentTimesheet(false)">💾 SAUVEGARDER</button>
            <button class="action-btn btn-send" id="btn-send" onclick="sendToOffice()">📤 ENVOYER AU BUREAU</button>

            <button class="action-btn btn-unlock" id="btn-unlock" onclick="unlockTimesheet()" style="display:none;">🔓 Débloquer</button>

            <div style="flex:1" class="spacer-mobile"></div>
            
            <button class="action-btn" id="btn-print" onclick="printFix()">🖨️ Imprimer</button>
            
            <button class="action-btn" id="btn-add-page" onclick="addPage()">➕ Page</button>
            <button class="action-btn" id="btn-dup-page" onclick="duplicatePage()">📄 Dupliquer</button>
            <button class="action-btn" id="btn-del-page" onclick="deletePage()">➖ Page</button>
            <button class="action-btn" id="btn-clear" onclick="askClearInputs()">🧹 Effacer</button>
        </div>
  
        <div class="scroll-area" id="scrollArea">
            <div id="zoom-wrapper"></div>
            <div id="scroll-spacer"></div>
        </div>
        
        <div class="zoom-controls">
            <button onclick="adjustZoom(-0.1)">−</button>
            <span id="zoom-level">100%</span>
            <button onclick="adjustZoom(0.1)">+</button>
            <button onclick="resetZoom()" style="font-size: 14px;">↺</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="confirmModal"><div class="custom-modal-card"><div class="custom-modal-title">Confirmation</div><div class="custom-modal-msg" id="confirmMsg">...</div><div class="custom-modal-actions"><button class="btn-modal-cancel" onclick="closeConfirmModal()">Non</button><button class="btn-modal-confirm" id="confirmYesBtn">Oui</button></div></div></div>
<div class="custom-modal-overlay" id="alertModal"><div class="custom-modal-card"><div class="custom-modal-title" style="color:var(--btn-yellow);">Information</div><div class="custom-modal-msg" id="alertMsg">...</div><div class="custom-modal-actions"><button class="btn-modal-ok" onclick="closeAlertModal()">Compris</button></div></div></div>

<script>
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myRole = 'A3';
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentInvTab = 'mine';

    let timesheetsData = [];
    const STORAGE_KEY = 'dussault_timesheets_v1';
    let currentSheetId = null;

    async function initAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            myUserId = user.id;
            const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).maybeSingle();
            if (profil) {
                myRole = profil.role;
                myUserName = profil.prenom_nom || user.email;
                if (myRole !== 'A3') document.getElementById('timesheet-tabs').style.display = 'flex';
            }
        }
        loadData();
    }

    function switchInvTab(tab) {
        currentInvTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        filterTimesheets(); 
    }

    let confirmCallback = null;
    function showConfirm(msg, callback) { document.getElementById('confirmMsg').textContent = msg; confirmCallback = callback; document.getElementById('confirmModal').style.display = 'flex'; }
    function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; confirmCallback = null; }
    document.getElementById('confirmYesBtn').onclick = function() { if (confirmCallback) confirmCallback(); closeConfirmModal(); };
    function showAlert(msg) { document.getElementById('alertMsg').textContent = msg; document.getElementById('alertModal').style.display = 'flex'; }
    function closeAlertModal() { document.getElementById('alertModal').style.display = 'none'; }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) timesheetsData = JSON.parse(stored);
        filterTimesheets();
    }
    
    function saveData() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(timesheetsData)); 
        filterTimesheets(); 
    }

    const viewDashboard = document.getElementById('view-dashboard');
    const viewEditor = document.getElementById('view-editor');
    const listContainer = document.getElementById('timesheetListContainer');
    const wrapper = document.getElementById('zoom-wrapper');

    function showDashboard() { 
        viewDashboard.style.display = 'flex'; viewEditor.style.display = 'none'; renderTimesheetList();
    }
    
    function askGoBack() { 
        showDashboard();
    }

    function applyEditorSecurity(sheetObj) {
        const isBureau = ['A0', 'A1', 'A2'].includes(myRole);
        const status = sheetObj ? (sheetObj.status || 'brouillon') : 'brouillon';
        const isAuthor = sheetObj ? (sheetObj.authorId === myUserId || !sheetObj.authorId) : true;
        
        let canEdit = false;
        
        if (isAuthor && status === 'brouillon') canEdit = true;
        if (isBureau && status === 'brouillon' && isAuthor) canEdit = true;

        document.getElementById('btn-save').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-add-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-dup-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-del-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-clear').style.display = canEdit ? 'flex' : 'none';
        
        document.getElementById('btn-send').style.display = (!isBureau && isAuthor && status === 'brouillon') ? 'flex' : 'none';

        const btnUnlock = document.getElementById('btn-unlock');
        if (isBureau && status !== 'brouillon') {
            btnUnlock.style.display = 'flex';
        } else {
            btnUnlock.style.display = 'none';
        }

        const allInputs = wrapper.querySelectorAll('input');
        allInputs.forEach(inp => {
            if (!canEdit) {
                inp.setAttribute('readonly', true);
                inp.style.pointerEvents = 'none';
            } else {
                inp.removeAttribute('readonly');
                inp.style.pointerEvents = 'auto';
            }
        });
    }

    function unlockTimesheet() {
        const allInputs = wrapper.querySelectorAll('input');
        allInputs.forEach(inp => {
            inp.removeAttribute('readonly');
            inp.style.pointerEvents = 'auto';
        });
        document.getElementById('btn-save').style.display = 'flex';
        document.getElementById('btn-unlock').style.display = 'none';
        document.getElementById('btn-add-page').style.display = 'flex';
        document.getElementById('btn-dup-page').style.display = 'flex';
        document.getElementById('btn-del-page').style.display = 'flex';
        document.getElementById('btn-clear').style.display = 'flex';
        showAlert("🔓 Feuille de temps débloquée. Vous pouvez modifier les champs et sauvegarder.");
    }

    function openNewTimesheet() {
        currentSheetId = null;
        viewDashboard.style.display = 'none';
        viewEditor.style.display = 'flex';
        wrapper.innerHTML = '';
        addPage(); 
        
        applyEditorSecurity(null);
        setTimeout(resetZoom, 50); 
    }

    function openExistingTimesheet(id) {
        const sheet = timesheetsData.find(s => s.id === id);
        if (!sheet) return;
        
        currentSheetId = id;
        viewDashboard.style.display = 'none';
        viewEditor.style.display = 'flex';
        wrapper.innerHTML = '';

        sheet.pagesData.forEach(pageData => {
            const newPage = createTimePageHTML();
            wrapper.appendChild(newPage);
            setupInputLogic(newPage);
            
            const inputs = newPage.querySelectorAll('input');
            pageData.forEach((val, idx) => { if(inputs[idx]) inputs[idx].value = val; });
        });
        
        applyEditorSecurity(sheet);
        setTimeout(resetZoom, 50);
    }

    function saveCurrentTimesheet(isSending = false) {
        const firstPage = wrapper.querySelector('.page');
        if(!firstPage) return;
        
        const nameInput = firstPage.querySelector('.input-nom');
        const weekInput = firstPage.querySelector('.input-semaine-debut');
        const weekEndInput = firstPage.querySelector('.input-semaine-fin');
        
        let empName = nameInput ? nameInput.value.trim() : "";
        if(!empName) { empName = myUserName; if(nameInput) nameInput.value = empName; }

        const dateStr = (weekInput && weekEndInput && weekInput.value && weekEndInput.value) 
            ? `Du ${weekInput.value} au ${weekEndInput.value}` 
            : "Semaine en cours";
        
        const allPagesData = [];
        wrapper.querySelectorAll('.page').forEach(page => {
            const pageInputs = Array.from(page.querySelectorAll('input')).map(i => i.value);
            allPagesData.push(pageInputs);
        });

        const sheetId = currentSheetId || 'TS-' + Date.now();
        
        let currentStatus = 'brouillon';
        let existingSheet = timesheetsData.find(s => s.id === sheetId);
        if (existingSheet) currentStatus = existingSheet.status || 'brouillon';
        
        if (isSending) currentStatus = 'envoye';
        
        const newSheetObj = {
            id: sheetId,
            client: empName, 
            date: dateStr,
            pagesData: allPagesData,
            timestamp: Date.now(),
            authorId: existingSheet ? existingSheet.authorId : myUserId,
            authorName: existingSheet ? existingSheet.authorName : myUserName,
            status: currentStatus
        };

        if (existingSheet) {
            const index = timesheetsData.indexOf(existingSheet);
            timesheetsData[index] = newSheetObj;
        } else {
            timesheetsData.push(newSheetObj);
        }

        currentSheetId = sheetId;
        saveData();

        if(isSending) {
            showAlert("📤 Feuille de temps verrouillée et envoyée au bureau avec succès !");
            showDashboard();
        } else {
            showAlert("✅ Feuille de temps sauvegardée.");
            applyEditorSecurity(newSheetObj);
        }
    }

    function sendToOffice() {
        showConfirm("Une fois envoyée, cette feuille de temps sera verrouillée pour vous. L'envoyer au bureau ?", function() {
            saveCurrentTimesheet(true); 
        });
    }

    function changeOfficeStatus(newStatus) {
        if (!currentSheetId) return;
        const sheet = timesheetsData.find(s => s.id === currentSheetId);
        if (sheet) {
            sheet.status = newStatus;
            saveData();
            showAlert("Statut mis à jour.");
        }
    }

    function deleteTimesheet(id, event) {
        event.stopPropagation();
        showConfirm("Supprimer cette feuille de temps ?", function() {
            timesheetsData = timesheetsData.filter(s => s.id !== id);
            saveData();
        });
    }

    function renderTimesheetList(filteredData = null) {
        listContainer.innerHTML = '';
        
        let listToShow = timesheetsData;
        if (myRole === 'A3') {
            listToShow = timesheetsData.filter(s => s.authorId === myUserId || !s.authorId);
        }

        if (filteredData) listToShow = filteredData;
        
        const sortedData = [...listToShow].sort((a, b) => b.timestamp - a.timestamp);
        
        if(sortedData.length === 0) { 
            listContainer.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">Aucune feuille de temps.</div>';
            return; 
        }

        sortedData.forEach(sheet => {
            let badgeHTML = '';
            let st = sheet.status || 'brouillon';
            if(st === 'brouillon') badgeHTML = '<span style="background:#444; padding:4px 8px; border-radius:4px; font-size:11px;">📝 Brouillon</span>';
            if(st === 'envoye') badgeHTML = `<span style="background:#3498db; padding:4px 8px; border-radius:4px; font-size:11px; color:white;">${myRole==='A3'?'📤 Envoyée':'📥 Reçue (À vérifier)'}</span>`;

            const item = document.createElement('div');
            item.className = 'invoice-item';
            item.onclick = function() { openExistingTimesheet(sheet.id); };
            
            let btnDelete = '';
            if (myRole !== 'A3' || sheet.authorId === myUserId) {
                btnDelete = `<button class="btn-icon btn-delete" onclick="deleteTimesheet('${sheet.id}', event)" title="Supprimer">🗑️</button>`;
            }

            item.innerHTML = `
                <div class="inv-info">
                    <div class="inv-id">${sheet.date}</div>
                    <div class="inv-client">${sheet.client}</div>
                    ${myRole !== 'A3' ? `<div class="inv-author">👤 ${sheet.authorName || 'Inconnu'}</div>` : ''}
                    <div class="inv-status">${badgeHTML}</div>
                    <div class="inv-date" style="font-size:12px">Le ${new Date(sheet.timestamp).toLocaleDateString()}</div>
                </div>
                <div class="inv-actions">${btnDelete}</div>
            `;
            listContainer.appendChild(item);
        });
    }

    function filterTimesheets() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        let baseList = (myRole === 'A3' || currentInvTab === 'mine') ? timesheetsData.filter(s => s.authorId === myUserId) : timesheetsData;

        const filtered = baseList.filter(sheet => {
            return (sheet.client.toLowerCase().includes(searchText) || sheet.date.toLowerCase().includes(searchText));
        });
        renderTimesheetList(filtered);
    }

    function createTimePageHTML() {
        const page = document.createElement('div'); page.className = 'page';
        let rows = "";
        for(let i=0; i<20; i++) {
            rows += `<tr><td><input type="text" class="cell-input date-input" placeholder="JJ/MM/AAAA"></td><td><input type="text" class="cell-input"></td><td><input type="text" class="cell-input" style="text-align:left; padding-left:10px;"></td><td><input type="text" class="cell-input"></td></tr>`;
        }
        page.innerHTML = `
            <div class="header-main"><img src="logo_dussault.png" alt="F. Dussault"></div>
            <div class="ts-title">FEUILLE DE TEMPS</div>
            <div class="ts-emp-info">
                <div class="ts-row"><span style="width:130px;">Nom de l'employé:</span><input type="text" class="input-nom ts-field"></div>
                <div class="ts-row" style="margin-top:5px;"><span style="width:90px;">Semaine du:</span><input type="text" class="input-semaine-debut ts-field date-input" placeholder="JJ/MM/AAAA"><span style="margin:0 10px;">au</span><input type="text" class="input-semaine-fin ts-field date-input" placeholder="JJ/MM/AAAA"></div>
            </div>
            <table class="temps-table"><thead><tr><th style="width:15%">Date</th><th style="width:15%"># Bon</th><th style="width:55%">Adresse</th><th style="width:15%">Heures</th></tr></thead><tbody>${rows}</tbody></table>`;
        return page;
    }

    function enforceDateFormat(e) { let input = e.target; let v = input.value.replace(/\D/g, ''); if (v.length > 8) v = v.substring(0, 8); let formatted = ''; if (v.length > 4) { formatted = v.substring(0, 2) + '/' + v.substring(2, 4) + '/' + v.substring(4, 8); } else if (v.length > 2) { formatted = v.substring(0, 2) + '/' + v.substring(2); } else { formatted = v; } input.value = formatted; }

    function setupInputLogic(pageElement) {
        const inputs = Array.from(pageElement.querySelectorAll('input'));
        pageElement.querySelectorAll('.date-input').forEach(input => { input.addEventListener('input', enforceDateFormat); });
        
        const startInput = pageElement.querySelector('.input-semaine-debut');
        const endInput = pageElement.querySelector('.input-semaine-fin');
        const dateCells = pageElement.querySelectorAll('.temps-table tbody tr .date-input');

        if(startInput) {
            startInput.addEventListener('input', function() {
                const val = this.value;
                if(val.length === 10) { 
                    const parts = val.split('/');
                    if(parts.length === 3) {
                        const day = parseInt(parts[0], 10);
                        const month = parseInt(parts[1], 10) - 1;
                        const year = parseInt(parts[2], 10);
                        
                        const startDate = new Date(year, month, day);
                        if(!isNaN(startDate.getTime())) {
                            const endDate = new Date(startDate);
                            endDate.setDate(endDate.getDate() + 6);
                            endInput.value = String(endDate.getDate()).padStart(2, '0') + '/' + String(endDate.getMonth() + 1).padStart(2, '0') + '/' + endDate.getFullYear();

                            for(let i=0; i<7; i++) {
                                if(dateCells[i]) {
                                    const rowDate = new Date(startDate);
                                    rowDate.setDate(rowDate.getDate() + i);
                                    dateCells[i].value = String(rowDate.getDate()).padStart(2, '0') + '/' + String(rowDate.getMonth() + 1).padStart(2, '0') + '/' + rowDate.getFullYear();
                                }
                            }
                        }
                    }
                }
            });
        }

        inputs.forEach((input, index) => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); const td = input.closest('td'); if (td) { const tr = td.closest('tr'); const colIndex = Array.from(tr.children).indexOf(td); const nextTr = tr.nextElementSibling; if (nextTr) { const nextTd = nextTr.children[colIndex]; const nextInput = nextTd ? nextTd.querySelector('input') : null; if (nextInput) { nextInput.focus(); return; } } } if (index + 1 < inputs.length) inputs[index + 1].focus(); } else if (e.key === 'Backspace' && input.value === '') { if (index - 1 >= 0) inputs[index - 1].focus(); }
            });
            input.addEventListener('paste', function(e) {
                e.preventDefault(); const clipboardData = (e.clipboardData || window.clipboardData).getData('text'); const rows = clipboardData.split(/\r\n|\n|\r/); const currentTd = input.closest('td'); if (!currentTd) { input.value = clipboardData.trim(); return; } const currentTr = currentTd.closest('tr'); const table = currentTr.closest('table'); const startRowIndex = Array.from(table.querySelectorAll('tbody tr')).indexOf(currentTr); const startColIndex = Array.from(currentTr.children).indexOf(currentTd); const tableRows = table.querySelectorAll('tbody tr');
                rows.forEach((rowText, i) => { if (startRowIndex + i < tableRows.length && rowText.trim() !== "") { const cells = rowText.split('\t'); const targetRow = tableRows[startRowIndex + i]; cells.forEach((cellText, j) => { if (targetRow.children[startColIndex + j]) { const targetInput = targetRow.children[startColIndex + j].querySelector('input'); if (targetInput) { targetInput.value = cellText.trim(); if(targetInput.classList.contains('date-input')) { targetInput.dispatchEvent(new Event('input')); } } } }); } });
            });
        });
    }

    function addPage() { const newPage = createTimePageHTML(); wrapper.appendChild(newPage); setupInputLogic(newPage); }
    function deletePage() { if (wrapper.children.length > 1) { wrapper.removeChild(wrapper.lastElementChild); } else { showAlert("Impossible de supprimer la dernière page."); } }
    function duplicatePage() { const pages = wrapper.querySelectorAll('.page'); if (pages.length === 0) return; const sourcePage = pages[pages.length - 1]; const newPage = createTimePageHTML(); wrapper.appendChild(newPage); setupInputLogic(newPage); const sourceInputs = sourcePage.querySelectorAll('.ts-emp-info input'); const newInputs = newPage.querySelectorAll('.ts-emp-info input'); sourceInputs.forEach((input, index) => { if(newInputs[index]) newInputs[index].value = input.value; }); updateZoom(); }
    function askClearInputs() { showConfirm("Effacer tout le contenu ?", function() { wrapper.querySelectorAll('input').forEach(input => input.value = ''); }); }

    let currentZoom = 1.0; 
    const minZoom = 0.2; 
    const maxZoom = 3.0; 
    const zoomDisplay = document.getElementById('zoom-level');
    
    function updateZoom() { 
        if (currentZoom < minZoom) currentZoom = minZoom; 
        if (currentZoom > maxZoom) currentZoom = maxZoom; 
        
        const scrollArea = document.getElementById('scrollArea');
        const areaWidth = scrollArea.clientWidth;
        
        const docWidth = 816 * currentZoom; 
        
        let marginX = (areaWidth - docWidth) / 2;
        if (marginX < 0) marginX = 10;
        
        wrapper.style.transformOrigin = '0px 0px'; 
        wrapper.style.transform = `translate(${marginX}px, 20px) scale(${currentZoom})`; 
        
        const trueHeight = 1056;
        const scaledHeight = trueHeight * currentZoom;
        let spacer = document.getElementById('scroll-spacer');
        if (spacer) spacer.style.height = `${scaledHeight + 60}px`;
        
        zoomDisplay.textContent = Math.round(currentZoom * 100) + '%'; 
    }
    
    function resetZoom() { 
        const scrollArea = document.getElementById('scrollArea');
        const areaWidth = scrollArea.clientWidth;
        const areaHeight = scrollArea.clientHeight;
        
        const pagePixelWidth = 816;
        const pagePixelHeight = 1056;

        const zoomX = (areaWidth - 20) / pagePixelWidth; 
        const zoomY = (areaHeight - 40) / pagePixelHeight; 
        
        let targetZoom = Math.min(zoomX, zoomY);
        
        if (targetZoom > 1.0) targetZoom = 1.0; 
        if (targetZoom < minZoom) targetZoom = minZoom;
        
        currentZoom = targetZoom; 
        updateZoom(); 
    }

    window.addEventListener('beforeprint', () => {
        const wrap = document.getElementById('zoom-wrapper');
        if(wrap) {
            wrap.dataset.oldTransform = wrap.style.transform;
            wrap.style.transform = 'none';
        }
    });

    window.addEventListener('afterprint', () => {
        const wrap = document.getElementById('zoom-wrapper');
        if(wrap) {
            wrap.style.transform = wrap.dataset.oldTransform || '';
        }
    });

    function printFix() {
        const wrap = document.getElementById('zoom-wrapper');
        if(wrap) {
            wrap.style.transform = 'none'; 
        }
        
        setTimeout(() => {
            window.print();
        }, 100);
    }
    
    let initialDistance = 0, initialZoomState = 1.0; const scrollArea = document.getElementById('scrollArea');
    scrollArea.addEventListener('touchstart', function(e) { if (e.touches.length === 2) { initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); initialZoomState = currentZoom; } }, { passive: false });
    scrollArea.addEventListener('touchmove', function(e) { if (e.touches.length === 2) { e.preventDefault(); const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); if (initialDistance > 0) { const diff = currentDistance / initialDistance; currentZoom = initialZoomState * diff; updateZoom(); } } }, { passive: false });

    initAuth();
</script>
