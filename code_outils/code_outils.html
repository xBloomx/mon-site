<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gestion des Outils F.Dussault</title>
    
    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>
    
    <script src="../assets/shared/console-filter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <link rel="stylesheet" href="../assets/shared/shared.css">
    <script src="../assets/shared/shared.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--app-bg); color: var(--text-light); margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--app-bg); overflow: hidden; }
        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        .btn-action { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
        .btn-action:hover { background-color: #ffd66b; transform: translateY(-2px); }
        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 14px 15px 14px 45px; border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s; }
        .search-box input:focus { border-color: var(--btn-yellow); }
        .search-icon { position: absolute; left: 15px; color: #888; pointer-events: none; display: flex; align-items: center; }
        .section-title { font-size: 16px; color: var(--btn-yellow); text-transform: uppercase; margin-top: 10px; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .tool-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        .tool-item { background-color: var(--card-bg); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--btn-yellow); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tool-item.returned { border-left-color: var(--btn-green); opacity: 0.7; }
        .tool-info { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .tool-name { font-size: 18px; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .tool-details { color: #aaa; font-size: 14px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-top: 5px;}
        .tool-details span { display: flex; align-items: center; gap: 5px; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .status-badge.out { background: rgba(252, 202, 70, 0.2); color: var(--btn-yellow); border: 1px solid rgba(252, 202, 70, 0.5); }
        .status-badge.in { background: rgba(40, 167, 69, 0.2); color: var(--btn-green); border: 1px solid rgba(40, 167, 69, 0.5); }
        .tool-actions { display: flex; gap: 10px; margin-left: 20px; flex-wrap: wrap;}
        .btn-return { background: var(--btn-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; display:flex; align-items:center; gap:6px;}
        .btn-return:hover { background: #218838; }
        .btn-transfer { background: var(--btn-blue); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; display:flex; align-items:center; gap:6px;}
        .btn-transfer:hover { background: #2980b9; }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: var(--btn-red); border: 1px solid transparent; width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;}
        .btn-delete:hover { background: var(--btn-red); color: white; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .modal-card-basic { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-actions { display: flex; justify-content: center; gap: 10px; margin-top: 20px;}
        .btn-modal-gray { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight:bold; }
        .btn-modal-yellow { background: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight:bold; }
        .btn-modal-green { background: var(--btn-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight:bold; }
        .btn-modal-red { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight:bold; }
        .custom-form-card { background: #252631; width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; border: 1px solid #444; max-height: 90vh; overflow-y: auto; }
        .modal-header-custom { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; color: white; font-size: 22px; font-weight: bold; }
        .modal-header-custom svg { width: 35px; height: 35px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .custom-group { margin-bottom: 22px; text-align: left; }
        .custom-group label { display: block; color: white; margin-bottom: 7px; font-size: 15px; font-weight: bold;}
        .custom-group input, .custom-group select { width: 100%; padding: 12px 15px; background: #323443; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; outline: none; }
        .custom-group input:focus, .custom-group select:focus { border-color: var(--btn-yellow); }
        .custom-group select { appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto; padding-right: 40px; }
        .btn-custom-submit { background-color: var(--btn-yellow); color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-custom-submit:hover { background-color: #ffd66b; }
        .btn-close-modal { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #888; font-size: 30px; cursor: pointer; }
        .btn-close-modal:hover { color: white; }
        option:disabled { color: #ff4d4d; font-style: italic; }

        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .dash-header .btn-action { width: 100%; justify-content: center; }
            .toolbar { flex-direction: column; width: 100%; }
            .search-box { width: 100%; }
            .tool-item { flex-direction: column; align-items: flex-start; gap: 15px; padding: 15px; }
            .tool-actions { align-self: stretch; margin-left: 0; display: flex; width: 100%; gap: 10px; }
            .btn-return, .btn-transfer { flex: 1; text-align: center; justify-content:center;}
            .custom-form-card { width: 95%; padding: 20px; border-radius: 20px; }
        }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; inset: 0; background: #1e1f26; z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement du module...</div>
</div>

<svg style="display: none;">
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    <symbol id="icon-map-pin" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></symbol>
    <symbol id="icon-tool" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></symbol>
    <symbol id="icon-transfer" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></symbol>
</svg>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Outils</h1>
                <p>Registre d'emprunt du matériel</p>
            </div>
            <button class="btn-action" onclick="openBorrowModal()">
                <svg class="svg-icon"><use href="#icon-plus"></use></svg> Emprunter un outil
            </button>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon"><svg class="svg-icon"><use href="#icon-search"></use></svg></span>
                <input type="text" id="toolSearch" placeholder="Rechercher (Plombier, Outil, Adresse...)" onkeyup="filterTools()">
            </div>
        </div>

        <div class="section-title">En cours d'utilisation</div>
        <div class="tool-list" id="activeListContainer"></div>

        <div class="section-title" style="margin-top: 20px; color:#888;">Historique des retours</div>
        <div class="tool-list" id="historyListContainer"></div>
    </div>
</div>

<!-- MODAL EMPRUNT -->
<div class="modal-overlay" id="borrowModal">
    <div class="custom-form-card">
        <button class="btn-close-modal" onclick="closeModal('borrowModal')">×</button>
        <div class="modal-header-custom" style="color:var(--btn-yellow);">
            <svg viewBox="0 0 24 24"><use href="#icon-tool"></use></svg>
            Outil emprunté
        </div>
        <div class="custom-group">
            <label>Nom du plombier</label>
            <input type="text" id="inpPlombier" placeholder="Ex: François">
        </div>
        <div class="custom-group">
            <label>Outil</label>
            <select id="inpOutil" onchange="toggleOutilAutre()">
                <option value="" disabled selected hidden>Sélectionner une machine...</option>
                <option value="Autre...">Autre (Préciser en note)</option>
            </select>
        </div>
        <!-- Champ qui apparaît seulement si "Autre..." est sélectionné -->
        <div class="custom-group" id="grpOutilAutre" style="display:none;">
            <label>Préciser l'outil <span style="color:var(--btn-red);">*</span></label>
            <input type="text" id="inpOutilAutre" placeholder="Ex: Perceuse, Caméra d'inspection..." />
        </div>
        <div class="custom-group">
            <label>Adresse / Lieu</label>
            <input type="text" id="inpAdresse" placeholder="Ex: Camion #4">
        </div>
        <div class="custom-group">
            <label>Date</label>
            <input type="date" id="inpDate" style="width: fit-content; min-width: 160px;">
        </div>
        <button class="btn-custom-submit" onclick="saveBorrow()">Emprunter l'outil</button>
    </div>
</div>

<!-- MODAL TRANSFERT -->
<div class="modal-overlay" id="transferModal">
    <div class="custom-form-card">
        <button class="btn-close-modal" onclick="closeModal('transferModal')">×</button>
        <div class="modal-header-custom" style="color:var(--btn-blue);">
            <svg viewBox="0 0 24 24"><use href="#icon-transfer"></use></svg>
            Transférer l'outil
        </div>
        <div class="custom-group">
            <label style="color:#aaa;">Outil sélectionné : <br><span id="transferToolName" style="color:white; font-size:18px;"></span></label>
        </div>
        <div class="custom-group">
            <label>Nouveau responsable (Plombier)</label>
            <select id="inpTransferTo">
                <option value="" disabled selected hidden>Chargement de l'équipe...</option>
            </select>
        </div>
        <button class="btn-custom-submit" style="background:var(--btn-blue); color:white;" onclick="executeTransfer()">Confirmer le transfert</button>
    </div>
</div>

<!-- Modal de réception : un transfert a été initié, le destinataire confirme et met à jour le lieu -->
<div class="modal-overlay" id="receiveTransferModal">
    <div class="custom-form-card">
        <div class="modal-header-custom" style="color:var(--btn-blue);">
            <svg viewBox="0 0 24 24"><use href="#icon-transfer"></use></svg>
            Transfert d'outil reçu
        </div>
        <div class="custom-group">
            <label style="color:#aaa;">
                <span id="receiveTransferFrom" style="color:var(--btn-yellow); font-weight:bold;">Quelqu'un</span>
                souhaite vous transférer :
            </label>
            <div id="receiveTransferToolName" style="color:white; font-size:18px; font-weight:bold; margin-top:8px;"></div>
        </div>
        <div class="custom-group">
            <label style="color:#aaa;">Lieu actuel : <span id="receiveTransferOldLocation" style="color:white;"></span></label>
        </div>
        <div class="custom-group">
            <label>Nouveau lieu de l'outil <span style="color:var(--btn-red);">*</span></label>
            <input type="text" id="inpReceiveNewLocation" placeholder="Ex: Camion, Atelier, Adresse du chantier..." />
        </div>
        <div class="modal-actions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-modal-gray" style="flex:1;" onclick="refuseTransfer()">Refuser</button>
            <button class="btn-modal-green" style="flex:1; background:var(--btn-green); color:white; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; border:none;" onclick="acceptTransfer()">Accepter</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="alertModal">
    <div class="modal-card-basic">
        <div style="font-size: 20px; color: var(--btn-yellow); font-weight:bold; margin-bottom: 15px;">Information</div>
        <div style="color: #e0e0e0; margin-bottom: 25px; line-height: 1.4;" id="alertMsg">...</div>
        <div class="modal-actions"><button class="btn-modal-yellow" style="width: 100%" onclick="closeAlertModal()">Compris</button></div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-card-basic">
        <div style="font-size: 20px; font-weight:bold; margin-bottom: 15px;" id="confirmTitle">Action</div>
        <div style="color: #e0e0e0; margin-bottom: 25px;" id="confirmMsg">Êtes-vous sûr ?</div>
        <div class="modal-actions">
            <button class="btn-modal-gray" onclick="closeConfirmModal()">Annuler</button>
            <button id="confirmActionBtn" class="btn-modal-red">Confirmer</button>
        </div>
    </div>
</div>

<script>
    let myRole = 'A3';
    let myUserName = 'Employé';
    let toolsLog = [];
    let toolsPage = 0; const TOOLS_PAGE_SIZE = 25; let toolsHasMore = false;
    let teamMembers = [];
    let itemToProcess = null;
    let actionType = null;

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'view_admin'] },
        'A2': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools'] },
        'A3': { perms: ['transfer_tools'] }
    };

    let _cachedRoles = null;

    async function loadRolesCache() {
        if (_cachedRoles) return;
        try {
            const { data } = await supabaseClient
                .from('parametres_globaux')
                .select('valeur')
                .eq('cle', 'roles_config')
                .maybeSingle();
            _cachedRoles = data?.valeur ? JSON.parse(data.valeur) : defaultRolesConfig;
        } catch(e) { _cachedRoles = defaultRolesConfig; }
    }

    function hasPermission(role, permId) {
        if (role === 'A0') return true;
        const roles = _cachedRoles || defaultRolesConfig;
        const roleData = roles[role] || defaultRolesConfig[role];
        if (!roleData || !roleData.perms) return false;
        return roleData.perms.includes(permId);
    }

    // =============================================
    // INIT
    // =============================================
    async function initAuth() {
        await loadRolesCache();
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.top.location.href = '../login.html'; return; }

        const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).maybeSingle();
        if (profil) {
            myRole = profil.role;
            myUserName = profil.prenom_nom || user.email.split('@')[0];
        }

        await fetchTeamMembers();
        await loadTools();

        // Vérifier s'il y a des transferts en attente pour cet utilisateur
        await checkPendingTransfers();

        document.getElementById('security-loader').style.display = 'none';
        window.parent.postMessage({ type: 'module_ready', module: 'view-outils' }, '*');
    }

    // =============================================
    // SYSTÈME DE TRANSFERT AVEC CONFIRMATION
    // =============================================
    let pendingTransfersQueue = []; // Liste des transferts à valider, traités un par un
    let currentPendingTransfer = null;

    // Au démarrage : on cherche les outils qui m'ont été proposés en transfert
    async function checkPendingTransfers() {
        const { data, error } = await supabaseClient
            .from('outils')
            .select('id, nom, assignee_nom, notes, pending_transfer_to, pending_transfer_at')
            .eq('pending_transfer_to', myUserName)
            .eq('status', 'active');

        if (error) { console.error('Erreur check transferts:', error); return; }
        if (!data || data.length === 0) return;

        pendingTransfersQueue = data;
        showNextPendingTransfer();
    }

    // Affiche le prochain transfert en attente dans le modal
    function showNextPendingTransfer() {
        if (pendingTransfersQueue.length === 0) {
            currentPendingTransfer = null;
            return;
        }
        currentPendingTransfer = pendingTransfersQueue.shift();
        document.getElementById('receiveTransferFrom').textContent = currentPendingTransfer.assignee_nom || 'Quelqu\'un';
        document.getElementById('receiveTransferToolName').textContent = currentPendingTransfer.nom || '-';
        document.getElementById('receiveTransferOldLocation').textContent = currentPendingTransfer.notes || '-';
        document.getElementById('inpReceiveNewLocation').value = '';
        document.getElementById('receiveTransferModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    // Le destinataire accepte : l'outil change de propriétaire ET de lieu
    async function acceptTransfer() {
        if (!currentPendingTransfer) return;
        const newLocation = document.getElementById('inpReceiveNewLocation').value.trim();
        if (!newLocation) {
            showAlert("Veuillez indiquer le nouveau lieu de l'outil avant d'accepter.");
            return;
        }

        const { error } = await supabaseClient
            .from('outils')
            .update({
                assignee_nom: myUserName,
                notes: newLocation,
                pending_transfer_to: null,
                pending_transfer_at: null
            })
            .eq('id', currentPendingTransfer.id);

        if (error) { showAlert('Erreur : ' + error.message); return; }

        const fromName = currentPendingTransfer.assignee_nom;
        const toolName = currentPendingTransfer.nom;
        document.getElementById('receiveTransferModal').style.display = 'none';
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');

        await loadTools();
        showAlert(`Transfert accepté. L'outil "${toolName}" vous a été transmis par ${fromName}.`);

        // Traiter le prochain transfert s'il y en a un
        setTimeout(showNextPendingTransfer, 500);
    }

    // Le destinataire refuse : on annule juste la demande, l'outil reste à l'expéditeur
    async function refuseTransfer() {
        if (!currentPendingTransfer) return;

        const { error } = await supabaseClient
            .from('outils')
            .update({
                pending_transfer_to: null,
                pending_transfer_at: null
            })
            .eq('id', currentPendingTransfer.id);

        if (error) { showAlert('Erreur : ' + error.message); return; }

        const fromName = currentPendingTransfer.assignee_nom;
        const toolName = currentPendingTransfer.nom;
        document.getElementById('receiveTransferModal').style.display = 'none';
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');

        await loadTools();
        showAlert(`Transfert refusé. L'outil "${toolName}" reste assigné à ${fromName}.`);

        // Traiter le prochain transfert s'il y en a un
        setTimeout(showNextPendingTransfer, 500);
    }

    async function fetchTeamMembers() {
        const { data } = await supabaseClient.from('profils').select('prenom_nom, role').order('role');
        if (data) teamMembers = data;
    }

    // =============================================
    // CHARGEMENT depuis Supabase
    // =============================================
    async function loadTools(reset = true) {
        if (reset) { toolsPage = 0; toolsLog = []; }

        const from = toolsPage * TOOLS_PAGE_SIZE;
        const to = from + TOOLS_PAGE_SIZE - 1;

        const { data, error } = await supabaseClient
            .from('outils')
            .select('*')
            .order('created_at', { ascending: false })
            .range(from, to + 1);

        if (error) { console.error('Erreur chargement outils:', error); return; }

        // === MIGRATION AUTO : outils "orphelins" ===
        // Un outil avec status='active' mais sans assignee_nom est forcément
        // un outil de l'inventaire mal créé (avant le fix admin → status='available').
        // On le migre automatiquement vers 'available' pour qu'il disparaisse de
        // la liste "EN COURS D'UTILISATION" et apparaisse correctement dans le dropdown.
        if (reset && data && data.length > 0) {
            const orphans = data.filter(t =>
                t.status === 'active' &&
                (!t.assignee_nom || !t.assignee_nom.trim()) &&
                !t.date_transfert
            );
            if (orphans.length > 0) {
                console.info(`[Outils] Migration de ${orphans.length} outil(s) orphelin(s) vers 'available'.`);
                const ids = orphans.map(o => o.id);
                const { error: migrateError } = await supabaseClient
                    .from('outils')
                    .update({ status: 'available' })
                    .in('id', ids);
                if (migrateError) {
                    console.warn('[Outils] Migration échouée :', migrateError.message);
                } else {
                    // Mettre à jour les données en mémoire pour éviter un re-fetch
                    data.forEach(t => { if (ids.includes(t.id)) t.status = 'available'; });
                }
            }
        }

        toolsHasMore = (data || []).length > TOOLS_PAGE_SIZE;
        const pageData = (data || []).slice(0, TOOLS_PAGE_SIZE);
        toolsLog = reset ? pageData : [...toolsLog, ...pageData];
        renderTools();
    }

    async function chargerPlusOutils() {
        const btn = document.getElementById('btn-charger-plus-outils');
        if (btn) { btn.disabled = true; btn.textContent = 'Chargement...'; }
        toolsPage++;
        await loadTools(false);
    }

    // =============================================
    // EMPRUNT — Sauvegarde dans Supabase
    // =============================================
    async function saveBorrow() {
        const plumber = document.getElementById('inpPlombier').value.trim();
        const toolSelected = document.getElementById('inpOutil').value;
        const address = document.getElementById('inpAdresse').value.trim();
        const dateOut = document.getElementById('inpDate').value;

        if (!plumber || !toolSelected || !address || !dateOut) return showAlert("Merci de remplir tous les champs.");

        // Si "Autre..." est choisi, prendre le nom personnalisé saisi par l'utilisateur
        let tool = toolSelected;
        if (toolSelected === "Autre...") {
            const customName = document.getElementById('inpOutilAutre').value.trim();
            if (!customName) return showAlert("Veuillez préciser le nom de l'outil.");
            tool = customName;
        }

        const activeTools = toolsLog.filter(t => t.status === 'active').map(t => t.nom);
        if (toolSelected !== "Autre..." && activeTools.includes(tool)) {
            return showAlert("Cet outil est déjà emprunté et n'a pas encore été retourné.");
        }

        const { error } = await supabaseClient.from('outils').insert([{
            nom: tool,
            assignee_nom: plumber,
            notes: address,
            date_transfert: dateOut,
            status: 'active'
        }]);

        if (error) { showAlert('Erreur : ' + error.message); return; }
        await loadTools();
        closeModal('borrowModal');
    }

    // Affiche/cache le champ "Préciser l'outil" selon le choix dans le dropdown
    function toggleOutilAutre() {
        const sel = document.getElementById('inpOutil');
        const grp = document.getElementById('grpOutilAutre');
        const inp = document.getElementById('inpOutilAutre');
        if (!sel || !grp) return;
        if (sel.value === "Autre...") {
            grp.style.display = '';
            if (inp) { inp.focus(); }
        } else {
            grp.style.display = 'none';
            if (inp) inp.value = '';
        }
    }

    // =============================================
    // RETOUR — Mise à jour dans Supabase
    // =============================================
    async function confirmReturn() {
        const today = new Date().toISOString().split('T')[0];
        const { error } = await supabaseClient
            .from('outils')
            .update({ status: 'returned', notes: toolsLog.find(t => t.id === itemToProcess)?.notes + ' | Retourné: ' + today })
            .eq('id', itemToProcess);

        if (error) { showAlert('Erreur : ' + error.message); return; }
        await loadTools();
        closeConfirmModal();
    }

    // =============================================
    // SUPPRESSION dans Supabase
    // =============================================
    async function confirmDelete() {
        const { error } = await supabaseClient.from('outils').delete().eq('id', itemToProcess);
        if (error) { showAlert('Erreur : ' + error.message); return; }
        await loadTools();
        closeConfirmModal();
    }

    // L'expéditeur peut annuler sa demande de transfert avant que le destinataire confirme
    async function cancelPendingTransfer(toolId) {
        const t = toolsLog.find(x => x.id === toolId);
        if (!t || !t.pending_transfer_to) return;

        const { error } = await supabaseClient
            .from('outils')
            .update({
                pending_transfer_to: null,
                pending_transfer_at: null
            })
            .eq('id', toolId);

        if (error) { showAlert('Erreur : ' + error.message); return; }
        await loadTools();
        showAlert(`Demande de transfert à ${t.pending_transfer_to} annulée.`);
    }

    // =============================================
    // TRANSFERT dans Supabase (avec confirmation du destinataire)
    // =============================================
    // Le transfert n'est PAS immédiat : il est mis en attente jusqu'à ce que
    // le destinataire confirme et indique le nouveau lieu de l'outil.
    // Tant qu'il n'a pas confirmé, l'outil reste assigné à l'employé d'origine.
    async function executeTransfer() {
        const newPlumber = document.getElementById('inpTransferTo').value;
        if (!newPlumber) return showAlert("Veuillez sélectionner un employé.");

        const { error } = await supabaseClient
            .from('outils')
            .update({
                pending_transfer_to: newPlumber,
                pending_transfer_at: new Date().toISOString()
            })
            .eq('id', itemToProcess);

        if (error) { showAlert('Erreur : ' + error.message); return; }
        await loadTools();
        closeModal('transferModal');
        showAlert(`Demande de transfert envoyée à ${newPlumber}. L'outil restera à votre nom tant qu'il n'aura pas confirmé.`);
    }

    // =============================================
    // AFFICHAGE
    // =============================================
    function formatDateFR(isoDate) {
        if (!isoDate) return '';
        const parts = isoDate.split('-');
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function renderTools(list = toolsLog) {
        const activeContainer = document.getElementById('activeListContainer');
        const historyContainer = document.getElementById('historyListContainer');
        activeContainer.innerHTML = '';
        historyContainer.innerHTML = '';

        const canManage = hasPermission(myRole, 'manage_tools');
        let hasActive = false, hasHistory = false;

        list.forEach(t => {
            // Les outils avec status 'available' sont dans l'inventaire (ajoutés par
            // l'admin) mais pas encore empruntés. On ne les affiche ni dans "En cours
            // d'utilisation" ni dans "Historique" — ils sont juste là pour peupler
            // la liste déroulante du formulaire d'emprunt.
            if (t.status === 'available') return;

            const card = document.createElement('div');
            card.className = `tool-item ${t.status === 'returned' ? 'returned' : ''}`;

            let badge = t.status === 'active'
                ? `<span class="status-badge out">En cours</span>`
                : `<span class="status-badge in">Retourné</span>`;

            // Badge supplémentaire : transfert en attente
            const hasPendingTransfer = !!t.pending_transfer_to;
            if (hasPendingTransfer) {
                badge += ` <span class="status-badge" style="background: rgba(91, 192, 235, 0.15); color: var(--btn-blue); border: 1px solid rgba(91, 192, 235, 0.4);">↗ Transfert en attente : ${t.pending_transfer_to}</span>`;
            }

            let actionsHTML = '';
            if (t.status === 'active') {
                // STRICT : seul l'emprunteur peut marquer un retour ou transférer.
                // Si l'employé est absent, l'outil doit être récupéré physiquement
                // chez lui de toute façon, donc le bureau ne peut pas faire le retour
                // à distance — c'est l'employé qui doit le faire à son retour.
                const isMyTool = (t.assignee_nom || '').trim() === (myUserName || '').trim();
                if (isMyTool) {
                    if (hasPendingTransfer) {
                        // Si un transfert est déjà en attente, on propose juste de l'annuler
                        actionsHTML += `<button class="btn-transfer" style="background:#888;" onclick="cancelPendingTransfer('${t.id}')"><svg class="svg-icon"><use href="#icon-trash"></use></svg> Annuler la demande</button>`;
                    } else {
                        actionsHTML += `<button class="btn-return" onclick="askReturn('${t.id}')"><svg class="svg-icon"><use href="#icon-check"></use></svg> Marquer retourné</button>`;
                        actionsHTML += `<button class="btn-transfer" onclick="openTransferModal('${t.id}')"><svg class="svg-icon"><use href="#icon-transfer"></use></svg> Transférer</button>`;
                    }
                }
                if (canManage) actionsHTML += `<button class="btn-delete" onclick="askDelete('${t.id}')"><svg class="svg-icon"><use href="#icon-trash"></use></svg></button>`;
            } else {
                if (canManage) actionsHTML = `<button class="btn-delete" onclick="askDelete('${t.id}')"><svg class="svg-icon"><use href="#icon-trash"></use></svg></button>`;
            }

            card.innerHTML = `
                <div class="tool-info">
                    <div class="tool-name"><svg class="svg-icon"><use href="#icon-tool"></use></svg> ${t.nom} ${badge}</div>
                    <div class="tool-details">
                        <span><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-user"></use></svg> <strong>${t.assignee_nom || '-'}</strong></span>
                        <span><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-map-pin"></use></svg> ${t.notes || '-'}</span>
                        <span><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-calendar"></use></svg> Emprunté le ${formatDateFR(t.date_transfert)}</span>
                    </div>
                </div>
                <div class="tool-actions">${actionsHTML}</div>
            `;

            if (t.status === 'active') { activeContainer.appendChild(card); hasActive = true; }
            else { historyContainer.appendChild(card); hasHistory = true; }
        });

        if (!hasActive) activeContainer.innerHTML = '<div style="color:#888; font-style:italic; padding:10px;">Aucun outil actuellement en utilisation.</div>';
        if (!hasHistory) historyContainer.innerHTML = '<div style="color:#888; font-style:italic; padding:10px;">Aucun historique de retour.</div>';
        ajouterBoutonPlusOutils();
    }

    function ajouterBoutonPlusOutils() {
        const histContainer = document.getElementById('historyListContainer');
        const old = document.getElementById('btn-charger-plus-outils');
        if (old) old.remove();
        if (!toolsHasMore || !histContainer) return;
        const btn = document.createElement('button');
        btn.id = 'btn-charger-plus-outils';
        btn.textContent = `Charger ${TOOLS_PAGE_SIZE} entrées de plus...`;
        btn.style.cssText = 'width:100%; padding:14px; margin-top:10px; background:#2b2c36; color:#aaa; border:1px dashed #444; border-radius:10px; cursor:pointer; font-size:14px; font-weight:bold;';
        btn.onclick = chargerPlusOutils;
        histContainer.appendChild(btn);
    }

    function filterTools() {
        const term = document.getElementById('toolSearch').value.toLowerCase();
        const filtered = toolsLog.filter(t =>
            (t.assignee_nom || '').toLowerCase().includes(term) ||
            (t.nom || '').toLowerCase().includes(term) ||
            (t.notes || '').toLowerCase().includes(term)
        );
        renderTools(filtered);
    }

    async function updateToolDropdown() {
        const select = document.getElementById('inpOutil');
        if (!select) return;

        // Récupérer la liste unique des outils, triée par 'position' (ordre admin)
        // Un outil peut avoir plusieurs lignes (1 par emprunt) — on prend la position
        // la plus basse pour chaque nom unique.
        let toolNames = [];
        try {
            const { data, error } = await supabaseClient
                .from('outils')
                .select('nom, position')
                .order('position', { ascending: true, nullsFirst: false })
                .order('nom', { ascending: true });
            if (error) throw error;
            // Dédupliquer en gardant la première occurrence (= position la plus basse)
            const seen = new Set();
            const ordered = [];
            (data || []).forEach(t => {
                if (!t.nom) return;
                const key = t.nom.toLowerCase().trim();
                if (seen.has(key)) return;
                seen.add(key);
                ordered.push(t.nom);
            });
            toolNames = ordered;
        } catch (e) {
            console.warn('Erreur chargement liste outils:', e);
        }

        // Outils actuellement empruntés (non retournés) → griser
        const activeTools = toolsLog.filter(t => t.status === 'active').map(t => t.nom);

        // Reconstruire le select : placeholder + outils dynamiques + Autre
        let html = '<option value="" disabled selected hidden>Sélectionner une machine...</option>';
        toolNames.forEach(name => {
            const isActive = activeTools.includes(name);
            const safe = name.replace(/"/g, '&quot;');
            html += `<option value="${safe}"${isActive ? ' disabled' : ''}>${safe}${isActive ? ' — Indisponible' : ''}</option>`;
        });
        html += '<option value="Autre...">Autre (Préciser en note)</option>';
        select.innerHTML = html;
    }

    async function openBorrowModal() {
        await updateToolDropdown();
        document.getElementById('inpPlombier').value = myUserName;
        document.getElementById('inpOutil').value = '';
        document.getElementById('inpAdresse').value = '';
        document.getElementById('inpDate').value = new Date().toISOString().split('T')[0];
        // Reset du champ "Autre" et masquage
        const inpAutre = document.getElementById('inpOutilAutre');
        const grpAutre = document.getElementById('grpOutilAutre');
        if (inpAutre) inpAutre.value = '';
        if (grpAutre) grpAutre.style.display = 'none';
        document.getElementById('borrowModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function openTransferModal(toolId) {
        itemToProcess = toolId;
        const t = toolsLog.find(x => x.id === toolId);
        if (!t) return;

        // Sécurité : si un transfert est déjà en attente, on ne propose pas d'en créer un autre
        if (t.pending_transfer_to) {
            showAlert(`Un transfert vers ${t.pending_transfer_to} est déjà en attente. Annulez-le avant d'en créer un nouveau.`);
            return;
        }

        document.getElementById('transferToolName').textContent = t.nom;
        const sel = document.getElementById('inpTransferTo');
        sel.innerHTML = '<option value="" disabled selected hidden>Choisir un collègue...</option>';
        teamMembers.forEach(emp => {
            if (emp.prenom_nom && emp.prenom_nom !== t.assignee_nom) {
                sel.innerHTML += `<option value="${emp.prenom_nom}">${emp.prenom_nom}</option>`;
            }
        });

        document.getElementById('transferModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function askReturn(id) {
        itemToProcess = id; actionType = 'return';
        document.getElementById('confirmTitle').textContent = "Retour d'outil";
        document.getElementById('confirmTitle').style.color = "var(--btn-green)";
        document.getElementById('confirmMsg').textContent = "Confirmer que cet outil a été ramené ?";
        const btn = document.getElementById('confirmActionBtn');
        btn.textContent = "Oui, retourné"; btn.className = "btn-modal-green";
        document.getElementById('confirmModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function askDelete(id) {
        itemToProcess = id; actionType = 'delete';
        document.getElementById('confirmTitle').textContent = "Supprimer";
        document.getElementById('confirmTitle').style.color = "var(--btn-red)";
        document.getElementById('confirmMsg').textContent = "Effacer définitivement cet enregistrement ?";
        const btn = document.getElementById('confirmActionBtn');
        btn.textContent = "Supprimer"; btn.className = "btn-modal-red";
        document.getElementById('confirmModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    document.getElementById('confirmActionBtn').addEventListener('click', function() {
        if (!itemToProcess) return;
        if (actionType === 'return') confirmReturn();
        else if (actionType === 'delete') confirmDelete();
    });

    function showAlert(msg) { document.getElementById('alertMsg').textContent = msg; document.getElementById('alertModal').style.display = 'flex'; }
    function closeAlertModal() { document.getElementById('alertModal').style.display = 'none'; }
    function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; itemToProcess = null; window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*'); }

    initAuth();
</script>
