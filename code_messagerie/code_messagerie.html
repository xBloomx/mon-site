<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boîte Courriel - F.Dussault</title>
    
    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* =========================================
           1. VARIABLES & THEME
           ========================================= */
        :root { 
            --app-bg: #1e1f26;
            --text-light: #e0e0e0;
            --card-bg: #2b2c36;
            --btn-yellow: #fcca46; 
            --btn-red: #ff4d4d;
            --btn-green: #28a745;
            --btn-blue: #3498db;
            --border-color: #444;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--app-bg); 
            color: var(--text-light);
            margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden;
        }

        .svg-icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; display: inline-block; vertical-align: middle; flex-shrink: 0; }

        .main-content {
            flex: 1; display: flex; flex-direction: column; position: relative;
            background-color: var(--app-bg); overflow: hidden;
        }

        #view-dashboard { padding: 20px 30px; height: 100%; display: flex; flex-direction: column; gap: 15px; }

        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        
        .btn-compose { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-compose:hover { background-color: #ffd66b; transform: translateY(-2px); }

        /* =========================================
           2. STRUCTURE MESSAGERIE (GRILLE)
           ========================================= */
        .email-layout {
            display: flex; flex: 1; gap: 20px; overflow: hidden;
            background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* PANNEAU DOSSIERS (GAUCHE) */
        .email-folders {
            width: 220px; background: #22232c; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 20px 0;
        }
        .folder-item {
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            color: #aaa; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent;
        }
        .folder-item:hover { background: #2b2c36; color: white; }
        .folder-item.active { background: #2b2c36; color: var(--btn-yellow); border-left-color: var(--btn-yellow); font-weight: bold;}
        .folder-item-left { display: flex; align-items: center; gap: 12px; }
        .badge-unread { background: var(--btn-red); color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* LISTE DES COURRIELS (MILIEU) */
        .email-list-col {
            width: 350px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column;
            background: var(--card-bg);
        }
        .email-toolbar { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 10px 10px 10px 35px; border-radius: 8px; outline: none; }
        .search-box svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #888; }
        
        .email-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .email-item {
            padding: 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.2s;
            position: relative; border-left: 3px solid transparent;
        }
        .email-item:hover { background: #343542; }
        .email-item.active { background: #343542; border-left-color: var(--btn-blue); }
        .email-item.unread .email-subject { font-weight: bold; color: white; }
        .email-item.unread .email-sender { font-weight: bold; color: white; }
        .email-item.unread::after {
            content: ''; position: absolute; top: 18px; right: 15px;
            width: 8px; height: 8px; background: var(--btn-blue); border-radius: 50%;
        }

        .email-sender { font-size: 14px; color: #ccc; margin-bottom: 5px; padding-right: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-subject { font-size: 13px; color: #aaa; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-preview-text { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-date { font-size: 11px; color: #666; position: absolute; top: 15px; right: 15px; }

        /* LECTURE DU COURRIEL (DROITE) */
        .email-view-col {
            flex: 1; display: flex; flex-direction: column; background: var(--app-bg);
            position: relative;
        }
        .empty-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; }
        .empty-view svg { width: 60px; height: 60px; margin-bottom: 15px; opacity: 0.5; }

        .reading-pane { display: none; flex-direction: column; height: 100%; }
        .reading-toolbar { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; background: var(--card-bg); }
        .reading-actions { display: flex; gap: 10px; }
        .btn-tool { background: transparent; border: 1px solid #444; color: #aaa; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-tool:hover { background: #444; color: white; }
        
        .reading-header { padding: 25px 30px; border-bottom: 1px solid #333; }
        .reading-subject { font-size: 22px; color: white; margin: 0 0 15px 0; }
        .reading-meta { display: flex; justify-content: space-between; align-items: center; }
        .reading-sender-info { display: flex; align-items: center; gap: 12px; }
        .sender-avatar { width: 40px; height: 40px; background: var(--btn-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 16px;}
        .sender-name { color: white; font-weight: bold; font-size: 15px; }
        .sender-email { color: #888; font-size: 13px; }
        .reading-date { color: #888; font-size: 13px; }

        .reading-body { padding: 30px; flex: 1; overflow-y: auto; color: #ccc; line-height: 1.6; font-size: 15px; white-space: pre-wrap; }

        /* MODALE NOUVEAU MESSAGE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 5000; justify-content: center; align-items: center; }
        .compose-card { background: var(--card-bg); width: 90%; max-width: 600px; border-radius: 15px; border: 1px solid #555; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .compose-header { background: #22232c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .compose-header h3 { margin: 0; color: white; font-size: 16px; }
        .btn-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; line-height: 1; padding: 0; }
        
        .compose-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .compose-field { display: flex; border-bottom: 1px solid #444; padding-bottom: 10px; align-items: center;}
        .compose-field label { width: 60px; color: #aaa; font-size: 14px; }
        .compose-field input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 14px; }
        
        .compose-textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; min-height: 200px; resize: none; font-family: inherit; line-height: 1.5; margin-top: 10px;}
        
        .compose-footer { padding: 15px 20px; border-top: 1px solid #444; display: flex; justify-content: space-between; align-items: center; background: #22232c; }
        .btn-send { background: var(--btn-blue); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;}
        .btn-send:hover { background: #2980b9; }

        .btn-mobile-back { display: none; }

        /* =========================================
           4. ADAPTATION MOBILE
           ========================================= */
        @media (max-width: 900px) {
            .email-layout { flex-direction: column; gap: 0; }
            .email-folders { 
                width: 100%; flex-direction: row; padding: 15px; border-right: none; 
                border-bottom: 1px solid var(--border-color); background: var(--card-bg);
                overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 10px; scrollbar-width: none;
            }
            .email-folders::-webkit-scrollbar { display: none; } 
            .folder-item { padding: 8px 16px; border-left: none !important; background: #1e1f26; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
            .folder-item.active { background: var(--btn-yellow); color: black; }
            .folder-item:hover { background: #343542; }
            .folder-item.active:hover { background: #ffd66b; }
            .folder-item.active .badge-unread { background: black; color: var(--btn-yellow); }
            .show-reading .email-folders { display: none; }
            .email-list-col { width: 100%; border-right: none; flex: 1; }
            .email-view-col { display: none; position: absolute; top:0; left:0; width:100%; height:100%; z-index:10; }
            .show-reading .email-list-col { display: none; }
            .show-reading .email-view-col { display: flex; }
            .btn-mobile-back { display: flex; background: transparent; border: none; color: var(--btn-yellow); cursor: pointer; align-items: center; gap: 5px; font-weight: bold; padding: 0; margin-right: 15px;}
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-compose { width: 100%; justify-content: center; }
            .reading-toolbar { padding-right: 20px; }
        }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--app-bg); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease;">
    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement des courriels...</div>
</div>
<svg style="display: none;">
    <symbol id="icon-mail" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><polyline points="3 7 12 13 21 7"></polyline></symbol>
    <symbol id="icon-send" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></symbol>
</svg>

<div class="main-content">
    <div id="view-dashboard">
        
        <div class="dash-header">
            <div class="dash-title">
                <h1>Boîte Courriel</h1>
                <p>Messagerie interne (Connectée à Supabase)</p>
            </div>
            <button class="btn-compose" onclick="openComposeModal()">
                <svg class="svg-icon"><use href="#icon-edit"></use></svg> Rédiger un message
            </button>
        </div>

        <div class="email-layout" id="emailLayout">
            
            <div class="email-folders">
                <div class="folder-item active" onclick="switchFolder('inbox')">
                    <div class="folder-item-left"><svg class="svg-icon"><use href="#icon-mail"></use></svg> Boîte de réception</div>
                    <span class="badge-unread" id="unreadCount" style="display: none;">0</span>
                </div>
                <div class="folder-item" onclick="switchFolder('sent')">
                    <div class="folder-item-left"><svg class="svg-icon"><use href="#icon-send"></use></svg> Éléments envoyés</div>
                </div>
                <div class="folder-item" onclick="switchFolder('trash')">
                    <div class="folder-item-left"><svg class="svg-icon"><use href="#icon-trash"></use></svg> Corbeille</div>
                </div>
            </div>

            <div class="email-list-col">
                <div class="email-toolbar">
                    <div class="search-box">
                        <svg class="svg-icon"><use href="#icon-search"></use></svg>
                        <input type="text" id="emailSearch" placeholder="Rechercher..." onkeyup="filterEmails()">
                    </div>
                </div>
                <div class="email-list" id="emailList">
                    </div>
            </div>

            <div class="email-view-col">
                <div class="empty-view" id="emptyView">
                    <svg class="svg-icon"><use href="#icon-mail"></use></svg>
                    <p>Sélectionnez un message pour le lire</p>
                </div>
                
                <div class="reading-pane" id="readingPane">
                    <div class="reading-toolbar">
                        <button class="btn-mobile-back" onclick="closeReadingPane()">
                            <svg class="svg-icon"><use href="#icon-chevron-left"></use></svg> Retour
                        </button>
                        <div class="reading-actions" style="margin-left: auto;">
                            <button class="btn-tool" title="Répondre" onclick="replyEmail()"><svg class="svg-icon"><use href="#icon-edit"></use></svg></button>
                            <button class="btn-tool" title="Supprimer" onclick="deleteCurrentEmail()"><svg class="svg-icon"><use href="#icon-trash"></use></svg></button>
                        </div>
                    </div>
                    
                    <div class="reading-header">
                        <h2 class="reading-subject" id="readSubject">Sujet</h2>
                        <div class="reading-meta">
                            <div class="reading-sender-info">
                                <div class="sender-avatar" id="readAvatar">?</div>
                                <div>
                                    <div class="sender-name" id="readSender">Nom</div>
                                    <div class="sender-email" id="readEmailAddress">email</div>
                                </div>
                            </div>
                            <div class="reading-date" id="readDate">Date</div>
                        </div>
                    </div>
                    
                    <div class="reading-body" id="readBody">
                        Contenu...
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal-overlay" id="composeModal">
    <div class="compose-card">
        <div class="compose-header">
            <h3>Nouveau message</h3>
            <button class="btn-close" onclick="closeComposeModal()">&times;</button>
        </div>
        <div class="compose-body">
            <div class="compose-field">
                <label>À :</label>
                <input type="email" id="composeTo" placeholder="adresse@exemple.com">
            </div>
            <div class="compose-field">
                <label>Sujet :</label>
                <input type="text" id="composeSubject" placeholder="Objet du message">
            </div>
            <textarea class="compose-textarea" id="composeBody" placeholder="Écrivez votre message ici..."></textarea>
        </div>
        <div class="compose-footer">
            <button class="btn-tool" style="border:none;" onclick="alert('Fonction joindre bientôt disponible')"><svg class="svg-icon"><use href="#icon-paperclip"></use></svg></button>
            <button class="btn-send" onclick="sendEmail()">
                Envoyer <svg class="svg-icon"><use href="#icon-send"></use></svg>
            </button>
        </div>
    </div>
</div>

<script>
    // --- ÉLÉMENTS DU DOM ---
    const dashboard = document.getElementById('view-dashboard');
    const contactListContainer = document.getElementById('contactListContainer');
    const messagesContainer = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const attachBtn = document.getElementById('attachBtn');
    const attachMenu = document.getElementById('attachMenu');
    const attachmentPreview = document.getElementById('attachmentPreview');
    const reactionPicker = document.getElementById('reactionPicker');

    // --- VARIABLES GLOBALES ---
    let selectedFiles = [];
    let currentChatId = null;
    let currentReactMsgId = null; 
    let currentChatIdToDelete = null;
    let isCustomizing = false;
    let selectedCustomizeIndex = 0;
    let allEmployees = []; 

    let quickReactions = JSON.parse(localStorage.getItem('dussault_quick_reacts')) || ['❤️', '👍', '😂', '😮', '😢', '🙏'];

    const conversationsData = {
        'global': { name: 'Équipe (Général)', status: '🟢 Connecté', isGroup: true, messages: [] }
    };

    // --- CONFIGURATION SUPABASE ---
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myUserId = 'local-user';
    let myUserName = 'Moi';

    // 1. INITIALISATION
    async function initAuth() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.top.location.href = '../login.html'; return; }

            myUserId = user.id;
            const { data: profil } = await supabaseClient.from('profils').select('prenom_nom').eq('id', user.id).maybeSingle();
            if (profil && profil.prenom_nom) { myUserName = profil.prenom_nom; } else { myUserName = user.email.split('@')[0]; }
            
            await chargerProfilsEmployes();
            
        } catch (error) { console.error("Erreur d'initialisation :", error);
        } finally {
            const loader = document.getElementById('security-loader');
            if (loader) loader.style.display = 'none';
            initApp();
            window.parent.postMessage({ type: 'module_ready', module: 'view-messagerie' }, '*');
        }
    }

    async function chargerProfilsEmployes() {
        const { data, error } = await supabaseClient.from('profils').select('id, prenom_nom');
        if (data && !error) {
            allEmployees = data
                .filter(p => p.id !== myUserId)
                .map(p => {
                    let nomComplet = p.prenom_nom || 'Utilisateur';
                    let parts = nomComplet.split(' ');
                    let initials = parts[0][0] + (parts.length > 1 ? parts[1][0] : '');
                    return { id: p.id, name: nomComplet, initials: initials.toUpperCase() };
                });
        }
    }

    function initApp() {
        renderQuickReactions();
        renderContactList();
        chargerMessagesSupabase();

        const emojiPicker = document.getElementById('myEmojiPicker');
        if (emojiPicker) {
            emojiPicker.addEventListener('emoji-click', event => {
                const emoji = event.detail.unicode;
                if (isCustomizing) { quickReactions[selectedCustomizeIndex] = emoji; selectedCustomizeIndex = (selectedCustomizeIndex + 1) % quickReactions.length; renderTopQuickReactions();
                } else { selectReaction(emoji); closeModal('fullPickerModal'); }
            });
        }
    }

    function decoderMessage(contenuBrut) {
        if (!contenuBrut) return { type: 'text', text: '', url: '', fileName: '', fileSize: '' };
        if (contenuBrut.startsWith('IMG|||')) { const parts = contenuBrut.split('|||'); return { type: 'image', text: '', url: parts[1], fileName: '', fileSize: '' }; } 
        else if (contenuBrut.startsWith('FILE|||')) { const parts = contenuBrut.split('|||'); return { type: 'file', text: '', url: parts[1], fileName: parts[2], fileSize: parts[3] }; } 
        else { return { type: 'text', text: contenuBrut, url: '', fileName: '', fileSize: '' }; }
    }

    // 3. LECTURE DE L'HISTORIQUE TRIÉ PAR CHAT_ID
    async function chargerMessagesSupabase() {
        const { data, error } = await supabaseClient
            .from('message')
            .select('id, created_at, contenu, expediteur_id, chat_id, profils(prenom_nom)')
            .order('created_at', { ascending: true });

        if (error) { 
            console.error("Erreur Supabase:", error); 
            alert("🚨 Erreur de chargement de la base de données : " + error.message);
            return; 
        }

        Object.values(conversationsData).forEach(c => c.messages = []);

        data.forEach(msgDB => {
            const date = new Date(msgDB.created_at);
            const timeStr = date.getHours() + ':' + String(date.getMinutes()).padStart(2, '0');
            const isMine = msgDB.expediteur_id === myUserId;
            const senderName = msgDB.profils ? msgDB.profils.prenom_nom : 'Inconnu';
            const decodage = decoderMessage(msgDB.contenu);
            
            const cId = msgDB.chat_id || 'global';

            if (!conversationsData[cId]) {
                let nomChat = "Conversation";
                if (cId !== 'global') {
                    // Trouver le VRAI nom de l'autre personne
                    const uuids = cId.split('_');
                    const otherId = uuids[0] === myUserId ? uuids[1] : uuids[0];
                    const otherEmp = allEmployees.find(e => e.id === otherId);
                    nomChat = otherEmp ? otherEmp.name : (isMine ? "Conversation Privée" : senderName);
                }
                conversationsData[cId] = { name: nomChat, status: '🟢 Connecté', isGroup: cId === 'global', messages: [] };
            }

            conversationsData[cId].messages.push({
                id: msgDB.id, sender: senderName, time: timeStr, isMine: isMine, reaction: null,
                type: decodage.type, text: decodage.text, url: decodage.url, fileName: decodage.fileName, fileSize: decodage.fileSize
            });
        });

        if (currentChatId && conversationsData[currentChatId]) { renderMessages(conversationsData[currentChatId].messages, true); }
        renderContactList();
        ecouterNouveauxMessages();
    }

    // 4. LE TEMPS RÉEL (REALTIME)
    function ecouterNouveauxMessages() {
        supabaseClient
            .channel('messagerie-globale')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message' }, async (payload) => {
                const newMsg = payload.new;
                if (newMsg.expediteur_id === myUserId) return; 

                const { data: profil } = await supabaseClient.from('profils').select('prenom_nom').eq('id', newMsg.expediteur_id).maybeSingle();
                const senderName = profil ? profil.prenom_nom : 'Inconnu';

                const date = new Date(newMsg.created_at);
                const timeStr = date.getHours() + ':' + String(date.getMinutes()).padStart(2, '0');
                const decodage = decoderMessage(newMsg.contenu);
                
                const cId = newMsg.chat_id || 'global';
                
                if (!conversationsData[cId]) {
                    conversationsData[cId] = { name: senderName, status: '🟢 Connecté', isGroup: false, messages: [] };
                }

                conversationsData[cId].messages.push({
                    id: newMsg.id, sender: senderName, time: timeStr, isMine: false, reaction: null,
                    type: decodage.type, text: decodage.text, url: decodage.url, fileName: decodage.fileName, fileSize: decodage.fileSize
                });

                if (currentChatId === cId) { renderMessages(conversationsData[cId].messages, true); }
                renderContactList();
            })
            .subscribe();
    }

    // 5. ENVOI DES MESSAGES (AVEC ALERTE D'ERREUR)
    async function sendMessage() {
        if(!messageInput) return;
        const text = messageInput.value.trim();
        const hasFiles = selectedFiles.length > 0;

        if ((!text && !hasFiles) || !currentChatId) return;

        const activeChat = conversationsData[currentChatId];
        const now = new Date();
        const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

        // -- Envoi des fichiers d'abord --
        if (hasFiles) {
            const fichiersAEnvoyer = [...selectedFiles];
            selectedFiles = []; renderPreviews();

            for (let i = 0; i < fichiersAEnvoyer.length; i++) {
                const file = fichiersAEnvoyer[i];
                const fileExt = file.name.split('.').pop();
                const uniqueName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                const filePath = `${myUserId}/${uniqueName}`;

                const { error: uploadError } = await supabaseClient.storage.from('pieces_jointes').upload(filePath, file);
                if (uploadError) { console.error(uploadError); showAlert("Erreur d'envoi de la pièce jointe."); continue; }

                const { data: { publicUrl } } = supabaseClient.storage.from('pieces_jointes').getPublicUrl(filePath);

                const isImg = file.type.startsWith('image/');
                let contenuFormatte = "";
                let fileSizeTxt = Math.round(file.size / 1024) + ' KB';
                if (isImg) { contenuFormatte = `IMG|||${publicUrl}`; } else { contenuFormatte = `FILE|||${publicUrl}|||${file.name}|||${fileSizeTxt}`; }

                activeChat.messages.push({ 
                    id: Date.now(), sender: myUserName, time: timeStr, isMine: true, reaction: null,
                    type: isImg ? 'image' : 'file', text: '', url: publicUrl, fileName: file.name, fileSize: fileSizeTxt 
                });
                renderMessages(activeChat.messages, true);

                const { error: dbError } = await supabaseClient.from('message').insert([{ contenu: contenuFormatte, expediteur_id: myUserId, chat_id: currentChatId }]);
                if (dbError) { alert("🚨 Le fichier n'a pas été sauvegardé. Erreur : " + dbError.message); }
            }
        }

        // -- Envoi du texte --
        if (text) {
            activeChat.messages.push({ id: Date.now(), sender: myUserName, text: text, time: timeStr, isMine: true, type: 'text', reaction: null });
            messageInput.value = '';
            renderMessages(activeChat.messages, true);
            
            // LA VÉRIFICATION CRUCIALE EST ICI
            const { error: txtError } = await supabaseClient.from('message').insert([{ contenu: text, expediteur_id: myUserId, chat_id: currentChatId }]);
            if (txtError) {
                console.error("Erreur Supabase:", txtError);
                alert("🚨 Le message texte n'a pas pu être envoyé à Supabase ! Erreur détaillée : " + txtError.message);
            }
        }
        renderContactList();
    }

    // --- CREATION DE NOUVEAUX CHATS ---
    function openNewChatModal() {
        const list = document.getElementById('newChatUserList');
        list.innerHTML = '';
        allEmployees.forEach(emp => {
            list.innerHTML += `
                <label class="user-select-row" id="row-${emp.id}">
                    <input type="checkbox" class="new-chat-cb" value="${emp.id}" data-name="${emp.name}" data-initials="${emp.initials}" onchange="toggleRowSelection(this, 'row-${emp.id}')">
                    <div class="user-info">
                        <div class="avatar" style="width:36px;height:36px;font-size:14px;margin:0;">${emp.initials}</div>
                        <span class="user-select-name">${emp.name}</span>
                    </div>
                    <div class="custom-checkbox"></div>
                </label>
            `;
        });
        document.getElementById('newGroupName').value = '';
        document.getElementById('groupNameGroup').classList.remove('show');
        document.getElementById('newChatModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function createNewChat() {
        const selected = document.querySelectorAll('.new-chat-cb:checked');
        if (selected.length === 0) return showAlert("Veuillez sélectionner au moins une personne.");
        
        let newChatId = "";
        let newChat = null;

        if (selected.length === 1) {
            const otherUserId = selected[0].value;
            newChatId = [myUserId, otherUserId].sort().join('_');
            newChat = { name: selected[0].dataset.name, status: '🟢 Connecté', isGroup: false, messages: [] };
        } else {
            newChatId = 'groupe_' + Date.now();
            let groupName = document.getElementById('newGroupName').value.trim() || "Nouveau Groupe";
            newChat = { name: groupName, status: '🟢 Connecté', isGroup: true, messages: [] };
        }
        
        if (!conversationsData[newChatId]) { conversationsData[newChatId] = newChat; }

        closeModal('newChatModal');
        renderContactList();
        openChat(newChatId);
    }

    // --- FONCTIONS UI ---
    function showAlert(msg) { document.getElementById('alertMessage').innerHTML = msg; document.getElementById('alertModal').style.display = 'flex'; window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*'); }
    function askDeleteChat(chatId) { if (chatId === 'global') return; currentChatIdToDelete = chatId; document.getElementById('confirmDeleteModal').style.display = 'flex'; window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*'); }
    function executeDeleteChat() { if (currentChatIdToDelete && currentChatIdToDelete !== 'global') { delete conversationsData[currentChatIdToDelete]; closeModal('confirmDeleteModal'); if (currentChatId === currentChatIdToDelete) { currentChatId = null; document.getElementById('chatHeaderName').textContent = "Sélectionnez une discussion"; document.getElementById('chatHeaderStatus').textContent = ""; document.getElementById('chatHeaderAvatar').innerHTML = ""; document.getElementById('chatHeaderAvatar').className = "avatar"; document.getElementById('chatMessages').innerHTML = '<div style="text-align:center; color:#888; font-style:italic; margin-top:50px;">Aucune conversation sélectionnée.</div>'; closeChat(); } renderContactList(); currentChatIdToDelete = null; } }
    function toggleRowSelection(cb, rowId) { const row = document.getElementById(rowId); if (cb.checked) { row.classList.add('selected'); } else { row.classList.remove('selected'); } checkNewChatSelection(); }
    function checkNewChatSelection() { const selected = document.querySelectorAll('.new-chat-cb:checked'); const groupGroup = document.getElementById('groupNameGroup'); if (selected.length > 1) { groupGroup.classList.add('show'); } else { groupGroup.classList.remove('show'); } }
    
    function renderContactList() {
        const list = document.getElementById('contactListContainer');
        if(!list) return; list.innerHTML = '';
        Object.entries(conversationsData).reverse().forEach(([id, chat]) => {
            const isActive = id === currentChatId ? 'active' : '';
            const avatarLet = chat.isGroup ? `<svg class="svg-icon"><use href="#icon-users"></use></svg>` : (chat.name ? chat.name.charAt(0).toUpperCase() : '?');
            const avatarClass = chat.isGroup ? 'avatar-group' : '';
            let lastMsg = 'Nouvelle discussion'; let lastTime = '';
            if (chat.messages && chat.messages.length > 0) { const lastM = chat.messages[chat.messages.length - 1]; lastMsg = lastM.type === 'text' ? lastM.text : (lastM.type === 'image' ? '📷 Image' : '📎 Fichier'); lastTime = lastM.time; }
            const deleteBg = id !== 'global' ? `<div class="delete-btn-bg" onclick="askDeleteChat('${id}')"><svg class="svg-icon"><use href="#icon-trash"></use></svg></div>` : '';
            list.insertAdjacentHTML('beforeend', `
                <div class="contact-wrapper" id="wrapper-${id}">
                    ${deleteBg}
                    <div class="contact-item ${isActive}" id="contact-${id}" onclick="openChat('${id}', event)">
                        <div class="avatar ${avatarClass}">${avatarLet}</div>
                        <div class="contact-info">
                            <div class="contact-name"><span>${chat.name}</span> <span class="contact-time">${lastTime}</span></div>
                            <div class="contact-last-msg">${chat.messages && chat.messages.length > 0 && chat.messages[chat.messages.length-1].isMine ? 'Vous: ' : ''}${lastMsg}</div>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function filterContacts() { const searchTerm = document.getElementById('searchContactInput').value.toLowerCase(); document.querySelectorAll('#contactListContainer .contact-wrapper').forEach(wrapper => { wrapper.style.display = wrapper.textContent.toLowerCase().includes(searchTerm) ? 'block' : 'none'; }); }
    
    function openChat(chatId, e) {
        if (!conversationsData[chatId]) return; currentChatId = chatId; const chat = conversationsData[chatId];
        const nameEl = document.getElementById('chatHeaderName'); const statusEl = document.getElementById('chatHeaderStatus'); const avatarBox = document.getElementById('chatHeaderAvatar');
        if(nameEl) nameEl.textContent = chat.name || "Inconnu";
        if(statusEl) { statusEl.textContent = chat.status || ""; statusEl.style.color = (chat.status && chat.status.includes('Connecté')) ? 'var(--btn-green)' : '#888'; }
        if(avatarBox) { avatarBox.className = chat.isGroup ? 'avatar avatar-group' : 'avatar'; avatarBox.innerHTML = chat.isGroup ? `<svg class="svg-icon"><use href="#icon-users"></use></svg>` : (chat.name ? chat.name.charAt(0).toUpperCase() : '?'); }
        renderContactList(); renderMessages(chat.messages || [], true);
        if (dashboard && window.innerWidth <= 900) { dashboard.classList.add('show-chat'); }
        selectedFiles = []; renderPreviews();
    }

    function closeChat() { if(dashboard) dashboard.classList.remove('show-chat'); }
    
    function renderMessages(messages, scroll = false) {
        if(!messagesContainer) return; const scrollPos = messagesContainer.scrollTop; messagesContainer.innerHTML = '';
        if(messages.length === 0) { messagesContainer.innerHTML = '<div style="text-align:center; color:#888; font-style:italic; margin-top:50px;">Envoyez un premier message pour démarrer la discussion.</div>'; return; }
        messages.forEach(msg => {
            const wrapper = document.createElement('div'); wrapper.className = `message-wrapper ${msg.isMine ? 'sent' : 'received'}`;
            let senderHtml = !msg.isMine ? `<span class="message-sender">${msg.sender}</span>` : '';
            let reactionHtml = msg.reaction ? `<div class="msg-reaction-badge" onclick="removeReaction('${msg.id}')">${msg.reaction}</div>` : '';
            let innerBubble = '';
            if (msg.type === 'text') { innerBubble = `<div class="message-bubble">${msg.text}<span class="message-time">${msg.time}</span>${reactionHtml}</div>`; } 
            else if (msg.type === 'image') { innerBubble = `<div class="message-bubble bubble-image"><img src="${msg.url}" onclick="window.open('${msg.url}')"><span class="message-time">${msg.time}</span>${reactionHtml}</div>`; } 
            else if (msg.type === 'file') { innerBubble = `<a href="${msg.url}" target="_blank" class="message-bubble bubble-file"><div class="file-icon"><svg class="svg-icon" style="width:28px;height:28px;"><use href="#icon-file"></use></svg></div><div class="file-meta"><span class="file-name">${msg.fileName}</span><span class="file-size">${msg.fileSize}</span></div><div class="file-download-icon"><svg class="svg-icon" style="width:18px;height:18px;"><use href="#icon-download"></use></svg></div><span class="message-time" style="position: absolute; bottom: 5px; right: 10px; font-size: 9px; color: #333;">${msg.time}</span>${reactionHtml}</a>`; }
            wrapper.innerHTML = senderHtml + `<div class="message-content-row">${innerBubble}<button class="msg-react-btn" onclick="showReactionPicker(event, '${msg.id}')"><svg class="svg-icon" style="width:16px;height:16px;"><use href="#icon-smile"></use></svg></button></div>`;
            messagesContainer.appendChild(wrapper);
        });
        if (scroll) { scrollToBottom(); } else { messagesContainer.scrollTop = scrollPos; }
    }

    function scrollToBottom() { if(messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight; }
    function renderQuickReactions() { const list = document.getElementById('quickReactionsList'); if(!list) return; list.innerHTML = ''; quickReactions.forEach(emoji => { const span = document.createElement('span'); span.textContent = emoji; span.onclick = () => selectReaction(emoji); list.appendChild(span); }); }
    function showReactionPicker(e, msgId) { e.stopPropagation(); currentReactMsgId = msgId; if(reactionPicker) { reactionPicker.style.display = 'flex'; const rect = e.currentTarget.getBoundingClientRect(); let topPos = rect.top - 55; let leftPos = rect.left - 130; if (topPos < 10) topPos = rect.bottom + 10; if (leftPos < 10) leftPos = 10; if (leftPos + reactionPicker.offsetWidth > window.innerWidth) leftPos = window.innerWidth - reactionPicker.offsetWidth - 10; reactionPicker.style.top = topPos + 'px'; reactionPicker.style.left = leftPos + 'px'; } }
    function selectReaction(emoji) { if(!currentReactMsgId || !currentChatId) return; const chat = conversationsData[currentChatId]; if(!chat) return; const msg = chat.messages.find(m => m.id === currentReactMsgId || m.id == currentReactMsgId); if(msg) { msg.reaction = emoji; renderMessages(chat.messages, false); } if(reactionPicker) reactionPicker.style.display = 'none'; }
    function removeReaction(msgId) { if(!currentChatId) return; const chat = conversationsData[currentChatId]; if(!chat) return; const msg = chat.messages.find(m => m.id === msgId || m.id == msgId); if(msg) { msg.reaction = null; renderMessages(chat.messages, false); } }
    function openFullPicker() { isCustomizing = false; const fullPicker = document.getElementById('fullPickerModal'); if(fullPicker) fullPicker.style.display = 'flex'; if(reactionPicker) reactionPicker.style.display = 'none'; renderTopQuickReactions(); window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*'); }
    function toggleCustomizeMode() { isCustomizing = !isCustomizing; const btn = document.getElementById('btnToggleCustomize'); if(!btn) return; if (isCustomizing) { btn.textContent = "Terminé"; btn.style.color = "var(--btn-green)"; selectedCustomizeIndex = 0; } else { btn.textContent = "Personnaliser"; btn.style.color = "var(--btn-blue)"; selectedCustomizeIndex = null; localStorage.setItem('dussault_quick_reacts', JSON.stringify(quickReactions)); renderQuickReactions(); } renderTopQuickReactions(); }
    function renderTopQuickReactions() { const container = document.getElementById('topQuickReactions'); if(!container) return; container.innerHTML = ''; quickReactions.forEach((emoji, index) => { const div = document.createElement('div'); div.className = 'top-react-slot' + (isCustomizing && selectedCustomizeIndex === index ? ' active-slot' : ''); div.textContent = emoji; if (isCustomizing) { div.onclick = () => { selectedCustomizeIndex = index; renderTopQuickReactions(); }; } else { div.onclick = () => { selectReaction(emoji); closeModal('fullPickerModal'); }; } container.appendChild(div); }); }
    function closeModal(id) { const el = document.getElementById(id); if(el) el.style.display = 'none'; window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*'); }
    document.addEventListener('click', (e) => { if (reactionPicker && !reactionPicker.contains(e.target)) { reactionPicker.style.display = 'none'; } });
    if(attachBtn && attachMenu) { attachBtn.addEventListener('click', (e) => { e.stopPropagation(); attachMenu.classList.toggle('show'); attachBtn.classList.toggle('active'); }); document.addEventListener('click', (e) => { if (!attachMenu.contains(e.target) && e.target !== attachBtn && !attachBtn.contains(e.target)) { attachMenu.classList.remove('show'); if(selectedFiles.length === 0) attachBtn.classList.remove('active'); } }); }
    function triggerInput(inputId) { const inp = document.getElementById(inputId); if(inp) inp.click(); if(attachMenu) attachMenu.classList.remove('show'); }
    
    const inputCamera = document.getElementById('inputCamera'); const inputGallery = document.getElementById('inputGallery'); const inputFile = document.getElementById('inputFile');
    if(inputCamera) inputCamera.addEventListener('change', handleFileSelect); if(inputGallery) inputGallery.addEventListener('change', handleFileSelect); if(inputFile) inputFile.addEventListener('change', handleFileSelect);
    function handleFileSelect(e) { const files = Array.from(e.target.files); if (files.length === 0) return; selectedFiles = selectedFiles.concat(files); renderPreviews(); e.target.value = ''; }
    function renderPreviews() { if(!attachmentPreview) return; attachmentPreview.innerHTML = ''; if (selectedFiles.length > 0) { attachmentPreview.classList.add('active'); if(attachBtn) attachBtn.classList.add('active'); } else { attachmentPreview.classList.remove('active'); if(attachBtn) attachBtn.classList.remove('active'); return; } selectedFiles.forEach((file, index) => { const previewItem = document.createElement('div'); if (file.type.startsWith('image/')) { previewItem.className = 'preview-item'; const img = document.createElement('img'); img.src = URL.createObjectURL(file); previewItem.appendChild(img); } else { previewItem.className = 'preview-item-file'; const truncatedName = file.name.length > 15 ? file.name.substring(0,12)+'...' : file.name; previewItem.innerHTML = `<div class="file-icon"><svg class="svg-icon" style="width:16px;height:16px;"><use href="#icon-file"></use></svg></div> <span>${truncatedName}</span>`; } const removeBtn = document.createElement('button'); removeBtn.className = 'remove-attachment'; removeBtn.innerText = '×'; removeBtn.onclick = () => removeFile(index); previewItem.appendChild(removeBtn); attachmentPreview.appendChild(previewItem); }); }
    function removeFile(index) { selectedFiles.splice(index, 1); renderPreviews(); }
    if(messageInput) { messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); }); }
    window.onload = initAuth;
</script>
