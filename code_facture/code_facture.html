<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facturation F.Dussault</title>
    
    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --app-bg: #1e1f26; 
            --sidebar-bg: #fcca46; 
            --btn-yellow: #fcca46; 
            --blue-bg: #d1e9ff; 
            --btn-green: #28a745; 
            --btn-red: #ff4d4d;
            --btn-grey: #343a40; 
            --btn-blue: #3498db; 
            --btn-orange: #ff9800;
            --btn-purple: #9c27b0;
            --text-light: #e0e0e0; 
            --card-bg: #2b2c36;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--app-bg); 
            color: var(--text-light); 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }
        
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background-color: var(--app-bg); 
            overflow: hidden; 
        }

        .svg-icon { 
            width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; 
            stroke-linecap: round; stroke-linejoin: round; fill: none; 
            display: inline-block; vertical-align: middle; flex-shrink: 0; 
        }
        
        .badge-status { 
            padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 5px; color: white; 
        }
        .badge-status .svg-icon { width: 12px; height: 12px; }
        .b-brouillon { background: #444; }
        .b-envoye { background: #3498db; }
        .b-traite { background: var(--btn-purple); } 
        .b-paye { background: #28a745; }
        .b-renvoye { background: #fd7e14; }

        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        
        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; color: #888; pointer-events: none; display: flex; align-items: center;}

        .tabs-container { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-tab { background: #1a1b23; color: #aaa; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .invoice-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 30px;}
        
        .invoice-item { 
            background-color: var(--card-bg); padding: 12px 20px; border-radius: 10px; display: grid;
            grid-template-columns: 80px 1fr 140px 130px 100px 44px; align-items: center; gap: 15px;
            transition: transform 0.2s, background-color 0.2s; cursor: pointer; border: 1px solid transparent;
            border-left: 4px solid transparent; margin-bottom: 8px;
        }
        .invoice-item:hover { transform: translateX(5px); background-color: #343542; border-left-color: var(--btn-yellow); }
        
        .inv-id { font-weight: bold; color: var(--btn-yellow); font-size: 15px; }
        .inv-client { font-weight: bold; font-size: 16px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-author { font-size: 14px; color: #888; font-style: italic; display: flex; align-items: center; gap: 6px; }
        .inv-status { display: flex; align-items: center; }
        .inv-date { color: #aaa; font-size: 14px; text-align: right; font-weight: 500; }
        .inv-actions { display: flex; justify-content: flex-end; align-items: center; }
        
        .btn-icon { background: #444; border: none; width: 36px; height: 36px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: white; flex-shrink: 0; }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: var(--btn-red); border: 1px solid transparent; }
        .btn-delete:hover { background: var(--btn-red); color: white; }

        #view-editor { display: none; flex-direction: column; height: 100%; }
        
        .top-bar { height: auto; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; background: rgba(30, 31, 38, 0.95); border-bottom: 1px solid #333; z-index: 101; flex-wrap: wrap; }
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-1px); }
        .btn-back { background-color: var(--btn-grey) !important; color: white !important; }
        .btn-save { background-color: var(--btn-green) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-send { background-color: var(--btn-blue) !important; color: white !important; }
        .btn-unlock { background-color: var(--btn-orange) !important; color: white !important; }
        .btn-return { background-color: var(--btn-red) !important; color: white !important; }

        .office-status-panel { background: #1a1b23; border: 1px solid #555; padding: 9px 20px; border-radius: 50px; display: flex; align-items: center; gap: 8px; white-space: nowrap; flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; cursor: pointer; position: relative; color: white; font-weight: bold; font-size: 14px; }
        .office-status-panel:hover { background: #22232c; border-color: #777; }
        
        .custom-select-options { position: fixed; background: rgba(43, 44, 54, 0.98); backdrop-filter: blur(10px); border: 1px solid #555; border-radius: 16px; overflow: hidden; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; min-width: 200px; flex-direction: column; }
        .custom-select-options.show { display: flex; animation: fadeIn 0.2s ease-out; }
        .custom-select-option { padding: 16px 20px; color: white; cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: bold; border-bottom: 1px solid #3a3b46; text-align: left; }
        .custom-select-option:hover { background: #3a3b46; color: var(--btn-yellow); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .correction-banner { background: rgba(255, 77, 77, 0.15); border: 1px dashed var(--btn-red); padding: 15px; margin: 20px auto 0 auto; max-width: 8.5in; border-radius: 8px; color: white; line-height: 1.5; font-size: 14px; display: flex; gap: 10px; }
        .scroll-area { flex: 1; overflow: auto; padding: 15px 0; display: block; touch-action: auto; }
        #invoice-container { display: block; width: 8.5in; transform-origin: top left; transition: transform 0.1s ease-out; padding-bottom: 50px; }
        
        .page { width: 8.5in; height: 11in; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; display: flex; flex-direction: column; position: relative; margin: 0 0 20px 0; color: black; padding: 0.25in; flex-shrink: 0; }
        input { outline: none; border-radius: 0; }
        input:focus { background-color: transparent !important; border-bottom: 2px solid #000 !important; }
        
        .top-section { width: 100%; }
        .header-main { width: 100%; margin-top: -15px; margin-bottom: 0px; }
        .header-main img { width: 100%; height: auto; display: block; }
        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2px; }
        .info-column { display: flex; flex-direction: column; gap: 1px; }
        .field { display: flex; align-items: flex-end; font-size: 12px; font-weight: bold; min-height: 22px; }
        .field label { white-space: nowrap; margin-right: 5px; }
        .field input { background-color: var(--blue-bg) !important; border: none; border-bottom: 1px solid black; flex-grow: 1; height: 18px; padding: 0 5px; }
        
        .banner-cmmtq { width: 100%; margin: 7px 0 5px 0; text-align: center; }
        .banner-cmmtq img { width: 100%; height: auto; display: block; margin: 0 auto; }
        
        .main-table { width: 100%; border-collapse: collapse; border: none; margin-bottom: 10px; } 
        .main-table thead { border-top: 4px double black; }
        .main-table th { border: 1px solid black; font-size: 9px; background: #eee; padding: 2px; }
        .main-table td { border: 1px solid black; height: 24px; background-color: var(--blue-bg); padding: 0; }
        .main-table tbody tr:last-child td { border-bottom: 4px double black; }
        .main-table input { width: 100%; height: 100%; background: transparent; border: none; padding: 0 5px; box-sizing: border-box; font-size: 12px; color: black; font-weight: bold;}
        
        .bottom-section { margin-top: auto; width: 100%; }
        .time-wrapper { width: 100%; border: 1px solid black; border-collapse: collapse; table-layout: fixed; margin-top: 0; }
        .time-label-col { width: 110px; border-right: 1px solid black; padding: 5px; vertical-align: top; }
        .time-label-col span { font-size: 8px; font-weight: bold; }
        .time-label-col h2 { font-size: 18px; margin: 5px 0 0 0; font-weight: 900; }
        
        .inner-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .row-headers td { border-right: 1px solid black; border-bottom: 1px solid black; height: 30px; font-size: 8px; font-weight: bold; text-align: center; vertical-align: top; padding-top: 2px; }
        .row-sublabels td { font-size: 9px; font-weight: bold; text-align: center; padding: 2px 0; border-right: none; }
        .row-inputs td { padding: 2px 5px; vertical-align: middle; border-right: none; height: 26px; }
        .input-box { background-color: var(--blue-bg); border-bottom: 1px solid black; display: flex; align-items: center; padding: 0 3px; height: 18px; }
        .input-box input { background: transparent; border: none; width: 100%; height: 100%; text-align: center; font-size: 10px; font-weight: bold; color: black;}
        .flex-group { display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: bold; }
        .last-col { border-right: none !important; }
        
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr 150px; align-items: end; margin-top: 5px; gap: 10px; }
        .sig-box { width: 100%; text-align: center; }
        .display-sig { border: none; border-bottom: 1px solid #000; background-color: var(--blue-bg); width: 100%; height: 50px; cursor: pointer; object-fit: contain; }
        .sig-text { font-size: 10px; font-weight: bold; margin-top: 2px; }
        .invoice-num-box { text-align: right; padding-bottom: 5px; display: flex; justify-content: flex-end; align-items: flex-end; }
        .red-invoice-input { color: #dc3545; font-weight: bold; font-size: 18px; font-family: 'Courier New', Courier, monospace; text-align: right; border: none; background-color: var(--blue-bg); width: 100%; margin: 0; padding: 0 5px; }

        #sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: white; padding: 15px; border-radius: 8px; text-align: center; width: 90%; max-width: 800px; color:black;}
        #modal-canvas { border: 2px dashed #444; background: #fff; width: 100%; height: 350px; touch-action: none; }
        .modal-btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        .btn-ok { background: var(--btn-green); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}
        .btn-clear { background: var(--btn-yellow); color: black; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .btn-cancel { background: var(--btn-red); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 31, 38, 0.95); padding: 5px 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #555; }
        .zoom-controls button { background: var(--btn-yellow); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #1e1f26; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .custom-modal-card { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .custom-modal-title { font-size: 20px; color: var(--btn-red); margin-bottom: 15px; font-weight: bold; display:flex; justify-content:center; align-items:center; gap:8px;}
        .custom-modal-msg { color: var(--text-light); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; }
        .btn-modal-cancel { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-confirm { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-modal-ok { background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .custom-group { text-align: left; margin-bottom: 15px; }

        @media (max-width: 1024px) {
            .top-bar { padding: 10px 85px 10px 10px; gap: 10px; height: 65px; overflow-x: auto; justify-content: flex-start; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .top-bar::-webkit-scrollbar { display: none; }
            .top-bar .action-btn, .spacer-mobile, .office-status-panel { flex-shrink: 0; width: auto; margin-bottom: 0; }
            .top-bar .action-btn { font-size: 11px; padding: 8px 15px; }
            .office-status-panel { font-size: 11px; padding: 8px 15px; }
        }
        
        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; width: 100%; }
            .dash-title { padding-right: 80px; width: 100%; }
            .dash-header .action-btn { width: 100%; justify-content: center; font-size: 14px;}
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; justify-content: center; }
            .toolbar { flex-direction: column; width: 100%; }
            .search-box, .search-box input { width: 100%; }
            .zoom-controls { display: none !important; }
            
            .invoice-item {
                display: grid; grid-template-columns: 1fr auto;
                grid-template-areas: "id id" "client client" "author author" "status date";
                align-items: center; gap: 4px 12px; padding: 16px; border-radius: 12px; 
                border: 1px solid #3a3b46; border-left: 1px solid #3a3b46; margin-bottom: 12px; position: relative;
            }
            .invoice-item:hover { transform: translateY(-2px); background-color: #30313c; border-color: #555; border-left-color: #555; }
            .inv-id { grid-area: id; font-size: 15px; font-weight: 800; width: auto; }
            .inv-client { grid-area: client; font-size: 18px; font-weight: 700; margin-top: 0px; margin-bottom: 4px; white-space: normal; overflow: visible; padding-right: 45px; width: auto; }
            .inv-author { grid-area: author; font-size: 13px; margin-bottom: 8px; width: auto; color: #aaa;}
            .inv-status { grid-area: status; justify-self: start; width: auto; }
            .inv-date { grid-area: date; text-align: right; justify-self: end; width: auto; font-size: 12px; color: #888;}
            .inv-actions { position: absolute; top: 16px; right: 16px; margin: 0; }
            .btn-icon { width: 36px; height: 36px; border-radius: 10px; } 
        }
        
        @media print {
            @page { margin: 0; size: letter; }
            html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; background: white !important; overflow: visible !important;}
            .top-bar, #sig-modal, .zoom-controls, #view-dashboard, .custom-modal-overlay, .correction-banner { display: none !important; }
            .main-content, #view-editor, .scroll-area { display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; position: static !important; padding: 0 !important; }
            #invoice-container { margin: 0 !important; padding: 0 !important; transform: none !important; width: 100% !important; display: block !important; }
            .page { width: 100% !important; max-width: 100% !important; height: auto !important; min-height: 11in !important; margin: 0 !important; box-shadow: none !important; page-break-after: always !important; padding: 20px !important; display: block !important; }
            .field input, .main-table td, .display-sig, .input-box, .red-invoice-input { background-color: transparent !important; }
        }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; inset: 0; background: #1e1f26; z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement du module...</div>
</div>

<svg style="display: none;">
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
    <symbol id="icon-inbox" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    <symbol id="icon-back" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></symbol>
    <symbol id="icon-save" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></symbol>
    <symbol id="icon-send" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></symbol>
    <symbol id="icon-return" viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></symbol>
    <symbol id="icon-print" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></symbol>
    <symbol id="icon-file-plus" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></symbol>
    <symbol id="icon-file-minus" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="15" x2="15" y2="15"></line></symbol>
    <symbol id="icon-eraser" viewBox="0 0 24 24"><path d="M20 20H7l-3-3a2.828 2.828 0 0 1 0-4l10-10a2.828 2.828 0 0 1 4 0l3 3a2.828 2.828 0 0 1 0 4l-7 7"></path><line x1="10" y1="10" x2="17" y2="17"></line></symbol>
    <symbol id="icon-file-text" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></symbol>
    <symbol id="icon-check-circle" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></symbol>
    <symbol id="icon-alert-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></symbol>
    <symbol id="icon-unlock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></symbol>
</svg>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Facturation</h1>
                <p>Création et suivi comptable</p>
            </div>
            <button class="action-btn" style="background-color: var(--btn-yellow);" onclick="openNewInvoice()">
                <svg class="svg-icon"><use href="#icon-plus"></use></svg> Nouvelle Facture
            </button>
        </div>
        
        <div class="tabs-container" id="invoice-tabs" style="display:none;">
            <button id="tab-mine" class="btn-tab active" onclick="switchInvTab('mine')">
                <svg class="svg-icon" style="width:15px; height:15px;"><use href="#icon-user"></use></svg> Mes Factures
            </button>
            <button id="tab-all" class="btn-tab" onclick="switchInvTab('all')">
                <svg class="svg-icon" style="width:15px; height:15px;"><use href="#icon-inbox"></use></svg> Boîte de réception
            </button>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon"><svg class="svg-icon"><use href="#icon-search"></use></svg></span>

            </div>

        <div class="invoice-list" id="invoiceListContainer"></div>
    </div>

    <div id="view-editor">
        <div class="top-bar" id="editor-top-bar">
            <button class="action-btn btn-back" onclick="askGoBack()">
                <svg class="svg-icon"><use href="#icon-back"></use></svg> Retour
            </button>
            <button class="action-btn btn-save" id="btn-save" onclick="saveCurrentInvoice(false)">
                <svg class="svg-icon"><use href="#icon-save"></use></svg> Sauvegarder
            </button>
            <button class="action-btn btn-send" id="btn-send" onclick="sendToOffice()">
                <svg class="svg-icon"><use href="#icon-send"></use></svg> Envoyer au bureau
            </button>
            
            <button class="action-btn btn-unlock" id="btn-unlock" onclick="unlockInvoice()" style="display:none;">
                <svg class="svg-icon"><use href="#icon-unlock"></use></svg> Débloquer
            </button>
            <button class="action-btn btn-return" id="btn-return" onclick="openReturnModal()" style="display:none;">
                <svg class="svg-icon"><use href="#icon-return"></use></svg> Renvoyer (Correction)
            </button>
            
            <div id="office-status-div" class="office-status-panel" style="display:none;" onclick="toggleStatusMenu(event)">
                <svg class="svg-icon" style="color:#aaa;"><use href="#icon-edit"></use></svg>
                <span id="current-status-text">Reçu (À traiter)</span>
                <svg class="svg-icon" style="width:12px; height:12px; color:#aaa; margin-left:auto;"><use href="#icon-chevron-down"></use></svg>
                
                <div class="custom-select-options" id="statusOptionsMenu">
                    <div class="custom-select-option" onclick="changeOfficeStatusCustom('envoye', 'Reçu (À traiter)', event)">Reçu (À traiter)</div>
                    <div class="custom-select-option" onclick="changeOfficeStatusCustom('traite', 'Traité', event)">Traité</div>
                    <div class="custom-select-option" onclick="changeOfficeStatusCustom('attente', 'À corriger', event)">À corriger</div>
                    <div class="custom-select-option" onclick="changeOfficeStatusCustom('paye', 'Facture payée', event)">Facture payée</div>
                </div>
            </div>

            <div style="flex:1" class="spacer-mobile"></div>
            
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-print" onclick="window.print()">
                <svg class="svg-icon"><use href="#icon-print"></use></svg> Imprimer
            </button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-add-page" onclick="addPage()">
                <svg class="svg-icon"><use href="#icon-file-plus"></use></svg> Page
            </button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-dup-page" onclick="duplicatePage()">
                <svg class="svg-icon"><use href="#icon-copy"></use></svg> Dupliquer
            </button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-del-page" onclick="deletePage()">
                <svg class="svg-icon"><use href="#icon-file-minus"></use></svg> Page
            </button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-clear" onclick="askClearInputs()">
                <svg class="svg-icon"><use href="#icon-eraser"></use></svg> Effacer
            </button>
        </div>
  
        <div class="scroll-area">
            <div id="correction-banner" class="correction-banner" style="display:none;">
                <svg class="svg-icon" style="color:var(--btn-red); width:24px; height:24px; margin-top:3px;"><use href="#icon-alert-circle"></use></svg>
                <div>
                    <strong style="color:var(--btn-red);">Facture renvoyée par le bureau pour correction :</strong><br>
                    <span id="correction-note-text" style="display:inline-block; margin-top:5px;"></span>
                </div>
            </div>
            
            <div id="invoice-container"></div>
        </div>
        
        <div class="zoom-controls">
            <button onclick="adjustZoom(-0.1)">−</button>
            <span id="zoom-level">100%</span>
            <button onclick="adjustZoom(0.1)">+</button>
            <button onclick="resetZoom()" style="font-size: 14px;">↺</button>
        </div>
    </div>
</div>

<div id="sig-modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Signez ici</h3>
        <canvas id="modal-canvas"></canvas>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('sig-modal')">ANNULER</button>
            <button class="btn-clear" onclick="clearModalCanvas()">EFFACER</button>
            <button class="btn-ok" onclick="saveSignature()">OK</button>
        </div>
    </div>

<div class="custom-modal-overlay" id="returnModal">
    <div class="custom-modal-card">
        <div class="custom-modal-title" style="color:var(--btn-red); font-size:20px; margin-bottom:15px; font-weight:bold; display:flex; justify-content:center; align-items:center; gap:8px;">
            <svg class="svg-icon"><use href="#icon-return"></use></svg> Renvoyer
        </div>
        <div style="text-align: left; margin-bottom: 15px;">
            <label style="color:#aaa; display:block; margin-bottom:10px; font-size:13px; font-weight:bold;">Note pour l'employé :</label>
            <textarea id="returnNote" placeholder="Ex: Il manque le tarif horaire..." style="width:100%; height:100px; background:#1e1f26; color:white; border:1px solid #555; padding:10px; border-radius:5px; font-family:sans-serif; outline:none; resize:none;"></textarea>
        </div>
        <div style="display: flex; justify-content: center; gap: 10px; margin-top:15px;">
            <button style="background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;" onclick="closeModal('returnModal')">Annuler</button>
            <button style="background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;" onclick="executeReturnInvoice()">Renvoyer la facture</button>
        </div>
    </div>
</div>

    <div class="custom-modal-card">
        <div style="font-size:20px; margin-bottom:15px; font-weight:bold;">Confirmation</div>
        <div id="confirmMsg" style="color:var(--text-light); margin-bottom:25px; font-size:15px; line-height:1.4;">...</div>
        <div style="display:flex; justify-content:center; gap:10px;">
            <button style="background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;" onclick="closeConfirmModal()">Non</button>
            <button id="confirmYesBtn" style="background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;" onclick="executeConfirm()">Oui</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="alertModal">
    <div class="custom-modal-card">
        <div style="color:var(--btn-yellow); font-size:20px; margin-bottom:15px; font-weight:bold;">Information</div>
        <div id="alertMsg" style="color:var(--text-light); margin-bottom:25px; font-size:15px; line-height:1.4;">...</div>
        <div style="display:flex; justify-content:center; gap:10px;">
            <button style="background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold;" onclick="closeAlertModal()">Compris</button>
        </div>
    </div>
</div>

<script>
    // --- CONNEXION SUPABASE ---
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myRole = 'A3';
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentInvTab = 'mine';

    let invoicesData = [];
    let currentInvoiceId = null;

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'view_admin'] },
        'A2': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools'] },
        'A3': { perms: ['transfer_tools'] }
    };

    function hasPermission(role, permId) {
        if (role === 'A0') return true; 
        try {
            const stored = localStorage.getItem('dussault_roles_v1');
            const savedRoles = stored ? JSON.parse(stored) : defaultRolesConfig;
            const roleData = savedRoles[role];
            if (!roleData || !roleData.perms) return false;
            return roleData.perms.includes(permId);
        } catch (e) {
            return false;
        }
    }

    async function initAuth() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.top.location.href = '../login.html'; return; }

            myUserId = user.id;
            const { data: profils } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).limit(1);
            
            if (profils && profils.length > 0) {
                myRole = profils[0].role;
                myUserName = profils[0].prenom_nom || user.email;
                
                if (hasPermission(myRole, 'view_all_invoices')) {
                    const tabs = document.getElementById('invoice-tabs');
                    if(tabs) tabs.style.display = 'flex';
                } else {
                    currentInvTab = 'mine';
                }
            }
            await loadData();
        } catch (error) {
            console.error("Erreur d'initialisation :", error);
        } finally {
            const loader = document.getElementById('security-loader');
            if (loader) loader.style.display = 'none';
            window.parent.postMessage({ type: 'module_ready', module: 'view-factures' }, '*');
        }
    }

    // --- LECTURE SUPABASE (REMPLACE LOCALSTORAGE) ---
    async function loadData() {
        try {
            let query = supabaseClient.from('factures').select('*');
            if (currentInvTab === 'mine') {
                query = query.eq('author_id', myUserId);
            } else {
                query = query.neq('status', 'brouillon');
            }

            const { data, error } = await query.order('created_at', { ascending: false });
            if (error) throw error;
            
            if (data) {
                invoicesData = data.map(dbInv => ({
                    id: dbInv.id,
                    client: dbInv.client,
                    date: dbInv.date,
                    status: dbInv.status,
                    inputValues: dbInv.input_values || [],
                    sigValues: dbInv.sig_values || [],
                    pageCount: dbInv.page_count || 1,
                    authorId: dbInv.author_id,
                    authorName: dbInv.author_name,
                    returnNote: dbInv.return_note,
                    timestamp: new Date(dbInv.created_at).getTime()
                }));
            }
        } catch (e) {
            console.error("Erreur de chargement de la base de données :", e);
            invoicesData = [];
        }
        renderInvoiceList();
    }

    function switchInvTab(tab) {
        currentInvTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        loadData(); // Recharger depuis la DB avec le bon filtre
    }

    // --- MODALES OUTILS ---
    let confirmCallback = null;
    function showConfirm(msg, callback) { document.getElementById('confirmMsg').textContent = msg; confirmCallback = callback; document.getElementById('confirmModal').style.display = 'flex'; window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*'); }
    function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; confirmCallback = null; if (document.getElementById('view-editor').style.display !== 'flex') window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*'); }
    function executeConfirm() { if (confirmCallback) confirmCallback(); closeConfirmModal(); }
    function showAlert(msg) { document.getElementById('alertMsg').innerHTML = msg; document.getElementById('alertModal').style.display = 'flex'; window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*'); }
    function closeAlertModal() { document.getElementById('alertModal').style.display = 'none'; if (document.getElementById('view-editor').style.display !== 'flex') window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*'); }
    function closeModal(id) { if(id) { document.getElementById(id).style.display = 'none'; } else { document.getElementById('sig-modal').style.display = 'none'; drawing = false; } }

    const viewDashboard = document.getElementById('view-dashboard');
    const viewEditor = document.getElementById('view-editor');
    const listContainer = document.getElementById('invoiceListContainer');
    const containerInvoice = document.getElementById('invoice-container');

    function showDashboard() { 
        viewDashboard.style.display = 'flex'; viewEditor.style.display = 'none'; 
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
        loadData(); // Fraîcheur
    }
    
    function askGoBack() { showDashboard(); }

    function toggleInputs(canEdit) {
        const allInputs = containerInvoice.querySelectorAll('input');
        const allSigs = containerInvoice.querySelectorAll('.display-sig');
        allInputs.forEach(inp => { if (!canEdit) { inp.setAttribute('readonly', true); inp.style.pointerEvents = 'none'; } else { inp.removeAttribute('readonly'); inp.style.pointerEvents = 'auto'; } });
        allSigs.forEach(img => { img.style.pointerEvents = canEdit ? 'auto' : 'none'; });
    }

    function applyEditorSecurity(invoiceObj) {
        const isBureau = hasPermission(myRole, 'view_all_invoices');
        const status = invoiceObj ? (invoiceObj.status || 'brouillon') : 'brouillon';
        const isAuthor = invoiceObj ? (invoiceObj.authorId === myUserId || !invoiceObj.authorId) : true;
        
        let canEdit = false;
        if (!isBureau) { if (status === 'brouillon' || status === 'attente') canEdit = true; } 
        else { if (status === 'brouillon' && isAuthor) canEdit = true; }

        document.getElementById('btn-save').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-add-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-dup-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-del-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-clear').style.display = canEdit ? 'flex' : 'none';
        
        const btnSend = document.getElementById('btn-send'); if(btnSend) btnSend.style.display = canEdit ? 'flex' : 'none';
        const btnUnlock = document.getElementById('btn-unlock'); const btnReturn = document.getElementById('btn-return');
        
        if (isBureau && status !== 'brouillon' && status !== 'attente') {
            if(btnUnlock) btnUnlock.style.display = 'flex'; if(btnReturn) btnReturn.style.display = 'flex';
        } else {
            if(btnUnlock) btnUnlock.style.display = 'none'; if(btnReturn) btnReturn.style.display = 'none';
        }

        const statusDiv = document.getElementById('office-status-div');
        if (statusDiv) {
            if (isBureau && status !== 'brouillon' && status !== 'attente') {
                statusDiv.style.display = 'flex';
                const statusMap = { 'envoye': 'Reçu (À traiter)', 'traite': 'Traité', 'attente': 'À corriger', 'paye': 'Facture payée', 'brouillon': 'Brouillon' };
                const statusText = document.getElementById('current-status-text');
                if(statusText) statusText.textContent = statusMap[status] || status;
            } else { statusDiv.style.display = 'none'; }
        }

        const banner = document.getElementById('correction-banner');
        if (status === 'attente' && invoiceObj && invoiceObj.returnNote) {
            if(banner) banner.style.display = 'flex';
            const noteText = document.getElementById('correction-note-text');
            if(noteText) noteText.textContent = invoiceObj.returnNote;
        } else { if(banner) banner.style.display = 'none'; }

        toggleInputs(canEdit);
    }
    
    // --- GESTION DU MENU DÉROULANT STATUT ---
    function toggleStatusMenu(e) {
        e.stopPropagation(); const menu = document.getElementById('statusOptionsMenu'); const btn = document.getElementById('office-status-div');
        if (menu.classList.contains('show')) { menu.classList.remove('show'); } else {
            const rect = btn.getBoundingClientRect(); menu.style.top = (rect.bottom + 8) + 'px';
            let leftPos = rect.left; if (leftPos + 220 > window.innerWidth) leftPos = window.innerWidth - 230;
            menu.style.left = leftPos + 'px'; menu.classList.add('show');
        }
    }
    window.addEventListener('click', function() { const menu = document.getElementById('statusOptionsMenu'); if(menu && menu.classList.contains('show')) menu.classList.remove('show'); });
    const topBar = document.getElementById('editor-top-bar');
    if(topBar) { topBar.addEventListener('scroll', function() { const menu = document.getElementById('statusOptionsMenu'); if(menu && menu.classList.contains('show')) menu.classList.remove('show'); }); }
    
    function changeOfficeStatusCustom(newStatus, text, e) {
        e.stopPropagation(); document.getElementById('statusOptionsMenu').classList.remove('show');
        document.getElementById('current-status-text').textContent = text; changeOfficeStatus(newStatus); 
    }

    async function changeOfficeStatus(newStatus) {
        if (!currentInvoiceId) return;
        const { error } = await supabaseClient.from('factures').update({ status: newStatus }).eq('id', currentInvoiceId);
        if (error) showAlert("Erreur lors de la mise à jour : " + error.message);
        else { await loadData(); showAlert("<div style='color:var(--btn-green);'>Le statut a été mis à jour dans la base de données.</div>"); }
    }

    function unlockInvoice() {
        toggleInputs(true); document.getElementById('btn-save').style.display = 'flex'; document.getElementById('btn-unlock').style.display = 'none';
        document.getElementById('btn-add-page').style.display = 'flex'; document.getElementById('btn-dup-page').style.display = 'flex';
        document.getElementById('btn-del-page').style.display = 'flex'; document.getElementById('btn-clear').style.display = 'flex';
        showAlert("<div style='color:var(--btn-orange);'>Facture débloquée. N'oubliez pas de sauvegarder.</div>");
    }

    function openReturnModal() { document.getElementById('returnNote').value = ''; document.getElementById('returnModal').style.display = 'flex'; }

    async function executeReturnInvoice() {
        const note = document.getElementById('returnNote').value.trim();
        if(!note) return showAlert("<div style='color:var(--btn-red);'>Veuillez inscrire une note pour expliquer ce qui manque.</div>");
        if (!currentInvoiceId) return;
        
        const { error } = await supabaseClient.from('factures').update({ status: 'attente', return_note: note }).eq('id', currentInvoiceId);
        if (error) { showAlert("Erreur de retour : " + error.message); } 
        else {
            closeModal('returnModal');
            await loadData();
            showDashboard();
            showAlert("<div style='color:var(--btn-green);'>La facture a été renvoyée à l'employé pour correction.</div>");
        }
    }

    function openExistingInvoice(id) {
        const invoice = invoicesData.find(inv => inv.id === id); if (!invoice) return;
        currentInvoiceId = id;
        
        viewDashboard.style.display = 'none'; viewEditor.style.display = 'flex'; 
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
        containerInvoice.innerHTML = '';
        
        const pageCount = invoice.pageCount || 1;
        for(let i=0; i<pageCount; i++) { containerInvoice.appendChild(createInvoicePageHTML()); }
        
        const allInputs = containerInvoice.querySelectorAll('input');
        if (invoice.inputValues) { allInputs.forEach((input, index) => { if (invoice.inputValues[index] !== undefined) input.value = invoice.inputValues[index]; }); }
        const allSigs = containerInvoice.querySelectorAll('.display-sig');
        if (invoice.sigValues) { allSigs.forEach((img, index) => { if (invoice.sigValues[index]) img.src = invoice.sigValues[index]; }); }
        
        applyEditorSecurity(invoice); fitToScreen(); 
    }

    function openNewInvoice() {
        currentInvoiceId = null;
        viewDashboard.style.display = 'none'; viewEditor.style.display = 'flex'; 
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
        containerInvoice.innerHTML = ''; containerInvoice.appendChild(createInvoicePageHTML());
        
        // Numérotation basée sur l'heure pour les brouillons des employés
        const nextNum = "Brouillon-" + Date.now().toString().slice(-4);
        const numInput = containerInvoice.querySelector('.red-invoice-input');
        if(numInput) numInput.value = nextNum;
        
        applyEditorSecurity(null); fitToScreen();
    }

    function sendToOffice() { showConfirm("Une fois envoyée, cette facture sera verrouillée. L'envoyer au bureau ?", function() { saveCurrentInvoice(true); }); }

    // --- SAUVEGARDE VERS SUPABASE ---
    async function saveCurrentInvoice(isSending = false) {
        const firstPage = containerInvoice.querySelector('.page');
        if (!firstPage) return;
        
        const inputs = firstPage.querySelectorAll('.top-section input');
        const clientName = inputs[0] ? inputs[0].value.trim() : "Client Inconnu";
        
        let dateVal = inputs[4] ? inputs[4].value.trim() : "";
        if (!dateVal) {
             const today = new Date();
             dateVal = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
        }
        
        const invoiceNumInput = firstPage.querySelector('.red-invoice-input');
        let invoiceNum = (invoiceNumInput && invoiceNumInput.value.trim() !== '') ? invoiceNumInput.value.trim() : "Brouillon-" + Date.now().toString().slice(-4);

        const inputValues = Array.from(containerInvoice.querySelectorAll('input')).map(input => input.value);
        const sigValues = Array.from(containerInvoice.querySelectorAll('.display-sig')).map(img => img.getAttribute('src'));
        const pageCount = containerInvoice.querySelectorAll('.page').length;
        
        let currentStatus = 'brouillon';
        let existingInvoice = invoicesData.find(inv => inv.id === currentInvoiceId || inv.id === invoiceNum);
        if (existingInvoice) { currentStatus = existingInvoice.status || 'brouillon'; }
        if (isSending) currentStatus = 'envoye';
        
        // Construction du paquet pour la base de données
        const dbPayload = { 
            id: invoiceNum, 
            client: clientName || "Client Inconnu", 
            date: dateVal, 
            input_values: inputValues, 
            sig_values: sigValues, 
            page_count: pageCount, 
            author_id: existingInvoice ? existingInvoice.authorId : myUserId,
            author_name: existingInvoice ? existingInvoice.authorName : myUserName,
            status: currentStatus,
            return_note: existingInvoice ? existingInvoice.returnNote : ""
        };
        
        const { error } = await supabaseClient.from('factures').upsert(dbPayload);
        
        if (error) {
            showAlert("<div style='color:var(--btn-red);'>Erreur base de données : " + error.message + "</div>");
            return;
        }

        currentInvoiceId = invoiceNum; 
        await loadData();
        
        if(isSending) { 
            showAlert("<div style='color:var(--btn-blue);'>Document verrouillé et envoyé au bureau avec succès !</div>"); 
            showDashboard(); 
        } else { 
            showAlert("<div style='color:var(--btn-green);'>Facture sauvegardée sur le serveur.</div>"); 
            const newInvoiceObj = invoicesData.find(inv => inv.id === currentInvoiceId);
            applyEditorSecurity(newInvoiceObj); 
        }
    }

    function deleteInvoice(id, event) {
        event.stopPropagation();
        showConfirm("Supprimer la facture #" + id + " ?", async function() {
            const { error } = await supabaseClient.from('factures').delete().eq('id', id);
            if (error) { showAlert("<div style='color:var(--btn-red);'>Erreur : " + error.message + "</div>"); } 
            else { await loadData(); }
        });
    }

    function renderInvoiceList() {
        listContainer.innerHTML = '';
        const searchInput = document.getElementById('searchInput');
        const searchText = searchInput ? searchInput.value.toLowerCase() : ""; 
        
        const isBureau = hasPermission(myRole, 'view_all_invoices');
        let baseList = invoicesData;

        if (!isBureau || currentInvTab === 'mine') { baseList = invoicesData.filter(inv => inv.authorId === myUserId); } 
        else { baseList = invoicesData.filter(inv => inv.status !== 'brouillon'); }
        
        const filtered = baseList.filter(inv => { 
            const clientName = inv.client || ""; const invId = String(inv.id || "");
            return (clientName.toLowerCase().includes(searchText) || invId.toLowerCase().includes(searchText)); 
        });

        if(filtered.length === 0) { listContainer.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">Aucune facture trouvée.</div>'; return; }
        
        filtered.forEach(inv => {
            let badgeHTML = ''; let st = inv.status || 'brouillon';
            if(st === 'brouillon') badgeHTML = `<span class="badge-status b-brouillon">Brouillon</span>`;
            if (!isBureau) {
                if(st === 'envoye') badgeHTML = `<span class="badge-status b-envoye">Envoyé au bureau</span>`;
                if(st === 'traite' || st === 'paye') badgeHTML = `<span class="badge-status b-traite">Traité</span>`;
                if(st === 'attente') badgeHTML = `<span class="badge-status b-renvoye">À corriger</span>`;
            } else {
                if(st === 'envoye') badgeHTML = `<span class="badge-status b-envoye">Reçu (À traiter)</span>`;
                if(st === 'traite') badgeHTML = `<span class="badge-status b-traite">Traité</span>`;
                if(st === 'attente') badgeHTML = `<span class="badge-status b-renvoye">À corriger</span>`;
                if(st === 'paye') badgeHTML = `<span class="badge-status b-paye">Facture payée</span>`;
            }

            let displayDate = inv.date || '';
            if (!displayDate || displayDate.trim() === '') {
                const d = new Date(inv.timestamp || Date.now());
                displayDate = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
            } else if (displayDate.includes('-')) { const parts = displayDate.split('-'); if (parts.length === 3) displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`; }

            const item = document.createElement('div'); item.className = 'invoice-item'; 
            item.onclick = function() { openExistingInvoice(inv.id); };
            
            let btnDelete = `<div class="btn-icon" style="background:transparent; pointer-events:none;"></div>`; 
            let canDelete = false;
            if (st === 'brouillon' || st === 'attente' || st === 'renvoye') { if (inv.authorId === myUserId || isBureau) canDelete = true; }
            if (canDelete) btnDelete = `<button class="btn-icon btn-delete" onclick="deleteInvoice('${inv.id}', event)" title="Supprimer">X</button>`;

            item.innerHTML = `<div class="inv-id">#${inv.id}</div><div class="inv-client">${inv.client}</div><div class="inv-author">${inv.authorName || 'Inconnu'}</div><div class="inv-status">${badgeHTML}</div><div class="inv-date">${displayDate}</div><div class="inv-actions">${btnDelete}</div>`;
            listContainer.appendChild(item);
         });
    }

    const inputAttrs = `type="text" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false"`;
    let invoicePageCount = 0; let globalSigCount = 0;

    function createInvoicePageHTML() {
        invoicePageCount++; globalSigCount++; 
        const page = document.createElement('div'); page.className = 'page invoice-style';
        let rows = ""; for(let i=0; i<20; i++) { rows += `<tr><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td></tr>`; }
        page.innerHTML = `
            <div class="top-section">
                <div class="header-main"><img src="logo_dussault.png" alt="F. Dussault"></div>
                <div class="info-section">
                    <div class="info-column">
                        <div class="field"><label>M.</label><input ${inputAttrs}></div><div class="field"><input ${inputAttrs}></div>
                        <div class="field" style="margin-top:2px;"><label>Po client:</label><input ${inputAttrs}></div><div class="field"><label>Tél:</label><input ${inputAttrs}></div>
                    </div>
                    <div class="info-column">
                        <div class="field"><label>Date:</label><input ${inputAttrs}></div><div class="field"><label>Travail à:</label><input ${inputAttrs}></div>
                        <div class="field"><label>Adresse:</label><input ${inputAttrs}></div><div class="field"><label>Po:</label><input ${inputAttrs}></div>
                    </div>
                </div>
                <div class="banner-cmmtq"><img src="cmmtq_et_slogan.png" alt="CMMTQ"></div>
            </div>
            <table class="main-table"><thead><tr><th width="45">QUANT.</th><th>DESCRIPTION</th><th width="75">MONTANT</th><th width="75">TOTAL</th></tr></thead><tbody>${rows}</tbody></table>
            <div class="bottom-section">
                <table class="time-wrapper">
                    <tr><td class="time-label-col"><span>1 1/2% après 30 jours<br>after 30 days</span><h2># TEMPS</h2></td>
                    <td><table class="inner-table"><tr class="row-headers"><td style="width:25%">TARIF PAR HRE</td><td style="width:15%">CHARGE MIN.</td><td style="width:25%">TRANSPORT</td><td style="width:20%">HRE ARRIVÉE</td><td class="last-col" style="width:15%">INITIALE</td></tr><tr class="row-sublabels"><td>A.M.</td><td>INITIALE</td><td>P.M.</td><td></td><td class="last-col">INITIALE</td></tr><tr class="row-inputs"><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="input-box"><input ${inputAttrs}></div></td><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="flex-group">TOTAL <div class="input-box"><input ${inputAttrs}></div></div></td><td class="last-col"><div class="input-box"><input ${inputAttrs}></div></td></tr><tr class="row-inputs"><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="input-box"><input ${inputAttrs}></div></td><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="flex-group">TOTAL <div class="input-box"><input ${inputAttrs}></div></div></td><td class="last-col"><div class="input-box"><input ${inputAttrs}></div></td></tr></table></td></tr>
                </table>
                <div class="footer-grid">
                    <div class="sig-box"><img id="sig-p-${globalSigCount}" class="display-sig" onclick="openModal('sig-p-${globalSigCount}')"><div class="sig-text">Signature du plombier</div></div>
                    <div class="sig-box"><img id="sig-c-${globalSigCount}" class="display-sig" onclick="openModal('sig-c-${globalSigCount}')"><div class="sig-text">Signature du client</div></div>
                    <div class="invoice-num-box"><input type="text" class="red-invoice-input" placeholder="No."></div>
                </div>
            </div>`;
        return page;
    }

    function addPage() { containerInvoice.appendChild(createInvoicePageHTML()); if(currentZoom !== 1.0) updateZoom(); }
    function duplicatePage() { const pages = containerInvoice.querySelectorAll('.page'); if (pages.length === 0) return; const sourcePage = pages[pages.length - 1]; const newPage = createInvoicePageHTML(); containerInvoice.appendChild(newPage); const sourceTopInputs = sourcePage.querySelectorAll('.top-section input'); const newTopInputs = newPage.querySelectorAll('.top-section input'); sourceTopInputs.forEach((input, index) => { if(newTopInputs[index]) newTopInputs[index].value = input.value; }); if(currentZoom !== 1.0) updateZoom(); }
    function deletePage() { if (containerInvoice.children.length > 1) { containerInvoice.removeChild(containerInvoice.lastElementChild); invoicePageCount--; } else { showAlert("<div style='color:var(--btn-red);'>Impossible de supprimer la dernière page.</div>"); } }
    function askClearInputs() { showConfirm("Effacer tout le contenu de la facture ?", function() { containerInvoice.querySelectorAll('input').forEach(input => input.value = ''); containerInvoice.querySelectorAll('.display-sig').forEach(img => img.src = ''); }); }

    // --- LOGIQUE CANVAS ET SIGNATURE ---
    const modal = document.getElementById('sig-modal'); const modalCanvas = document.getElementById('modal-canvas'); const ctx = modalCanvas.getContext('2d'); let currentTargetImgId = null; let drawing = false;
    function resizeCanvas() { const ratio = Math.max(window.devicePixelRatio || 1, 1); modalCanvas.width = modalCanvas.offsetWidth * ratio; modalCanvas.height = modalCanvas.offsetHeight * ratio; ctx.scale(ratio, ratio); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; }
    function openModal(id) { currentTargetImgId = id; modal.style.display = 'flex'; setTimeout(resizeCanvas, 10); }
    function clearModalCanvas() { ctx.clearRect(0, 0, modalCanvas.width, modalCanvas.height); }
    function saveSignature() { if(currentTargetImgId) document.getElementById(currentTargetImgId).src = modalCanvas.toDataURL(); closeModal(); }
    function getPos(e) { const rect = modalCanvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top }; }
    function startDrawing(e) { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); if(e.type === 'touchstart') e.preventDefault(); }
    function moveDrawing(e) { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); if(e.type === 'touchmove') e.preventDefault(); }
    modalCanvas.addEventListener('mousedown', startDrawing); window.addEventListener('mousemove', moveDrawing); window.addEventListener('mouseup', () => drawing = false); modalCanvas.addEventListener('touchstart', startDrawing, {passive: false}); modalCanvas.addEventListener('touchmove', moveDrawing, {passive: false}); modalCanvas.addEventListener('touchend', () => drawing = false);

    // --- LOGIQUE ZOOM ---
    let currentZoom = 1.0; const minZoom = 0.3; const maxZoom = 3.0; const zoomDisplay = document.getElementById('zoom-level');
    function fitToScreen() { const scrollArea = document.querySelector('.scroll-area'); if(!scrollArea) return; const screenWidth = scrollArea.clientWidth; const pageWidth = 816; if (screenWidth > 0 && screenWidth < pageWidth) { currentZoom = (screenWidth / pageWidth) * 0.98; } else { currentZoom = 1.0; } currentZoom = Math.round(currentZoom * 100) / 100; updateZoom(); }
    function updateZoom() { if (currentZoom < minZoom) currentZoom = minZoom; if (currentZoom > maxZoom) currentZoom = maxZoom; containerInvoice.style.transform = `scale(${currentZoom})`; if(zoomDisplay) { zoomDisplay.textContent = Math.round(currentZoom * 100) + '%'; } const scrollArea = document.querySelector('.scroll-area'); if(scrollArea) { const screenWidth = scrollArea.clientWidth; const scaledWidth = 816 * currentZoom; if (scaledWidth < screenWidth) { containerInvoice.style.marginLeft = ((screenWidth - scaledWidth) / 2) + "px"; } else { containerInvoice.style.marginLeft = "0px"; } } const unscaledHeight = containerInvoice.offsetHeight; const scaledHeight = unscaledHeight * currentZoom; if (currentZoom < 1.0) { containerInvoice.style.marginBottom = (scaledHeight - unscaledHeight + 50) + "px"; } else if (currentZoom > 1.0) { containerInvoice.style.marginBottom = (currentZoom * 400) + "px"; } else { containerInvoice.style.marginBottom = "100px"; } }
    function adjustZoom(delta) { currentZoom += delta; currentZoom = Math.round(currentZoom * 10) / 10; updateZoom(); }
    function resetZoom() { fitToScreen(); } 
    window.addEventListener('resize', () => { if (document.getElementById('view-editor').style.display === 'flex') { fitToScreen(); } });
    
    initAuth();
</script>
</body>
