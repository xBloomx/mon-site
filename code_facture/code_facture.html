<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facturation F.Dussault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --app-bg: #1e1f26; --sidebar-bg: #fcca46; --btn-yellow: #fcca46; 
            --blue-bg: #d1e9ff; --btn-green: #28a745; --btn-red: #ff4d4d;
            --btn-grey: #343a40; --btn-blue: #3498db; --btn-orange: #ff9800;
            --text-light: #e0e0e0; --card-bg: #2b2c36;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--app-bg); color: var(--text-light); margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--app-bg); overflow: hidden; }

        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; color: #888; pointer-events: none; }
        .filter-select { background: #1e1f26; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; cursor: pointer; }

        .tabs-container { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-tab { background: #1a1b23; color: #aaa; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .invoice-list { display: flex; flex-direction: column; gap: 10px; }
        .invoice-item { background-color: var(--card-bg); padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s, background-color 0.2s; cursor: pointer; border-left: 5px solid transparent; }
        .invoice-item:hover { transform: translateY(-2px); background-color: #343542; border-left: 5px solid var(--btn-yellow); }
        .inv-info { display: flex; gap: 20px; align-items: center; flex: 1; flex-wrap: wrap;}
        .inv-id { font-weight: bold; color: var(--btn-yellow); width: 100px; }
        .inv-client { font-weight: bold; font-size: 16px; color: white; flex: 1; min-width: 150px;}
        .inv-author { font-size: 13px; color: #888; font-style: italic; width: 120px;}
        .inv-status { width: 120px; }
        .inv-date { color: #aaa; font-size: 14px; width: 100px; text-align: right; }
        .inv-actions { display: flex; gap: 10px; margin-left: 20px;}
        .btn-icon { background: #444; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { background: #555; }
        .btn-delete { background: rgba(220, 53, 69, 0.2); color: var(--btn-red); }
        .btn-delete:hover { background: var(--btn-red); color: white; }

        #view-editor { display: none; flex-direction: column; height: 100%; }
        .top-bar { height: auto; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; background: rgba(30, 31, 38, 0.95); border-bottom: 1px solid #333; z-index: 101; flex-wrap: wrap; }
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: transform 0.2s; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-1px); }
        
        .btn-back { background-color: var(--btn-grey) !important; color: white !important; }
        .btn-back:hover { background-color: #23272b !important; }
        
        .btn-save { background-color: var(--btn-green) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-save:hover { background-color: #218838 !important; }
        
        .btn-send { background-color: var(--btn-blue) !important; color: white !important; }
        .btn-send:hover { background-color: #2980b9 !important; }
        
        .btn-unlock { background-color: var(--btn-orange) !important; color: white !important; }
        .btn-return { background-color: var(--btn-red) !important; color: white !important; }

        .office-status-panel { background: #1a1b23; border: 1px solid #444; padding: 5px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; }
        .office-status-panel select { background: transparent; color: white; border: none; font-weight: bold; cursor: pointer; outline: none; font-size: 13px;}
        .office-status-panel select option { background: #1e1f26; }

        .correction-banner { background: rgba(255, 77, 77, 0.15); border: 1px dashed var(--btn-red); padding: 15px; margin: 20px auto 0 auto; max-width: 8.5in; border-radius: 8px; color: white; line-height: 1.5; font-size: 14px;}

        /* NOUVEAU SYSTÈME DE SCROLL (Glissement débloqué) */
        .scroll-area { 
            flex: 1; 
            overflow: auto; /* Autorise le défilement horizontal et vertical */
            padding: 15px 0; 
            display: block; /* Modifié pour permettre l'alignement à gauche */
            touch-action: auto; 
        }
        
        /* NOUVEAU SYSTÈME DE ZOOM (Centrage dynamique) */
        #invoice-container { 
            display: block; 
            width: 8.5in; 
            transform-origin: top left; /* Point de zoom en haut à gauche */
            transition: transform 0.1s ease-out; 
            padding-bottom: 50px; 
        }
        
        .page { 
            width: 8.5in; 
            height: 11in; 
            background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            margin: 0 0 20px 0; /* Centrage maintenant géré par JS */
            color: black; 
            padding: 0.25in; 
            flex-shrink: 0;
        }

        input { outline: none; border-radius: 0; }
        input:focus { background-color: transparent !important; border-bottom: 2px solid #000 !important; }
        
        .top-section { width: 100%; }
        .header-main { width: 100%; margin-top: -15px; margin-bottom: 0px; }
        .header-main img { width: 100%; height: auto; display: block; }
        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2px; }
        .info-column { display: flex; flex-direction: column; gap: 1px; }
        .field { display: flex; align-items: flex-end; font-size: 12px; font-weight: bold; min-height: 22px; }
        .field label { white-space: nowrap; margin-right: 5px; }
        .field input { background-color: var(--blue-bg) !important; border: none; border-bottom: 1px solid black; flex-grow: 1; height: 18px; padding: 0 5px; }
        .banner-cmmtq { width: 100%; margin: 7px 0 5px 0; text-align: center; }
        .banner-cmmtq img { width: 100%; height: auto; display: block; margin: 0 auto; }
        .main-table { width: 100%; border-collapse: collapse; border: none; margin-bottom: 10px; } 
        .main-table thead { border-top: 4px double black; }
        .main-table th { border: 1px solid black; font-size: 9px; background: #eee; padding: 2px; }
        .main-table td { border: 1px solid black; height: 24px; background-color: var(--blue-bg); padding: 0; }
        .main-table tbody tr:last-child td { border-bottom: 4px double black; }
        .main-table input { width: 100%; height: 100%; background: transparent; border: none; padding: 0 5px; box-sizing: border-box; font-size: 12px; color: black; font-weight: bold;}
        .bottom-section { margin-top: auto; width: 100%; }
        .time-wrapper { width: 100%; border: 1px solid black; border-collapse: collapse; table-layout: fixed; margin-top: 0; }
        .time-label-col { width: 110px; border-right: 1px solid black; padding: 5px; vertical-align: top; }
        .time-label-col span { font-size: 8px; font-weight: bold; }
        .time-label-col h2 { font-size: 18px; margin: 5px 0 0 0; font-weight: 900; }
        .inner-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .row-headers td { border-right: 1px solid black; border-bottom: 1px solid black; height: 30px; font-size: 8px; font-weight: bold; text-align: center; vertical-align: top; padding-top: 2px; }
        .row-sublabels td { font-size: 9px; font-weight: bold; text-align: center; padding: 2px 0; border-right: none; }
        .row-inputs td { padding: 2px 5px; vertical-align: middle; border-right: none; height: 26px; }
        .input-box { background-color: var(--blue-bg); border-bottom: 1px solid black; display: flex; align-items: center; padding: 0 3px; height: 18px; }
        .input-box input { background: transparent; border: none; width: 100%; height: 100%; text-align: center; font-size: 10px; font-weight: bold; color: black;}
        .flex-group { display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: bold; }
        .last-col { border-right: none !important; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr 150px; align-items: end; margin-top: 5px; gap: 10px; }
        .sig-box { width: 100%; text-align: center; }
        .display-sig { border: none; border-bottom: 1px solid #000; background-color: var(--blue-bg); width: 100%; height: 50px; cursor: pointer; object-fit: contain; }
        .sig-text { font-size: 10px; font-weight: bold; margin-top: 2px; }
        .invoice-num-box { text-align: right; padding-bottom: 5px; display: flex; justify-content: flex-end; align-items: flex-end; }
        .red-invoice-input { color: #dc3545; font-weight: bold; font-size: 18px; font-family: 'Courier New', Courier, monospace; text-align: right; border: none; background-color: var(--blue-bg); width: 100%; margin: 0; padding: 0 5px; }

        #sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: white; padding: 15px; border-radius: 8px; text-align: center; width: 90%; max-width: 800px; }
        #modal-canvas { border: 2px dashed #444; background: #fff; width: 100%; height: 350px; touch-action: none; }
        .modal-btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-ok { background: var(--btn-green); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}
        .btn-clear { background: var(--btn-yellow); color: black; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .btn-cancel { background: var(--btn-red); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 31, 38, 0.95); padding: 5px 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #555; }
        .zoom-controls button { background: var(--btn-yellow); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #1e1f26; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .custom-modal-card { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .custom-modal-title { font-size: 20px; color: var(--btn-red); margin-bottom: 15px; font-weight: bold; }
        .custom-modal-msg { color: var(--text-light); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; }
        .btn-modal-cancel { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-confirm { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-ok { background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .custom-group { text-align: left; margin-bottom: 15px; }

        @media (max-width: 1024px) {
            .top-bar { padding: 10px 70px 10px 10px; gap: 10px; height: 65px; overflow-x: auto; justify-content: flex-start; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .top-bar::-webkit-scrollbar { display: none; }
            .top-bar .action-btn, .spacer-mobile { flex-shrink: 0; width: auto; margin-bottom: 0; }
            .top-bar .action-btn { font-size: 11px; padding: 8px 15px; }
        }
        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; padding-right: 70px; }
            .dash-header .action-btn { width: 100%; justify-content: center; }
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; text-align: center; }
            .toolbar { flex-direction: column; }
            .search-box, .filter-select { width: 100%; }
            .invoice-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .inv-info { flex-direction: column; align-items: flex-start; gap: 5px; width: 100%; }
            .inv-id { width: auto; font-size: 16px; } 
            .inv-actions { align-self: flex-end; margin-left: 0; margin-top: -35px; }
            .zoom-controls { display: none !important; }
        }
        @media print {
            @page { margin: 0; size: letter; }
            html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; background: white !important; overflow: visible !important;}
            .sidebar, .top-bar, #sig-modal, .zoom-controls, #view-dashboard, .custom-modal-overlay, .correction-banner { display: none !important; }
            .main-content, #view-editor, .scroll-area { display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; position: static !important; padding: 0 !important; }
            #invoice-container { margin: 0 !important; padding: 0 !important; transform: none !important; width: 100% !important; display: block !important; }
            .page { 
                width: 100% !important; max-width: 100% !important; height: auto !important; min-height: 11in !important; 
                margin: 0 !important; box-shadow: none !important; page-break-after: always !important; 
                padding: 20px !important; display: block !important;
            }
            .field input, .main-table td, .display-sig, .input-box, .red-invoice-input { background-color: transparent !important; }
        }
    </style>
</head>
<body>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title"><h1>Facturation</h1><p>Création et suivi comptable</p></div>
            <button class="action-btn" style="background-color: var(--btn-yellow);" onclick="openNewInvoice()"><span>+</span> Nouvelle Facture</button>
        </div>
        
        <div class="tabs-container" id="invoice-tabs" style="display:none;">
            <button id="tab-mine" class="btn-tab active" onclick="switchInvTab('mine')">👤 Mes Factures</button>
            <button id="tab-all" class="btn-tab" onclick="switchInvTab('all')">📥 Boîte de réception (Bureau)</button>
        </div>

        <div class="toolbar">
            <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Rechercher (Client, N°...)" onkeyup="filterInvoices()"></div>
            <select class="filter-select" id="clientFilter" onchange="filterInvoices()"><option value="all">Tous les clients</option></select>
        </div>
        <div class="invoice-list" id="invoiceListContainer"></div>
    </div>

    <div id="view-editor">
        <div class="top-bar" id="editor-top-bar">
            <button class="action-btn btn-back" onclick="askGoBack()">⬅ Retour</button>
            <button class="action-btn btn-save" id="btn-save" onclick="saveCurrentInvoice(false)">💾 SAUVEGARDER</button>
            <button class="action-btn btn-send" id="btn-send" onclick="sendToOffice()">📤 ENVOYER AU BUREAU</button>
            
            <button class="action-btn btn-unlock" id="btn-unlock" onclick="unlockInvoice()" style="display:none;">🔓 Débloquer</button>
            <button class="action-btn btn-return" id="btn-return" onclick="openReturnModal()" style="display:none;">↩️ Renvoyer (Correction)</button>
            
            <div id="office-status-div" class="office-status-panel" style="display:none;">
                <span style="color:#aaa; font-size:11px; text-transform:uppercase;">Statut :</span>
                <select id="invoice-status-select" onchange="changeOfficeStatus(this.value)">
                    <option value="envoye">📥 Reçu (À traiter)</option>
                    <option value="attente">⏳ En attente de paiement</option>
                    <option value="paye">💰 Payé</option>
                    <option value="retard">🔴 En retard</option>
                </select>
            </div>

            <div style="flex:1" class="spacer-mobile"></div>
            
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-print" onclick="window.print()">🖨️ Imprimer</button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-add-page" onclick="addPage()">➕ Page</button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-dup-page" onclick="duplicatePage()">📄 Dupliquer</button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-del-page" onclick="deletePage()">➖ Page</button>
            <button class="action-btn" style="background-color: var(--btn-yellow);" id="btn-clear" onclick="askClearInputs()">🧹 Effacer</button>
        </div>
  
        <div class="scroll-area">
            <div id="correction-banner" class="correction-banner" style="display:none;">
                <strong style="color:var(--btn-red);">⚠️ Facture renvoyée par le bureau pour correction :</strong><br>
                <span id="correction-note-text" style="display:inline-block; margin-top:5px;"></span>
            </div>
            
            <div id="invoice-container"></div>
        </div>
        
        <div class="zoom-controls">
            <button onclick="adjustZoom(-0.1)">−</button><span id="zoom-level">100%</span><button onclick="adjustZoom(0.1)">+</button><button onclick="resetZoom()" style="font-size: 14px;">↺</button>
        </div>
    </div>
</div>

<div id="sig-modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Signez ici</h3>
        <canvas id="modal-canvas"></canvas>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('sig-modal')">ANNULER</button>
            <button class="btn-clear" onclick="clearModalCanvas()">EFFACER</button>
            <button class="btn-ok" onclick="saveSignature()">OK</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="returnModal">
    <div class="custom-modal-card">
        <div class="custom-modal-title" style="color:var(--btn-red);">Renvoyer pour correction</div>
        <div class="custom-group">
            <label style="color:#aaa; display:block; margin-bottom:10px;">Note pour l'employé (Ce qui manque) :</label>
            <textarea id="returnNote" placeholder="Ex: Il manque le tarif horaire..." style="width:100%; height:100px; background:#1e1f26; color:white; border:1px solid #555; padding:10px; border-radius:5px; font-family:sans-serif; outline:none; resize:none;"></textarea>
        </div>
        <div class="custom-modal-actions" style="margin-top:15px;">
            <button class="btn-modal-cancel" onclick="closeModal('returnModal')">Annuler</button>
            <button class="btn-modal-confirm" onclick="executeReturnInvoice()">Renvoyer la facture</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="confirmModal">
    <div class="custom-modal-card">
        <div class="custom-modal-title">Confirmation</div>
        <div class="custom-modal-msg" id="confirmMsg">...</div>
        <div class="custom-modal-actions">
            <button class="btn-modal-cancel" onclick="closeConfirmModal()">Non</button>
            <button class="btn-modal-confirm" onclick="executeConfirm()">Oui</button>
        </div>
    </div>
</div>
<div class="custom-modal-overlay" id="alertModal">
    <div class="custom-modal-card">
        <div class="custom-modal-title" style="color:var(--btn-yellow);">Information</div>
        <div class="custom-modal-msg" id="alertMsg">...</div>
        <div class="custom-modal-actions">
            <button class="btn-modal-ok" onclick="closeAlertModal()">Compris</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myRole = 'A3';
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentInvTab = 'mine';

    let invoicesData = [];
    const STORAGE_KEY = 'dussault_invoices_v1';
    let currentInvoiceId = null;

    async function initAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            myUserId = user.id;
            const { data: profils } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).limit(1);
            if (profils && profils.length > 0) {
                myRole = profils[0].role;
                myUserName = profils[0].prenom_nom || user.email;
                if (myRole !== 'A3') document.getElementById('invoice-tabs').style.display = 'flex';
            }
        }
        loadData();
    }

    function switchInvTab(tab) {
        currentInvTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        filterInvoices(); 
    }

    let confirmCallback = null;
    function showConfirm(msg, callback) { document.getElementById('confirmMsg').textContent = msg; confirmCallback = callback; document.getElementById('confirmModal').style.display = 'flex'; }
    function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; confirmCallback = null; }
    function executeConfirm() { if (confirmCallback) confirmCallback(); closeConfirmModal(); }
    
    function showAlert(msg) { document.getElementById('alertMsg').textContent = msg; document.getElementById('alertModal').style.display = 'flex'; }
    function closeAlertModal() { document.getElementById('alertModal').style.display = 'none'; }
    function closeModal(id) { 
        if(id) document.getElementById(id).style.display = 'none'; 
        else { document.getElementById('sig-modal').style.display = 'none'; drawing = false; }
    }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) invoicesData = JSON.parse(stored);
        updateClientFilter();
        renderInvoiceList();
    }
    function saveData() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(invoicesData)); 
        updateClientFilter(); 
        renderInvoiceList(); 
    }

    const viewDashboard = document.getElementById('view-dashboard');
    const viewEditor = document.getElementById('view-editor');
    const listContainer = document.getElementById('invoiceListContainer');
    const containerInvoice = document.getElementById('invoice-container');

    function showDashboard() { viewDashboard.style.display = 'flex'; viewEditor.style.display = 'none'; renderInvoiceList(); }
    function askGoBack() { showDashboard(); }

    function toggleInputs(canEdit) {
        const allInputs = containerInvoice.querySelectorAll('input');
        const allSigs = containerInvoice.querySelectorAll('.display-sig');
        
        allInputs.forEach(inp => {
            if (!canEdit) { inp.setAttribute('readonly', true); inp.style.pointerEvents = 'none'; } 
            else { inp.removeAttribute('readonly'); inp.style.pointerEvents = 'auto'; }
        });
        allSigs.forEach(img => { img.style.pointerEvents = canEdit ? 'auto' : 'none'; });
    }

    function applyEditorSecurity(invoiceObj) {
        const isBureau = ['A0', 'A1', 'A2'].includes(myRole);
        const status = invoiceObj ? (invoiceObj.status || 'brouillon') : 'brouillon';
        const isAuthor = invoiceObj ? (invoiceObj.authorId === myUserId || !invoiceObj.authorId) : true;
        
        let canEdit = false;
        if (!isBureau) {
            if (status === 'brouillon' || status === 'renvoye') canEdit = true;
        } else {
            if (status === 'brouillon' && isAuthor) canEdit = true;
        }

        document.getElementById('btn-save').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-add-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-dup-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-del-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-clear').style.display = canEdit ? 'flex' : 'none';
        
        // BOUTON ENVOYER TOUJOURS VISIBLE
        const btnSend = document.getElementById('btn-send');
        if(btnSend) btnSend.style.display = 'flex';

        const btnUnlock = document.getElementById('btn-unlock');
        const btnReturn = document.getElementById('btn-return');
        if (isBureau && status !== 'brouillon' && status !== 'renvoye') {
            btnUnlock.style.display = 'flex';
            btnReturn.style.display = 'flex';
        } else {
            btnUnlock.style.display = 'none';
            btnReturn.style.display = 'none';
        }

        const statusDiv = document.getElementById('office-status-div');
        if (statusDiv) {
            if (isBureau && status !== 'brouillon' && status !== 'renvoye') {
                statusDiv.style.display = 'flex';
                document.getElementById('invoice-status-select').value = status;
            } else {
                statusDiv.style.display = 'none';
            }
        }

        const banner = document.getElementById('correction-banner');
        if (status === 'renvoye' && invoiceObj && invoiceObj.returnNote) {
            banner.style.display = 'block';
            document.getElementById('correction-note-text').textContent = invoiceObj.returnNote;
        } else {
            banner.style.display = 'none';
        }

        toggleInputs(canEdit);
    }

    function unlockInvoice() {
        toggleInputs(true);
        document.getElementById('btn-save').style.display = 'flex';
        document.getElementById('btn-unlock').style.display = 'none';
        document.getElementById('btn-add-page').style.display = 'flex';
        document.getElementById('btn-dup-page').style.display = 'flex';
        document.getElementById('btn-del-page').style.display = 'flex';
        document.getElementById('btn-clear').style.display = 'flex';
        showAlert("🔓 Facture débloquée. Vous pouvez maintenant modifier les champs.");
    }

    function openReturnModal() {
        document.getElementById('returnNote').value = '';
        document.getElementById('returnModal').style.display = 'flex';
    }

    function executeReturnInvoice() {
        const note = document.getElementById('returnNote').value.trim();
        if(!note) return showAlert("Veuillez inscrire une note pour expliquer ce qui manque.");
        
        if (!currentInvoiceId) return;
        const inv = invoicesData.find(i => i.id === currentInvoiceId);
        if (inv) {
            inv.status = 'renvoye';
            inv.returnNote = note;
            saveData();
            closeModal('returnModal');
            showDashboard();
            showAlert("✅ La facture a été renvoyée à l'employé pour correction.");
        }
    }

    function openExistingInvoice(id) {
        const invoice = invoicesData.find(inv => inv.id === id);
        if (!invoice) return;
        currentInvoiceId = id;
        viewDashboard.style.display = 'none'; viewEditor.style.display = 'flex'; containerInvoice.innerHTML = '';
        
        const pageCount = invoice.pageCount || 1;
        for(let i=0; i<pageCount; i++) { containerInvoice.appendChild(createInvoicePageHTML()); }
        
        const allInputs = containerInvoice.querySelectorAll('input');
        if (invoice.inputValues) {
            allInputs.forEach((input, index) => { if (invoice.inputValues[index] !== undefined) input.value = invoice.inputValues[index]; });
        }
        const allSigs = containerInvoice.querySelectorAll('.display-sig');
        if (invoice.sigValues) {
            allSigs.forEach((img, index) => { if (invoice.sigValues[index]) img.src = invoice.sigValues[index]; });
        }
        applyEditorSecurity(invoice); 
        fitToScreen(); // Utilisation du nouveau zoom intelligent
    }

    function openNewInvoice() {
        currentInvoiceId = null;
        viewDashboard.style.display = 'none'; viewEditor.style.display = 'flex'; containerInvoice.innerHTML = '';
        containerInvoice.appendChild(createInvoicePageHTML());
        
        let maxId = 0; invoicesData.forEach(inv => { const num = parseInt(inv.id); if(!isNaN(num) && num > maxId) maxId = num; });
        const nextNum = maxId > 0 ? maxId + 1 : 1000;
        
        const numInput = containerInvoice.querySelector('.red-invoice-input');
        if(numInput) numInput.value = nextNum;
        
        applyEditorSecurity(null); 
        fitToScreen(); // Utilisation du nouveau zoom intelligent
    }

    function sendToOffice() {
        showConfirm("Une fois envoyée, cette facture sera verrouillée. L'envoyer au bureau ?", function() {
            saveCurrentInvoice(true);
        });
    }

    function changeOfficeStatus(newStatus) {
        if (!currentInvoiceId) return;
        const inv = invoicesData.find(i => i.id === currentInvoiceId);
        if (inv) { inv.status = newStatus; saveData(); showAlert("Statut mis à jour."); }
    }

    function saveCurrentInvoice(isSending = false) {
        const firstPage = containerInvoice.querySelector('.page');
        if (!firstPage) return;
        
        const inputs = firstPage.querySelectorAll('.top-section input');
        const clientName = inputs[0] ? inputs[0].value.trim() : "Client Inconnu";
        const dateVal = inputs[4] ? inputs[4].value.trim() : new Date().toISOString().split('T')[0];
        
        const invoiceNumInput = firstPage.querySelector('.red-invoice-input');
        let invoiceNum = (invoiceNumInput && invoiceNumInput.value.trim() !== '') ? invoiceNumInput.value.trim() : "Brouillon-" + Date.now().toString().slice(-4);

        const inputValues = Array.from(containerInvoice.querySelectorAll('input')).map(input => input.value);
        const sigValues = Array.from(containerInvoice.querySelectorAll('.display-sig')).map(img => img.getAttribute('src'));
        const pageCount = containerInvoice.querySelectorAll('.page').length;
        
        let currentStatus = 'brouillon';
        let existingInvoice = invoicesData.find(inv => inv.id === currentInvoiceId || inv.id === invoiceNum);
        if (existingInvoice) currentStatus = existingInvoice.status || 'brouillon';
        
        if (isSending) currentStatus = 'envoye';
        
        const newInvoiceObj = { 
            id: invoiceNum, client: clientName || "Client Inconnu", date: dateVal, inputValues: inputValues, 
            sigValues: sigValues, pageCount: pageCount, timestamp: Date.now(),
            authorId: existingInvoice ? existingInvoice.authorId : myUserId,
            authorName: existingInvoice ? existingInvoice.authorName : myUserName,
            status: currentStatus,
            returnNote: existingInvoice ? existingInvoice.returnNote : ""
        };
        
        if (existingInvoice) {
            const index = invoicesData.indexOf(existingInvoice); invoicesData[index] = newInvoiceObj;
        } else { invoicesData.push(newInvoiceObj); }
        
        currentInvoiceId = invoiceNum; saveData();
        if(isSending) { showAlert("📤 Document verrouillé et envoyé au bureau avec succès !"); showDashboard(); } 
        else { showAlert("✅ Facture sauvegardée."); applyEditorSecurity(newInvoiceObj); }
    }

    function deleteInvoice(id, event) {
        event.stopPropagation();
        showConfirm("Supprimer la facture #" + id + " ?", function() {
            invoicesData = invoicesData.filter(inv => inv.id !== id); saveData();
        });
    }

    function renderInvoiceList(filteredData = null) {
        listContainer.innerHTML = '';
        
        let baseList = invoicesData;
        if (myRole === 'A3' || currentInvTab === 'mine') {
            baseList = invoicesData.filter(inv => inv.authorId === myUserId);
        }
        
        let listToShow = filteredData ? filteredData : baseList;
        const sortedData = [...listToShow].sort((a, b) => b.timestamp - a.timestamp);
        
        if(sortedData.length === 0) { listContainer.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">Aucune facture trouvée.</div>'; return; }
        
        sortedData.forEach(inv => {
            let badgeHTML = ''; let st = inv.status || 'brouillon';
            if(st === 'brouillon') badgeHTML = '<span style="background:#444; padding:4px 8px; border-radius:4px; font-size:11px;">📝 Brouillon</span>';
            if(st === 'envoye') badgeHTML = `<span style="background:#3498db; padding:4px 8px; border-radius:4px; font-size:11px; color:white;">${myRole==='A3'?'📤 Envoyé':'📥 Reçu (À traiter)'}</span>`;
            if(st === 'attente') badgeHTML = '<span style="background:#fcca46; padding:4px 8px; border-radius:4px; font-size:11px; color:black;">⏳ En attente</span>';
            if(st === 'paye') badgeHTML = '<span style="background:#28a745; padding:4px 8px; border-radius:4px; font-size:11px; color:white;">💰 Payé</span>';
            if(st === 'retard') badgeHTML = '<span style="background:#ff4d4d; padding:4px 8px; border-radius:4px; font-size:11px; color:white;">🔴 En retard</span>';
            if(st === 'renvoye') badgeHTML = '<span style="background:#ff4d4d; padding:4px 8px; border-radius:4px; font-size:11px; color:white;">⚠️ À corriger</span>';

            const item = document.createElement('div'); item.className = 'invoice-item'; item.onclick = function() { openExistingInvoice(inv.id); };
            
            let btnDelete = '';
            if (myRole !== 'A3' || inv.authorId === myUserId) {
                btnDelete = `<button class="btn-icon btn-delete" onclick="deleteInvoice('${inv.id}', event)" title="Supprimer">🗑️</button>`;
            }

            item.innerHTML = `
                <div class="inv-info">
                    <div class="inv-id">#${inv.id}</div>
                    <div class="inv-client">${inv.client}</div>
                    ${myRole !== 'A3' ? `<div class="inv-author">👤 ${inv.authorName || 'Inconnu'}</div>` : ''}
                    <div class="inv-status">${badgeHTML}</div>
                    <div class="inv-date">${inv.date}</div>
                </div>
                <div class="inv-actions">${btnDelete}</div>`;
            listContainer.appendChild(item);
         });
    }

    function updateClientFilter() {
        const select = document.getElementById('clientFilter'); select.innerHTML = '<option value="all">Tous les clients</option>';
        let baseList = (myRole === 'A3' || currentInvTab === 'mine') ? invoicesData.filter(inv => inv.authorId === myUserId) : invoicesData;
        [...new Set(baseList.map(inv => inv.client))].sort().forEach(client => {
            if(client && client !== "Client Inconnu") { const opt = document.createElement('option'); opt.value = client; opt.textContent = client; select.appendChild(opt); }
        });
    }

    function filterInvoices() {
        const searchText = document.getElementById('searchInput').value.toLowerCase(); const clientFilter = document.getElementById('clientFilter').value;
        let baseList = (myRole === 'A3' || currentInvTab === 'mine') ? invoicesData.filter(inv => inv.authorId === myUserId) : invoicesData;
        const filtered = baseList.filter(inv => { return (inv.client.toLowerCase().includes(searchText) || String(inv.id).toLowerCase().includes(searchText)) && (clientFilter === 'all' || inv.client === clientFilter); });
        renderInvoiceList(filtered);
    }

    const inputAttrs = `type="text" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false"`;
    let invoicePageCount = 0; let globalSigCount = 0;

    function createInvoicePageHTML() {
        invoicePageCount++; globalSigCount++; const page = document.createElement('div'); page.className = 'page invoice-style';
        let rows = ""; for(let i=0; i<20; i++) { rows += `<tr><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td><td><input ${inputAttrs}></td></tr>`; }
        page.innerHTML = `
            <div class="top-section"><div class="header-main"><img src="logo_dussault.png" alt="F. Dussault"></div><div class="info-section"><div class="info-column"><div class="field"><label>M.</label><input ${inputAttrs}></div><div class="field"><input ${inputAttrs}></div><div class="field" style="margin-top:2px;"><label>Po client:</label><input ${inputAttrs}></div><div class="field"><label>Tél:</label><input ${inputAttrs}></div></div><div class="info-column"><div class="field"><label>Date:</label><input ${inputAttrs}></div><div class="field"><label>Travail à:</label><input ${inputAttrs}></div><div class="field"><label>Adresse:</label><input ${inputAttrs}></div><div class="field"><label>Po:</label><input ${inputAttrs}></div></div></div><div class="banner-cmmtq"><img src="cmmtq_et_slogan.png" alt="CMMTQ"></div></div>
            <table class="main-table"><thead><tr><th width="45">QUANT.</th><th>DESCRIPTION</th><th width="75">MONTANT<br>AMOUNT</th><th width="75">TOTAL</th></tr></thead><tbody>${rows}</tbody></table>
            <div class="bottom-section"><table class="time-wrapper"><tr><td class="time-label-col"><span>1 1/2% après 30 jours<br>after 30 days</span><h2># TEMPS</h2></td><td><table class="inner-table"><tr class="row-headers"><td style="width:25%">TARIF PAR HRE</td><td style="width:15%">CHARGE MIN.</td><td style="width:25%">TRANSPORT</td><td style="width:20%">HRE ARRIVÉE</td><td class="last-col" style="width:15%">INITIALE</td></tr><tr class="row-sublabels"><td>A.M.</td><td>INITIALE</td><td>P.M.</td><td></td><td class="last-col">INITIALE</td></tr><tr class="row-inputs"><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="input-box"><input ${inputAttrs}></div></td><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="flex-group">TOTAL <div class="input-box"><input ${inputAttrs}></div></div></td><td class="last-col"><div class="input-box"><input ${inputAttrs}></div></td></tr><tr class="row-inputs"><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="input-box"><input ${inputAttrs}></div></td><td><div class="flex-group">DE <div class="input-box"><input ${inputAttrs}></div> À <div class="input-box"><input ${inputAttrs}></div></div></td><td><div class="flex-group">TOTAL <div class="input-box"><input ${inputAttrs}></div></div></td><td class="last-col"><div class="input-box"><input ${inputAttrs}></div></td></tr></table></td></tr></table><div class="footer-grid"><div class="sig-box"><img id="sig-p-${globalSigCount}" class="display-sig" onclick="openModal('sig-p-${globalSigCount}')"><div class="sig-text">Signature du plombier</div></div><div class="sig-box"><img id="sig-c-${globalSigCount}" class="display-sig" onclick="openModal('sig-c-${globalSigCount}')"><div class="sig-text">Signature du client</div></div><div class="invoice-num-box"><input type="text" class="red-invoice-input" placeholder="No."></div></div></div>`;
        return page;
    }

    function addPage() { containerInvoice.appendChild(createInvoicePageHTML()); if(currentZoom !== 1.0) updateZoom(); }
    function duplicatePage() { const pages = containerInvoice.querySelectorAll('.page'); if (pages.length === 0) return; const sourcePage = pages[pages.length - 1]; const newPage = createInvoicePageHTML(); containerInvoice.appendChild(newPage); const sourceTopInputs = sourcePage.querySelectorAll('.top-section input'); const newTopInputs = newPage.querySelectorAll('.top-section input'); sourceTopInputs.forEach((input, index) => { if(newTopInputs[index]) newTopInputs[index].value = input.value; }); if(currentZoom !== 1.0) updateZoom(); }
    function deletePage() { if (containerInvoice.children.length > 1) { containerInvoice.removeChild(containerInvoice.lastElementChild); invoicePageCount--; } else { showAlert("Impossible de supprimer la dernière page."); } }
    function askClearInputs() { showConfirm("Effacer tout le contenu de la facture ?", function() { containerInvoice.querySelectorAll('input').forEach(input => input.value = ''); containerInvoice.querySelectorAll('.display-sig').forEach(img => img.src = ''); }); }

    const modal = document.getElementById('sig-modal'); const modalCanvas = document.getElementById('modal-canvas'); const ctx = modalCanvas.getContext('2d'); let currentTargetImgId = null, drawing = false;
    function resizeCanvas() { const ratio = Math.max(window.devicePixelRatio || 1, 1); modalCanvas.width = modalCanvas.offsetWidth * ratio; modalCanvas.height = modalCanvas.offsetHeight * ratio; ctx.scale(ratio, ratio); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; }
    function openModal(id) { currentTargetImgId = id; modal.style.display = 'flex'; setTimeout(resizeCanvas, 10); }
    function closeModal(id) { if(id) document.getElementById(id).style.display = 'none'; else { modal.style.display = 'none'; drawing = false; } }
    function clearModalCanvas() { ctx.clearRect(0, 0, modalCanvas.width, modalCanvas.height); }
    function saveSignature() { if(currentTargetImgId) document.getElementById(currentTargetImgId).src = modalCanvas.toDataURL(); closeModal(); }
    function getPos(e) { const rect = modalCanvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top }; }
    function startDrawing(e) { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); if(e.type === 'touchstart') e.preventDefault(); }
    function moveDrawing(e) { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); if(e.type === 'touchmove') e.preventDefault(); }
    modalCanvas.addEventListener('mousedown', startDrawing); window.addEventListener('mousemove', moveDrawing); window.addEventListener('mouseup', () => drawing = false); modalCanvas.addEventListener('touchstart', startDrawing, {passive: false}); modalCanvas.addEventListener('touchmove', moveDrawing, {passive: false}); modalCanvas.addEventListener('touchend', () => drawing = false);

    // --- ZOOM INTELLIGENT ET CENTRAGE DYNAMIQUE (Pour la Facture) ---
    let currentZoom = 1.0; 
    const minZoom = 0.3, maxZoom = 3.0;
    const zoomDisplay = document.getElementById('zoom-level');

    function fitToScreen() {
        const scrollArea = document.querySelector('.scroll-area');
        if(!scrollArea) return;
        const screenWidth = scrollArea.clientWidth;
        const pageWidth = 816; // 8.5 pouces en pixels environ (96dpi)

        if (screenWidth > 0 && screenWidth < pageWidth) {
            currentZoom = (screenWidth / pageWidth) * 0.98;
        } else {
            currentZoom = 1.0;
        }
        
        currentZoom = Math.round(currentZoom * 100) / 100;
        updateZoom();
    }

    function updateZoom() { 
        if (currentZoom < minZoom) currentZoom = minZoom; 
        if (currentZoom > maxZoom) currentZoom = maxZoom; 
        
        containerInvoice.style.transform = `scale(${currentZoom})`; 
        if(zoomDisplay) zoomDisplay.textContent = Math.round(currentZoom * 100) + '%'; 
        
        const scrollArea = document.querySelector('.scroll-area');
        if(scrollArea) {
            const screenWidth = scrollArea.clientWidth;
            const scaledWidth = 816 * currentZoom; 
            
            // Si la facture est plus petite que l'écran, on la centre.
            // Si on a zoomé, on la colle à gauche pour permettre le glissement.
            if (scaledWidth < screenWidth) {
                containerInvoice.style.marginLeft = ((screenWidth - scaledWidth) / 2) + "px";
            } else {
                containerInvoice.style.marginLeft = "0px";
            }
        }

        const unscaledHeight = containerInvoice.offsetHeight;
        const scaledHeight = unscaledHeight * currentZoom;
        
        if (currentZoom < 1.0) {
            containerInvoice.style.marginBottom = (scaledHeight - unscaledHeight + 50) + "px"; 
        } else if (currentZoom > 1.0) {
            containerInvoice.style.marginBottom = (currentZoom * 400) + "px"; 
        } else {
            containerInvoice.style.marginBottom = "100px"; 
        }
    }

    function adjustZoom(delta) { currentZoom += delta; currentZoom = Math.round(currentZoom * 10) / 10; updateZoom(); }
    function resetZoom() { fitToScreen(); } 

    // Écouteur pour ajuster le zoom si on tourne le téléphone
    window.addEventListener('resize', () => {
        if (document.getElementById('view-editor').style.display === 'flex') {
            fitToScreen();
        }
    });
    
    let initialDistance = 0, initialZoomState = 1.0; const scrollArea = document.querySelector('.scroll-area');
    scrollArea.addEventListener('touchstart', function(e) { if (e.touches.length === 2) { initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); initialZoomState = currentZoom; } }, { passive: false });
    scrollArea.addEventListener('touchmove', function(e) { if (e.touches.length === 2) { e.preventDefault(); const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); if (initialDistance > 0) { const diff = currentDistance / initialDistance; currentZoom = initialZoomState * diff; updateZoom(); } } }, { passive: false });
    
    initAuth();
</script>
</body>
