<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Facturation F.Dussault</title>
    
    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>
    
    <script src="../assets/shared/console-filter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <link rel="stylesheet" href="../assets/shared/shared.css">
    <script src="../assets/shared/shared.js"></script>
    <script src="../assets/shared/autosave.js"></script>
    <script src="../assets/shared/archive.js"></script>
    <script src="../assets/shared/pdf-export.js"></script>
    <script src="../assets/shared/signature.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--app-bg); 
            color: var(--text-light); 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }
        
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background-color: var(--app-bg); 
            overflow: hidden; 
        }

        .badge-status { 
            padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 5px; color: white; 
        }
        .badge-status .svg-icon { width: 12px; height: 12px; }
        .b-brouillon { background: #444; }
        .b-envoye { background: #3498db; }
        .b-traite { background: var(--btn-purple); } 
        .b-paye { background: #28a745; }
        .b-renvoye { background: #fd7e14; }
        .b-paper {
            background: rgba(91, 192, 235, 0.15);
            color: var(--btn-blue, #5BC0EB);
            border: 1px solid rgba(91, 192, 235, 0.4);
        }

        /* === Vue galerie facture papier === */
        .paper-invoice-view {
            max-width: 800px; margin: 20px auto; padding: 20px;
            background: #1f2027; border-radius: 12px; color: #ddd;
        }
        .paper-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #333; }
        .paper-meta {
            display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px;
            color: #aaa; font-size: 13px;
        }
        .paper-meta strong { color: #fff; }
        .paper-notes {
            background: #15161c; border-left: 3px solid var(--btn-yellow);
            padding: 12px 14px; border-radius: 6px; margin: 14px 0;
            color: #ddd; font-size: 14px; line-height: 1.5;
        }
        .paper-pages-list {
            display: flex; flex-direction: column; gap: 14px; margin-top: 16px;
        }
        .paper-page-wrap {
            background: #15161c; padding: 12px; border-radius: 8px;
            border: 1px solid #333;
        }
        .paper-page-num {
            color: var(--btn-blue); font-size: 13px; font-weight: bold;
            margin-bottom: 8px;
        }
        .paper-page-img {
            width: 100%; max-width: 100%; height: auto; display: block;
            border-radius: 6px; border: 1px solid #444;
            background: #fff; cursor: zoom-in;
        }

        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        
        .toolbar { display: flex; gap: 15px; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; background: #1e1f26; border: 1px solid #444; color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; color: #888; pointer-events: none; display: flex; align-items: center;}

        .tabs-container { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-tab { background: #1a1b23; color: #aaa; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .invoice-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 30px;}
        
        .invoice-item { 
            background-color: var(--card-bg); padding: 12px 20px; border-radius: 10px; display: grid;
            grid-template-columns: 80px 1fr 140px 130px 100px 44px; align-items: center; gap: 15px;
            transition: transform 0.2s, background-color 0.2s; cursor: pointer; border: 1px solid transparent;
            border-left: 4px solid transparent; margin-bottom: 8px;
        }
        .invoice-item:hover { transform: translateX(5px); background-color: #343542; border-left-color: var(--btn-yellow); }
        
        .inv-id { font-weight: bold; color: var(--btn-yellow); font-size: 15px; }
        .inv-client { font-weight: bold; font-size: 16px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-author { font-size: 14px; color: #888; font-style: italic; display: flex; align-items: center; gap: 6px; }
        .inv-status { display: flex; align-items: center; }
        .inv-date { color: #aaa; font-size: 14px; text-align: right; font-weight: 500; }
        .inv-actions { display: flex; justify-content: flex-end; align-items: center; }
        
        .btn-icon { background: #444; border: none; width: 36px; height: 36px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: white; flex-shrink: 0; }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: var(--btn-red); border: 1px solid transparent; }
        .btn-delete:hover { background: var(--btn-red); color: white; }

        #view-editor { display: none; flex-direction: column; height: 100%; }
        
        .top-bar { height: auto; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; background: rgba(30, 31, 38, 0.95); border-bottom: 1px solid #333; z-index: 101; flex-wrap: wrap; }
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-1px); }
        .btn-back { background-color: var(--btn-grey) !important; color: white !important; }
        .btn-save { background-color: var(--btn-green) !important; color: white !important; padding: 10px 30px; font-size: 14px; }
        .btn-send { background-color: var(--btn-blue) !important; color: white !important; }
        .btn-unlock { background-color: var(--btn-orange) !important; color: white !important; }
        .btn-return { background-color: var(--btn-red) !important; color: white !important; }

        .office-status-panel { background: #1a1b23; border: 1px solid #555; padding: 9px 20px; border-radius: 50px; display: flex; align-items: center; gap: 8px; white-space: nowrap; flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; cursor: pointer; position: relative; color: white; font-weight: bold; font-size: 14px; }
        .office-status-panel:hover { background: #22232c; border-color: #777; }
        
        .custom-select-options { position: fixed; background: rgba(43, 44, 54, 0.98); backdrop-filter: blur(10px); border: 1px solid #555; border-radius: 16px; overflow: hidden; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; min-width: 200px; flex-direction: column; }
        .custom-select-options.show { display: flex; animation: fadeIn 0.2s ease-out; }
        .custom-select-option { padding: 16px 20px; color: white; cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: bold; border-bottom: 1px solid #3a3b46; text-align: left; }
        .custom-select-option:hover { background: #3a3b46; color: var(--btn-yellow); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .correction-banner { background: rgba(255, 77, 77, 0.15); border: 1px dashed var(--btn-red); padding: 15px; margin: 20px auto 0 auto; max-width: 8.5in; border-radius: 8px; color: white; line-height: 1.5; font-size: 14px; display: flex; gap: 10px; }
        .scroll-area { flex: 1; overflow: auto; padding: 15px 0; display: block; touch-action: auto; }
        #invoice-container { display: block; width: 8.5in; transform-origin: top left; transition: transform 0.1s ease-out; padding-bottom: 50px; }
        
        .page { width: 8.5in; height: 11in; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; display: flex; flex-direction: column; position: relative; margin: 0 0 20px 0; color: black; padding: 0.25in; flex-shrink: 0; }
        input { outline: none; border-radius: 0; }
        input:focus { background-color: transparent !important; border-bottom: 2px solid #000 !important; }
        
        .top-section { width: 100%; }
        .header-main { width: 100%; margin-top: -15px; margin-bottom: 0px; }
        .header-main img { width: 100%; height: auto; display: block; }
        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2px; }
        .info-column { display: flex; flex-direction: column; gap: 1px; }
        .field { display: flex; align-items: flex-end; font-size: 12px; font-weight: bold; min-height: 22px; }
        .field label { white-space: nowrap; margin-right: 5px; }
        .field input { background-color: var(--blue-bg) !important; border: none; border-bottom: 1px solid black; flex-grow: 1; height: 18px; padding: 0 5px; }
        
        .banner-cmmtq { width: 100%; margin: 7px 0 5px 0; text-align: center; }
        .banner-cmmtq img { width: 100%; height: auto; display: block; margin: 0 auto; }
        
        .main-table { width: 100%; border-collapse: collapse; border: none; margin-bottom: 10px; } 
        .main-table thead { border-top: 4px double black; }
        .main-table th { border: 1px solid black; font-size: 9px; background: #eee; padding: 2px; }
        .main-table td { border: 1px solid black; height: 24px; background-color: var(--blue-bg); padding: 0; }
        .main-table tbody tr:last-child td { border-bottom: 4px double black; }
        .main-table input { width: 100%; height: 100%; background: transparent; border: none; padding: 0 5px; box-sizing: border-box; font-size: 12px; color: black; font-weight: bold;}
        
        .bottom-section { margin-top: auto; width: 100%; }
        .time-wrapper { width: 100%; border: 1px solid black; border-collapse: collapse; table-layout: fixed; margin-top: 0; }
        .time-label-col { width: 110px; border-right: 1px solid black; padding: 5px; vertical-align: top; }
        .time-label-col span { font-size: 8px; font-weight: bold; }
        .time-label-col h2 { font-size: 18px; margin: 5px 0 0 0; font-weight: 900; }
        
        .inner-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .row-headers td { border-right: 1px solid black; border-bottom: 1px solid black; height: 30px; font-size: 8px; font-weight: bold; text-align: center; vertical-align: top; padding-top: 2px; }
        .row-sublabels td { font-size: 9px; font-weight: bold; text-align: center; padding: 2px 0; border-right: none; }
        .row-inputs td { padding: 2px 5px; vertical-align: middle; border-right: none; height: 26px; }
        .input-box { background-color: var(--blue-bg); border-bottom: 1px solid black; display: flex; align-items: center; padding: 0 3px; height: 18px; }
        .input-box input { background: transparent; border: none; width: 100%; height: 100%; text-align: center; font-size: 10px; font-weight: bold; color: black;}
        .flex-group { display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: bold; }
        .last-col { border-right: none !important; }
        
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr 150px; align-items: end; margin-top: 5px; gap: 10px; }
        .sig-box { width: 100%; text-align: center; }
        .display-sig { border: none; border-bottom: 1px solid #000; background-color: var(--blue-bg); width: 100%; height: 50px; cursor: pointer; object-fit: contain; }
        .sig-text { font-size: 10px; font-weight: bold; margin-top: 2px; }
        .invoice-num-box { text-align: right; padding-bottom: 5px; display: flex; justify-content: flex-end; align-items: flex-end; }
        .red-invoice-input { color: #dc3545; font-weight: bold; font-size: 18px; font-family: 'Courier New', Courier, monospace; text-align: right; border: none; background-color: var(--blue-bg); width: 100%; margin: 0; padding: 0 5px; }

        #sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: white; padding: 15px; border-radius: 8px; text-align: center; width: 90%; max-width: 800px; color:black;}
        #modal-canvas { border: 2px dashed #444; background: #fff; width: 100%; height: 350px; touch-action: none; }
        .modal-btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        .btn-ok { background: var(--btn-green); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}
        .btn-clear { background: var(--btn-yellow); color: black; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .btn-cancel { background: var(--btn-red); padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;}

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 31, 38, 0.95); padding: 5px 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #555; }
        .zoom-controls button { background: var(--btn-yellow); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #1e1f26; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 4000; justify-content: center; align-items: center; }
        .custom-modal-card { background: var(--card-bg); width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .custom-modal-title { font-size: 20px; color: var(--btn-red); margin-bottom: 15px; font-weight: bold; display:flex; justify-content:center; align-items:center; gap:8px;}
        .custom-modal-msg { color: var(--text-light); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; }
        .btn-modal-cancel { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-modal-confirm { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-modal-ok { background: var(--btn-yellow); color: black; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .custom-group { text-align: left; margin-bottom: 15px; }

        @media (max-width: 1024px) {
            .top-bar { padding: 10px 85px 10px 10px; gap: 10px; height: 65px; overflow-x: auto; justify-content: flex-start; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .top-bar::-webkit-scrollbar { display: none; }
            .top-bar .action-btn, .spacer-mobile, .office-status-panel { flex-shrink: 0; width: auto; margin-bottom: 0; }
            .top-bar .action-btn { font-size: 11px; padding: 8px 15px; }
            .office-status-panel { font-size: 11px; padding: 8px 15px; }
        }
        
        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; width: 100%; }
            .dash-title { padding-right: 80px; width: 100%; }
            .dash-header .action-btn { width: 100%; justify-content: center; font-size: 14px;}
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; justify-content: center; }
            .toolbar { flex-direction: column; width: 100%; }
            .search-box, .search-box input { width: 100%; }
            .zoom-controls { display: none !important; }
            
            .invoice-item {
                display: grid; grid-template-columns: 1fr auto;
                grid-template-areas: "id id" "client client" "author author" "status date";
                align-items: center; gap: 4px 12px; padding: 16px; border-radius: 12px; 
                border: 1px solid #3a3b46; border-left: 1px solid #3a3b46; margin-bottom: 12px; position: relative;
            }
            .invoice-item:hover { transform: translateY(-2px); background-color: #30313c; border-color: #555; border-left-color: #555; }
            .inv-id { grid-area: id; font-size: 15px; font-weight: 800; width: auto; }
            .inv-client { grid-area: client; font-size: 18px; font-weight: 700; margin-top: 0px; margin-bottom: 4px; white-space: normal; overflow: visible; padding-right: 45px; width: auto; }
            .inv-author { grid-area: author; font-size: 13px; margin-bottom: 8px; width: auto; color: #aaa;}
            .inv-status { grid-area: status; justify-self: start; width: auto; }
            .inv-date { grid-area: date; text-align: right; justify-self: end; width: auto; font-size: 12px; color: #888;}
            .inv-actions { position: absolute; top: 16px; right: 16px; margin: 0; }
            .btn-icon { width: 36px; height: 36px; border-radius: 10px; } 
        }
        
        @media print {
            @page { margin: 0; size: letter; }
            html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; background: white !important; overflow: visible !important;}
            .top-bar, #sig-modal, .zoom-controls, #view-dashboard, .custom-modal-overlay, .correction-banner { display: none !important; }
            .main-content, #view-editor, .scroll-area { display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; position: static !important; padding: 0 !important; }
            #invoice-container { margin: 0 !important; padding: 0 !important; transform: none !important; width: 100% !important; display: block !important; }
            .page { width: 100% !important; max-width: 100% !important; height: auto !important; min-height: 11in !important; margin: 0 !important; box-shadow: none !important; page-break-after: always !important; padding: 20px !important; display: block !important; }
            .field input, .main-table td, .display-sig, .input-box, .red-invoice-input { background-color: transparent !important; }
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement du module...</div>
</div>

<script>
    // --- CONNEXION SUPABASE ---

    let myRole = 'A3';
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentInvTab = 'mine';

    let invoicesData = [];
    let currentPage = 0;       // Page actuelle
    const PAGE_SIZE = 25;      // Factures par chargement
    let hasMore = false;       // S'il y a plus de données à charger
    let currentInvoiceId = null;
    let autosave = null;       // Instance de sauvegarde automatique

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'view_admin'] },
        'A2': { perms: ['view_all_invoices', 'approve_timesheets', 'manage_tools'] },
        'A3': { perms: ['transfer_tools'] }
    };

    let _cachedRoles = null;

    async function loadRolesCache() {
        if (_cachedRoles) return;
        try {
            const { data } = await supabaseClient
                .from('parametres_globaux')
                .select('valeur')
                .eq('cle', 'roles_config')
                .maybeSingle();
            _cachedRoles = data?.valeur ? JSON.parse(data.valeur) : defaultRolesConfig;
        } catch(e) { _cachedRoles = defaultRolesConfig; }
    }

    function hasPermission(role, permId) {
        if (role === 'A0') return true;
        const roles = _cachedRoles || defaultRolesConfig;
        const roleData = roles[role] || defaultRolesConfig[role];
        if (!roleData || !roleData.perms) return false;
        return roleData.perms.includes(permId);
    }

    async function initAuth() {
        await loadRolesCache();
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.top.location.href = '../login.html'; return; }

            myUserId = user.id;
            const { data: profils } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).limit(1);
            
            if (profils && profils.length > 0) {
                myRole = profils[0].role;
                myUserName = profils[0].prenom_nom || user.email;
                
                if (hasPermission(myRole, 'view_all_invoices')) {
                    const tabs = document.getElementById('invoice-tabs');
                    if(tabs) tabs.style.display = 'flex';
                } else {
                    currentInvTab = 'mine';
                    // A3 doit quand même pouvoir consulter ses propres archives
                    const tabs = document.getElementById('invoice-tabs');
                    if (tabs) {
                        tabs.style.display = 'flex';
                        const tabAll = document.getElementById('tab-all');
                        if (tabAll) tabAll.style.display = 'none';
                    }
                }
            }
            await loadData();
        } catch (error) {
            console.error("Erreur d'initialisation :", error);
        } finally {
            const loader = document.getElementById('security-loader');
            if (loader) loader.style.display = 'none';
            window.parent.postMessage({ type: 'module_ready', module: 'view-factures' }, '*');
        }
    }

    // --- LECTURE SUPABASE (REMPLACE LOCALSTORAGE) ---
    async function loadData(reset = true) {
        try {
            // Reset de la pagination si nouveau chargement
            if (reset) {
                currentPage = 0;
                invoicesData = [];
            }

            const from = currentPage * PAGE_SIZE;
            const to = from + PAGE_SIZE - 1;

            let query = supabaseClient.from('factures').select('*');
            if (currentInvTab === 'archives') {
                // Onglet Archives : on ne veut QUE les archivés
                query = query.eq('is_archived', true);
                // A3/A2 voient seulement leurs propres archives
                if (!hasPermission(myRole, 'view_all_invoices') ||
                    (window.ArchiveFD && !window.ArchiveFD.canSeeAllArchives(myRole))) {
                    query = query.eq('author_id', myUserId);
                }
            } else {
                // Onglets normaux : on exclut les archivés
                query = query.eq('is_archived', false);
                if (currentInvTab === 'mine') {
                    query = query.eq('author_id', myUserId);
                } else {
                    query = query.neq('status', 'brouillon');
                }
            }

            const { data, error } = await query
                .order('created_at', { ascending: false })
                .range(from, to + 1); // +1 pour savoir s'il y a plus

            if (error) {
                console.error('Erreur chargement factures:', error);
                throw error;
            }

            if (data) {
                // Si on reçoit plus que PAGE_SIZE, il y en a encore
                hasMore = data.length > PAGE_SIZE;
                const pageData = data.slice(0, PAGE_SIZE);

                const mapped = pageData.map(dbInv => ({
                    id: dbInv.id,
                    client: dbInv.client,
                    date: dbInv.date,
                    status: dbInv.status,
                    inputValues: dbInv.input_values || [],
                    sigValues: dbInv.sig_values || [],
                    pageCount: dbInv.page_count || 1,
                    authorId: dbInv.author_id,
                    authorName: dbInv.author_name,
                    returnNote: dbInv.return_note,
                    isArchived: dbInv.is_archived === true,
                    archivedAt: dbInv.archived_at,
                    archivedByName: dbInv.archived_by_name,
                    isPaper: dbInv.is_paper === true,
                    paperPages: dbInv.paper_pages || null,
                    timestamp: new Date(dbInv.created_at).getTime()
                }));

                if (reset) {
                    invoicesData = mapped;
                } else {
                    invoicesData = [...invoicesData, ...mapped];
                }
            }
        } catch (e) {
            console.error("Erreur de chargement de la base de données :", e);
            if (reset) invoicesData = [];
        }
        renderInvoiceList();
    }

    async function chargerPlus() {
        const btn = document.getElementById('btn-charger-plus');
        if (btn) { btn.disabled = true; btn.textContent = 'Chargement...'; }
        currentPage++;
        await loadData(false);
    }

    function switchInvTab(tab) {
        currentInvTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        const tabArch = document.getElementById('tab-archives');

    function applyEditorSecurity(invoiceObj) {
        const isBureau = hasPermission(myRole, 'view_all_invoices');
        const status = invoiceObj ? (invoiceObj.status || 'brouillon') : 'brouillon';
        const isAuthor = invoiceObj ? (invoiceObj.authorId === myUserId || !invoiceObj.authorId) : true;
        const isArchived = invoiceObj && invoiceObj.isArchived === true;
        // isPaper = soit la facture chargée EST une facture papier, soit on vient de basculer en mode papier
        const isPaper = (invoiceObj && invoiceObj.isPaper === true) || isPaperMode;

        // === FACTURE PAPIER ===
        // En mode papier on peut éditer/envoyer comme une facture normale,
        // mais on cache les boutons qui n'ont pas de sens (ajouter/dupliquer page,
        // effacer formulaire). Le bouton btn-paper RESTE visible — il sert de
        // toggle pour revenir au mode numérique.
        if (isPaper) {
            // Cacher les boutons spécifiques au formulaire numérique (mais PAS btn-paper)
            ['btn-add-page', 'btn-dup-page', 'btn-del-page', 'btn-clear'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });

            // Déterminer si on peut éditer (mêmes règles que normal)
            let canEditPaper = false;
            if (!isBureau) { if (status === 'brouillon' || status === 'attente') canEditPaper = true; }
            else { if (isAuthor && (status === 'brouillon' || status === 'attente')) canEditPaper = true; }
            if (isArchived) canEditPaper = false;

            // Le bouton toggle btn-paper : visible seulement si on peut éditer
            const btnPaperEl = document.getElementById('btn-paper');
            if (btnPaperEl) btnPaperEl.style.display = canEditPaper ? 'flex' : 'none';

            // Mettre le label/icône à jour
            updatePaperToggleButton();

            // Boutons Sauvegarder / Envoyer : visibles seulement si éditable
            const btnSave = document.getElementById('btn-save');
            const btnSend = document.getElementById('btn-send');
            if (btnSave) btnSave.style.display = canEditPaper ? 'flex' : 'none';
            if (btnSend) btnSend.style.display = canEditPaper ? 'flex' : 'none';

            // Désactiver les inputs du header papier si lecture seule
            containerInvoice.querySelectorAll('.paper-client-input, .paper-date-input, .paper-numero-input').forEach(inp => {
                inp.readOnly = !canEditPaper;
                inp.style.background = canEditPaper ? '' : '#f5f5f5';
            });
            // Cacher les boutons de retrait (X) sur les pages si lecture seule
            containerInvoice.querySelectorAll('.ppd-remove').forEach(btn => {
                btn.style.display = canEditPaper ? 'flex' : 'none';
            });
            // Cacher le bouton "+" en lecture seule
            containerInvoice.querySelectorAll('.paper-add-page-btn').forEach(btn => {
                btn.style.display = canEditPaper ? 'flex' : 'none';
            });

            const btnUnlock = document.getElementById('btn-unlock');
            const btnReturn = document.getElementById('btn-return');
            // Le bureau peut traiter / renvoyer / payer la facture papier comme une normale
            if (isBureau && status !== 'brouillon' && status !== 'attente' && !isArchived) {
                if (btnUnlock) btnUnlock.style.display = 'flex';
                if (btnReturn) btnReturn.style.display = 'flex';
            } else {
                if (btnUnlock) btnUnlock.style.display = 'none';
                if (btnReturn) btnReturn.style.display = 'none';
            }

            const statusDiv = document.getElementById('office-status-div');
            if (statusDiv) {
                if (isBureau && status !== 'brouillon' && status !== 'attente') {
                    statusDiv.style.display = 'flex';
                    const statusMap = { 'envoye': 'Reçu (À traiter)', 'traite': 'Traité', 'attente': 'À corriger', 'paye': 'Facture payée', 'brouillon': 'Brouillon' };
                    const statusText = document.getElementById('current-status-text');
                    if (statusText) statusText.textContent = statusMap[status] || status;
                } else { statusDiv.style.display = 'none'; }
            }

            // Bannière de correction (si le bureau a renvoyé) — affichage seul
            const banner = document.getElementById('correction-banner');
            if (status === 'attente' && invoiceObj && invoiceObj.returnNote) {
                if (banner) banner.style.display = 'flex';
                const noteText = document.getElementById('correction-note-text');
                if (noteText) noteText.textContent = invoiceObj.returnNote;
            } else { if (banner) banner.style.display = 'none'; }

            return;
        }

        let canEdit = false;
        if (!isBureau) { if (status === 'brouillon' || status === 'attente') canEdit = true; } 
        else { if (isAuthor && (status === 'brouillon' || status === 'attente')) canEdit = true; }
        // Override absolu : un document archivé est en lecture seule pour TOUT LE MONDE
        if (isArchived) canEdit = false;

        document.getElementById('btn-save').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-add-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-dup-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-del-page').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btn-clear').style.display = canEdit ? 'flex' : 'none';
        
        const btnSend = document.getElementById('btn-send'); if(btnSend) btnSend.style.display = canEdit ? 'flex' : 'none';
        const btnPaper = document.getElementById('btn-paper'); if(btnPaper) btnPaper.style.display = canEdit ? 'flex' : 'none';
        const btnUnlock = document.getElementById('btn-unlock'); const btnReturn = document.getElementById('btn-return');
        
        if (isBureau && status !== 'brouillon' && status !== 'attente') {
            if(btnUnlock) btnUnlock.style.display = 'flex'; if(btnReturn) btnReturn.style.display = 'flex';
        } else {
            if(btnUnlock) btnUnlock.style.display = 'none'; if(btnReturn) btnReturn.style.display = 'none';
        }

        const statusDiv = document.getElementById('office-status-div');
        if (statusDiv) {
            if (isBureau && status !== 'brouillon' && status !== 'attente') {
                statusDiv.style.display = 'flex';
                const statusMap = { 'envoye': 'Reçu (À traiter)', 'traite': 'Traité', 'attente': 'À corriger', 'paye': 'Facture payée', 'brouillon': 'Brouillon' };
                const statusText = document.getElementById('current-status-text');
                if(statusText) statusText.textContent = statusMap[status] || status;
            } else { statusDiv.style.display = 'none'; }
        }

        const banner = document.getElementById('correction-banner');
        if (status === 'attente' && invoiceObj && invoiceObj.returnNote) {
            if(banner) banner.style.display = 'flex';
            const noteText = document.getElementById('correction-note-text');
            if(noteText) noteText.textContent = invoiceObj.returnNote;
        } else { if(banner) banner.style.display = 'none'; }

        toggleInputs(canEdit);
    }

    function startAutosave() {

        autosave = window.AutosaveFD.create({
            module: 'facture',

            draftIdGetter: () => currentInvoiceId
        });

        if (autosave.hasDraft()) {
            autosave.restore();
        }
    }

        if (autosave) {
            try { autosave.stop(); } catch(e){}
            autosave = null;
        }
    }

    // --- SAUVEGARDE VERS SUPABASE ---
    async function saveCurrentInvoice(isSending = false) {
        // === MODE PAPIER : sauvegarde simplifiée ===
        if (isPaperMode) {
            return saveCurrentPaperInvoice(isSending);
        }

        const firstPage = containerInvoice.querySelector('.page');
        if (!firstPage) return;

        // Désactiver le bouton pendant la sauvegarde
        const btnSave = document.getElementById('btn-save');
        const originalText = btnSave ? btnSave.innerHTML : '';
        if (btnSave) {
            btnSave.disabled = true;
            btnSave.innerHTML = '<svg class="svg-icon" style="animation:spin 1s linear infinite;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none" stroke-dasharray="40" stroke-dashoffset="10"></circle></svg> Sauvegarde...';
        }
        
        const inputs = firstPage.querySelectorAll('.top-section input');
        const clientName = inputs[0] ? inputs[0].value.trim() : "Client Inconnu";
        
        let dateVal = inputs[4] ? inputs[4].value.trim() : "";
        if (!dateVal) {
             const today = new Date();
             dateVal = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
        }
        
        const invoiceNumInput = firstPage.querySelector('.red-invoice-input');
        // Le numéro est maintenant garanti par currentInvoiceId (auto-généré à l'ouverture)
        let invoiceNum = currentInvoiceId 
            || (invoiceNumInput && invoiceNumInput.value.trim() !== '' ? invoiceNumInput.value.trim() : null);

        if (!invoiceNum) {
            // Cas exceptionnel : on demande à Supabase un nouveau numéro
            try {
                const { data, error } = await supabaseClient.rpc('next_facture_number');
                if (error) throw error;
                invoiceNum = data || ('F-' + Date.now().toString().slice(-4));
            } catch (e) {
                invoiceNum = 'F-' + Date.now().toString().slice(-4);
            }
        }

        const inputValues = Array.from(containerInvoice.querySelectorAll('input')).map(input => input.value);
        const sigValues = Array.from(containerInvoice.querySelectorAll('.display-sig')).map(img => img.getAttribute('src'));
        const pageCount = containerInvoice.querySelectorAll('.page').length;
        
        let currentStatus = 'brouillon';
        let existingInvoice = invoicesData.find(inv => inv.id === currentInvoiceId || inv.id === invoiceNum);
        if (existingInvoice) { currentStatus = existingInvoice.status || 'brouillon'; }
        if (isSending) currentStatus = 'envoye';
        
        // Construction du paquet pour la base de données
        const dbPayload = { 
            id: invoiceNum, 
            client: clientName || "Client Inconnu", 
            date: dateVal, 
            input_values: inputValues, 
            sig_values: sigValues, 
            page_count: pageCount, 
            author_id: existingInvoice ? existingInvoice.authorId : myUserId,
            author_name: existingInvoice ? existingInvoice.authorName : myUserName,
            status: currentStatus,
            return_note: existingInvoice ? existingInvoice.returnNote : ""
        };
        
        // withRetry : retry auto en cas d'erreur transitoire (lock Supabase entre iframes, etc.)
        const retry = window.SharedFD ? window.SharedFD.withRetry : (op) => op();
        const { error } = await retry(() => supabaseClient.from('factures').upsert(dbPayload));

        // Réactiver le bouton dans tous les cas
        if (btnSave) {
            btnSave.disabled = false;
            btnSave.innerHTML = originalText;
        }
        
        if (error) {
            // Message user-friendly selon le type d'erreur
            const msg = (error.message || '').toLowerCase();
            let userMsg;
            if (msg.includes('lock broken') || error.name === 'AbortError') {
                userMsg = "<div style='color:var(--btn-red);'>❌ Une autre opération est en cours. Attends 2 secondes et réessaie.</div>";
            } else if (msg.includes('failed to fetch') || msg.includes('network')) {
                userMsg = "<div style='color:var(--btn-red);'>❌ Pas de connexion internet. Vérifie ta connexion et réessaie.</div>";
            } else if (msg.includes('row-level security') || error.code === '42501') {
                userMsg = "<div style='color:var(--btn-red);'>❌ Tu n'as pas la permission de modifier cette facture.</div>";
            } else {
                userMsg = "<div style='color:var(--btn-red);'>❌ Erreur de sauvegarde : " + error.message + "</div>";
            }
            showAlert(userMsg);
            return;
        }

        currentInvoiceId = invoiceNum; 
        // La sauvegarde Supabase a réussi : on peut effacer le brouillon localStorage
        clearAutosaveForCurrent();
        await loadData();
        
        if(isSending) { 
            showAlert("<div style='color:var(--btn-blue);'>Document verrouillé et envoyé au bureau avec succès !</div>"); 
            showDashboard(); 
        } else { 
            showAlert("<div style='color:var(--btn-green);'>Facture sauvegardée sur le serveur.</div>"); 
            const newInvoiceObj = invoicesData.find(inv => inv.id === currentInvoiceId);
            applyEditorSecurity(newInvoiceObj); 
        }
    }

    const modal = document.getElementById('sig-modal'); const modalCanvas = document.getElementById('modal-canvas'); const ctx = modalCanvas.getContext('2d'); let currentTargetImgId = null; let drawing = false;
    function resizeCanvas() { const ratio = Math.max(window.devicePixelRatio || 1, 1); modalCanvas.width = modalCanvas.offsetWidth * ratio; modalCanvas.height = modalCanvas.offsetHeight * ratio; ctx.scale(ratio, ratio); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; }

    function moveDrawing(e) { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); if(e.type === 'touchmove') e.preventDefault(); }
    modalCanvas.addEventListener('mousedown', startDrawing); window.addEventListener('mousemove', moveDrawing); window.addEventListener('mouseup', () => drawing = false); modalCanvas.addEventListener('touchstart', startDrawing, {passive: false}); modalCanvas.addEventListener('touchmove', moveDrawing, {passive: false}); modalCanvas.addEventListener('touchend', () => drawing = false);

    // --- LOGIQUE ZOOM ---
    let currentZoom = 1.0; const minZoom = 0.3; const maxZoom = 3.0; const zoomDisplay = document.getElementById('zoom-level');
    function fitToScreen() {
        const scrollArea = document.querySelector('.scroll-area');
        if (!scrollArea) return;
        const screenWidth = scrollArea.clientWidth;
        // Si la vue n'est pas encore rendue (clientWidth=0), on réessaie au prochain frame
        // C'est ce qui causait le débordement de la feuille sur mobile
        if (screenWidth === 0) {
            requestAnimationFrame(fitToScreen);
            return;
        }
        const pageWidth = 816;
        if (screenWidth < pageWidth) {
            currentZoom = (screenWidth / pageWidth) * 0.98;
        } else {
            currentZoom = 1.0;
        }
        currentZoom = Math.round(currentZoom * 100) / 100;
        updateZoom();
    }
    function updateZoom() { if (currentZoom < minZoom) currentZoom = minZoom; if (currentZoom > maxZoom) currentZoom = maxZoom; containerInvoice.style.transform = `scale(${currentZoom})`; if(zoomDisplay) { zoomDisplay.textContent = Math.round(currentZoom * 100) + '%'; } const scrollArea = document.querySelector('.scroll-area'); if(scrollArea) { const screenWidth = scrollArea.clientWidth; const scaledWidth = 816 * currentZoom; if (scaledWidth < screenWidth) { containerInvoice.style.marginLeft = ((screenWidth - scaledWidth) / 2) + "px"; } else { containerInvoice.style.marginLeft = "0px"; } } const unscaledHeight = containerInvoice.offsetHeight; const scaledHeight = unscaledHeight * currentZoom; if (currentZoom < 1.0) { containerInvoice.style.marginBottom = (scaledHeight - unscaledHeight + 50) + "px"; } else if (currentZoom > 1.0) { containerInvoice.style.marginBottom = (currentZoom * 400) + "px"; } else { containerInvoice.style.marginBottom = "100px"; } }

    // Bascule en mode papier (depuis le bouton "Facture papier")
    // Toggle entre mode papier et mode numérique (formulaire)
    function togglePaperMode() {
        if (isPaperMode) {
            // On est en mode papier → revenir au mode numérique
            switchToDigitalMode();
        } else {
            // On est en mode numérique → passer en mode papier
            // Si on a déjà saisi du contenu dans le formulaire, prévenir
            const allInputs = containerInvoice.querySelectorAll('input:not(.red-invoice-input):not([type="date"])');
            const hasContent = Array.from(allInputs).some(i => i.value && i.value.trim());
            if (hasContent) {
                if (!confirm("Passer en mode 'facture papier' va supprimer le contenu du formulaire actuel. Continuer ?")) return;
            }
            switchToPaperMode();
        }
    }

    // Réception des fichiers (camera ou galerie)
    async function addPaperPages(fileList) {
        if (!fileList || fileList.length === 0) return;
        if (!isPaperMode) return; // sécurité : on n'est pas en mode papier
        const files = Array.from(fileList);
        for (const file of files) {
            if (!file.type.startsWith('image/')) continue;
            if (file.size > 10 * 1024 * 1024) {
                showAlert(`L'image "${file.name}" est trop grosse (max 10 Mo).`);
                continue;
            }
            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
            paperPages.push({ file, dataUrl, uploaded: false });
        }
        renderPaperPagesInEditor();
    }

    function removePaperPage(idx) {
        paperPages.splice(idx, 1);
        renderPaperPagesInEditor();
    }

    // Téléverser une image vers Supabase Storage et retourner son URL publique
    async function uploadPaperImage(file, idx) {
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const safeExt = /^[a-z0-9]+$/.test(ext) ? ext : 'jpg';
        const uniqueName = `paper_${Date.now()}_${idx}_${Math.random().toString(36).substring(2, 8)}.${safeExt}`;
        const filePath = `factures-papier/${myUserId}/${uniqueName}`;

        const { error: uploadError } = await supabaseClient
            .storage.from('pieces_jointes')
            .upload(filePath, file, { contentType: file.type });
        if (uploadError) throw uploadError;

        const { data: { publicUrl } } = supabaseClient
            .storage.from('pieces_jointes')
            .getPublicUrl(filePath);
        return { url: publicUrl, name: file.name, path: filePath };
    }

    // Téléverser toutes les pages non encore uploadées
    async function uploadAllPaperPages() {
        const progress = document.getElementById('paper-progress');
        const progressText = document.getElementById('paper-progress-text');
        progress.classList.add('show');
        try {
            for (let i = 0; i < paperPages.length; i++) {
                const p = paperPages[i];
                if (p.uploaded) continue;
                progressText.textContent = `Téléversement page ${i + 1}/${paperPages.length}…`;
                const result = await uploadPaperImage(p.file, i);
                paperPages[i] = { ...p, ...result, uploaded: true };
            }
        } finally {
            progress.classList.remove('show');
        }
    }

    // Récupérer les données du header papier (client, date, numéro)
    function getPaperHeaderData() {
        const clientInp = containerInvoice.querySelector('.paper-client-input');
        const dateInp = containerInvoice.querySelector('.paper-date-input');
        const numInp = containerInvoice.querySelector('.paper-numero-input');
        return {
            client: clientInp ? clientInp.value.trim() : '',
            date: dateInp ? dateInp.value : new Date().toISOString().split('T')[0],
            numero: numInp ? numInp.value.trim() : ''
        };
    }

    // Restaurer le mode papier quand on rouvre une facture papier existante
    function restorePaperMode(invoice) {
        isPaperMode = true;
        paperPages = (invoice.paperPages || []).map(p => ({
            url: p.url, name: p.name, path: p.path, uploaded: true
        }));
        renderPaperEditor();
        // Cacher les boutons du formulaire mais garder btn-paper (toggle)
        ['btn-add-page', 'btn-dup-page', 'btn-del-page', 'btn-clear'].forEach(id => {
            const el = document.getElementById(id); if (el) el.style.display = 'none';
        });
        updatePaperToggleButton();
    }

    // Réinitialiser à la sortie de l'éditeur
    function resetPaperMode() {
        isPaperMode = false;
        paperPages = [];
        // Remettre le bouton toggle à son état initial ("Facture papier")
        if (typeof updatePaperToggleButton === 'function') updatePaperToggleButton();
    }

    // Sauvegarde Supabase en mode papier (brouillon ou envoi au bureau)
    async function saveCurrentPaperInvoice(isSending = false) {
        if (paperPages.length === 0) {
            showAlert("Veuillez ajouter au moins une page (photo) avant de sauvegarder.");
            return;
        }

        const btnSave = document.getElementById('btn-save');
        const btnSend = document.getElementById('btn-send');
        const originals = {};
        if (btnSave) { originals.save = btnSave.innerHTML; btnSave.disabled = true; btnSave.innerHTML = '<svg class="svg-icon" style="animation:spin 1s linear infinite;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none" stroke-dasharray="40" stroke-dashoffset="10"></circle></svg> Sauvegarde...'; }
        if (btnSend) { originals.send = btnSend.innerHTML; btnSend.disabled = true; }

        try {
            // 1. Téléverser les photos non encore uploadées
            await uploadAllPaperPages();

            // 2. Récupérer les métadonnées du header
            const meta = getPaperHeaderData();

            // 3. Numéro : si vide, en réserver un
            let invoiceNum = meta.numero || currentInvoiceId;
            if (!invoiceNum) {
                try {
                    const { data, error } = await supabaseClient.rpc('next_facture_number');
                    if (!error && data) invoiceNum = data;
                } catch (e) { /* fallback */ }
                if (!invoiceNum) invoiceNum = 'F-' + Date.now().toString().slice(-4);
            }

            // 4. Statut
            let existingInvoice = invoicesData.find(inv => inv.id === currentInvoiceId || inv.id === invoiceNum);
            let currentStatus = existingInvoice ? (existingInvoice.status || 'brouillon') : 'brouillon';
            if (isSending) currentStatus = 'envoye';

            // 5. Construire le payload (uniquement les images, pas le formulaire)
            const cleanPaperPages = paperPages.map(p => ({
                url: p.url, name: p.name || 'page.jpg', path: p.path
            }));
            const dbPayload = {
                id: invoiceNum,
                client: meta.client || 'Facture papier',
                date: meta.date,
                input_values: [],
                sig_values: [],
                page_count: paperPages.length,
                author_id: existingInvoice ? existingInvoice.authorId : myUserId,
                author_name: existingInvoice ? existingInvoice.authorName : myUserName,
                status: currentStatus,
                return_note: existingInvoice ? existingInvoice.returnNote : "",
                is_paper: true,
                paper_pages: cleanPaperPages
            };

            const retry = window.SharedFD ? window.SharedFD.withRetry : (op) => op();
            const { error } = await retry(() => supabaseClient.from('factures').upsert(dbPayload));
            if (error) throw error;

            currentInvoiceId = invoiceNum;
            clearAutosaveForCurrent();
            await loadData();

            if (isSending) {
                showAlert(`✅ Facture papier #${invoiceNum} envoyée au bureau !`);
                showDashboard();
            } else {
                showAlert(`✅ Facture papier #${invoiceNum} sauvegardée.`);
            }
        } catch (e) {
            const msg = (e.message || '').toLowerCase();
            let userMsg = "<div style='color:var(--btn-red);'>❌ Erreur : " + (e.message || 'inconnue') + "</div>";
            if (msg.includes('row-level security') || e.code === '42501') {
                userMsg = "<div style='color:var(--btn-red);'>❌ Tu n'as pas la permission de sauvegarder cette facture.</div>";
            } else if (msg.includes('failed to fetch') || msg.includes('network')) {
                userMsg = "<div style='color:var(--btn-red);'>❌ Pas de connexion internet.</div>";
            }
            showAlert(userMsg);
        } finally {
            if (btnSave && originals.save) { btnSave.disabled = false; btnSave.innerHTML = originals.save; }
            if (btnSend && originals.send) { btnSend.disabled = false; btnSend.innerHTML = originals.send; }
        }
    }

    // --- SIGNATURE ÉLECTRONIQUE AMÉLIORÉE (Chantier 6) ---
    // Le module SignatureFD intercepte les clics sur .display-sig et ouvre le nouveau
    // modal amélioré. Un MutationObserver gère automatiquement les pages créées
    // dynamiquement et les signatures restaurées depuis Supabase.
    if (window.SignatureFD) {
        window.SignatureFD.watchContainer(containerInvoice);
        window.SignatureFD.attachAll(containerInvoice);
    }

    initAuth();
</script>
