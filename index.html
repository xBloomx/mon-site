<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Interface F.Dussault</title>

    <link rel="apple-touch-icon" href="assets/logo_app.png">
    <link rel="icon" type="image/png" href="assets/logo_app.png">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F.Dussault">
    <meta name="theme-color" content="#1e1f26">

    <script src="assets/shared/console-filter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <link rel="stylesheet" href="assets/shared/shared.css">
    <script src="assets/shared/shared.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--app-bg); color: var(--text-light); margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden;
            /* Safe areas pour téléphones avec encoche/Dynamic Island */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            box-sizing: border-box;
        }

        .sidebar { width: 80px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 1000; transition: left 0.3s ease; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar-top { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; margin-top: auto; padding-top: 15px; }
        
        .nav-btn { background: none; border: none; cursor: pointer; padding: 10px; border-radius: 10px; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .nav-btn:hover { background-color: rgba(255,255,255, 0.3); }
        .nav-btn.active { background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn img, .nav-btn svg { width: 30px; height: 30px; object-fit: contain; display: block; transition: transform 0.2s ease; }
        .nav-btn:hover img, .nav-btn:hover svg { transform: scale(1.15); }
        .nav-btn svg { stroke: black; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        .hidden { display: none !important; }

        /* Badge notifications messagerie */
        .nav-btn { position: relative; }
        .notif-badge { position: absolute; top: 4px; right: 4px; background: #ff4d4d; color: white; font-size: 10px; font-weight: bold; min-width: 16px; height: 16px; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; line-height: 1; border: 2px solid var(--sidebar-bg); }
        .notif-badge.visible { display: flex; }

        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--app-bg); overflow: hidden; }
        .view-section { height: 100%; overflow-y: auto; display: none; flex-direction: column; padding: 0; opacity: 0; transition: opacity 0.18s ease; }
        .view-section.active-view { display: flex; }
        .view-section.fade-in { opacity: 1; }
        .module-frame { width: 100%; height: 100%; border: none; display: block; }

        .menu-btn { display: none; position: fixed; top: calc(25px + env(safe-area-inset-top, 0px)); right: calc(25px + env(safe-area-inset-right, 0px)); z-index: 1100; background-color: var(--btn-yellow); border: none; width: 48px; height: 48px; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: opacity 0.15s ease, transform 0.15s ease; justify-content: center; align-items: center; }
        .menu-btn:active { transform: scale(0.90); }

        /* Indicateur connexion */
        #conn-indicator { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(30,31,38,0.95); border: 1px solid #333; color: #28a745; font-size: 11px; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #conn-indicator.offline { color: #ff4d4d; }
        #conn-indicator.show { opacity: 1; }
        #conn-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
        .menu-btn svg { width: 26px; height: 26px; stroke: black; stroke-width: 3; stroke-linecap: round; display: block; }
        .menu-btn.hide { opacity: 0; pointer-events: none; transform: scale(0.5); }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 900; backdrop-filter: blur(2px); }
        #overlay.active { display: block; }

        /* --- ÉCRAN DE MAINTENANCE VISUEL (RESPECTE TA D.A.) --- */
        #maintenance-screen {
            display: none; /* Caché par défaut */
            position: fixed; inset: 0; background-color: #1e1f26;
            z-index: 999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        @media (min-width: 769px) and (max-width: 1024px) { .sidebar { position: relative; left: 0; width: 80px; } .menu-btn { display: none; } }
        @media (max-width: 768px) { .sidebar { position: fixed; top: 0; left: -100px; width: 100px; height: 100vh; background: var(--sidebar-bg); transition: left 0.3s ease; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); padding-top: calc(20px + env(safe-area-inset-top, 0px)); padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); } .sidebar.open { left: 0; } .menu-btn { display: flex; } }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; inset: 0; background: #1e1f26; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease;">
    <img src="assets/logo+nom.png" alt="Logo F.Dussault" style="width: 220px; height: auto; margin-bottom: 25px; display: block;">
    <svg width="200" height="3" viewBox="0 0 200 3">
        <rect width="200" height="3" fill="rgba(255,255,255,0.05)" rx="1.5"></rect>
        <rect width="70" height="3" fill="#fcca46" rx="1.5">
            <animate attributeName="x" values="-70; 200" dur="1.7s" repeatCount="indefinite" />
        </rect>
    </svg>
</div>

<div id="conn-indicator">
    <div id="conn-dot"></div>
    <span id="conn-text">Connecté</span>
</div>

<div id="maintenance-screen">
    <svg style="width:100px; height:100px; color:#fcca46; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none; margin-bottom:20px;" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <h1 style="color: white; margin: 0 0 10px 0; font-size: 32px; font-weight: bold;">Maintenance en cours</h1>
    <p style="color: #aaa; font-size: 16px; max-width: 400px; line-height: 1.5; margin: 0 auto;">L'application F.Dussault est temporairement indisponible pour une mise à jour de sécurité.</p>
    <p style="color: #666; font-size: 13px; margin-top: 30px;">Veuillez réessayer plus tard.</p>
</div>

<button id="menu-toggle" class="menu-btn" title="Ouvrir le menu">
    <svg viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line></svg>
</button>

<aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
        <button class="nav-btn active" data-target="view-accueil" title="Accueil"><img src="assets/logo_accueil.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" data-target="view-factures" title="Factures"><img src="assets/logo_facture.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" id="btn-nav-soumissions" data-target="view-soumissions" title="Soumissions"><img src="assets/logo_soumission.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" data-target="view-temps" title="Feuille de temps"><img src="assets/logo_feuille_de_temps.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" id="btn-nav-messagerie" data-target="view-messagerie" title="Messagerie"><img src="assets/logo_messagerie.png" onerror="this.style.display='none'"><span class="notif-badge" id="badge-messagerie">0</span></button>
        <button class="nav-btn" id="btn-nav-courriel" data-target="view-courriel" title="Boîte Courriel"><img src="assets/logo_courriel.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" data-target="view-calendrier" title="Calendrier"><img src="assets/logo_calendrier.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" data-target="view-client" title="Clients"><img src="assets/logo_client.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" data-target="view-outils" title="Outils"><img src="assets/logo_outils.png" onerror="this.style.display='none'"></button>
        <button class="nav-btn" id="btn-nav-po" data-target="view-po" title="Bons de commande"><img src="assets/logo_po.png" onerror="this.style.display='none'"></button>
    </div>
    <div class="sidebar-bottom">
        <button class="nav-btn hidden" id="btn-nav-admin" data-target="view-admin" title="Administration"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></button>
        <button class="nav-btn" data-target="view-parametres" title="Profil personnel"><img src="assets/logo_profil.png" onerror="this.style.display='none'"></button>
    </div>
</aside>

<div class="main-content">
    <div id="view-accueil" class="view-section active-view"><iframe class="module-frame" src="code_accueil/code_accueil.html"></iframe></div>
    <div id="view-factures" class="view-section"><iframe class="module-frame" src="code_facture/code_facture.html"></iframe></div>
    <div id="view-soumissions" class="view-section"><iframe class="module-frame" src="code_soumissions/code_soumissions.html"></iframe></div>
    <div id="view-temps" class="view-section"><iframe class="module-frame" src="code_feuille_de_temps/code_feuille_de_temps.html"></iframe></div>
    <div id="view-messagerie" class="view-section"><iframe class="module-frame" src="code_messagerie/code_messagerie.html"></iframe></div>
    <div id="view-courriel" class="view-section"><iframe class="module-frame" src="code_courriel/code_courriel.html"></iframe></div>
    <div id="view-calendrier" class="view-section"><iframe class="module-frame" src="code_calendrier/code_calendrier.html"></iframe></div>
    <div id="view-client" class="view-section"><iframe class="module-frame" src="code_clients/code_clients.html"></iframe></div>
    <div id="view-outils" class="view-section"><iframe class="module-frame" src="code_outils/code_outils.html"></iframe></div>
    <div id="view-po" class="view-section"><iframe class="module-frame" src="code_po/code_po.html"></iframe></div>
    <div id="view-admin" class="view-section"><iframe class="module-frame" src="code_admin/code_admin.html"></iframe></div>
    <div id="view-parametres" class="view-section"><iframe class="module-frame" src="code_profil_parametres/code_profil_parametres.html"></iframe></div>
</div>

<div id="overlay"></div>

<script>

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'view_all_po', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'manage_news', 'view_admin', 'access_po_tab', 'access_soumissions_tab', 'access_courriel_tab', 'delete_documents', 'manage_suppliers'] },
        'A2': { perms: ['view_all_invoices', 'view_all_po', 'approve_timesheets', 'manage_tools', 'manage_calendar', 'manage_news', 'access_po_tab', 'access_soumissions_tab', 'access_courriel_tab', 'delete_documents'] },
        'A3': { perms: ['transfer_tools', 'access_po_tab', 'access_soumissions_tab'] }
    };

    let userRole = 'A3';

    let _cachedRolesIndex = null;

    async function loadRolesCacheIndex() {
        if (_cachedRolesIndex) return;
        try {
            const { data } = await supabaseClient
                .from('parametres_globaux')
                .select('valeur')
                .eq('cle', 'roles_config')
                .maybeSingle();
            _cachedRolesIndex = data?.valeur ? JSON.parse(data.valeur) : defaultRolesConfig;
        } catch(e) { _cachedRolesIndex = defaultRolesConfig; }
    }

    function hasPermission(role, permId) {
        if (role === 'A0') return true;
        const roles = _cachedRolesIndex || defaultRolesConfig;
        const roleData = roles[role];
        return roleData && roleData.perms ? roleData.perms.includes(permId) : false;
    }

    const readyModules = new Set(); 
    let currentTarget = 'view-accueil'; 
    const mainLoader = document.getElementById('security-loader');

    async function initApp() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return; }
        
        await loadRolesCacheIndex();
        const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).limit(1);
        if (profil && profil.length > 0) {
            userRole = profil[0].role;
            appliquerPermissions(userRole);

            // Logger la connexion une seule fois par session (sessionStorage)
            // pour ne pas spammer les logs à chaque rafraîchissement.
            try {
                if (!sessionStorage.getItem('fd_login_logged')) {
                    await supabaseClient.from('logs_systeme').insert([{
                        type_erreur: 'connexion',
                        action: 'connexion',
                        message: 'Connexion de ' + (profil[0].prenom_nom || 'utilisateur'),
                        utilisateur_nom: profil[0].prenom_nom || 'Utilisateur',
                        user_id: user.id,
                        table_name: 'profils',
                        doc_id: user.id
                    }]);
                    sessionStorage.setItem('fd_login_logged', '1');
                }
            } catch (e) { /* silencieux : si le log échoue, on continue normalement */ }
        }

        // Vérifier le mode maintenance dans Supabase (sauf pour A0)
        if (userRole !== 'A0') {
            const { data: param } = await supabaseClient
                .from('parametres_globaux')
                .select('valeur')
                .eq('cle', 'mode_maintenance')
                .maybeSingle();

            if (param?.valeur === 'true') {
                const screen = document.getElementById('maintenance-screen');
                const menuToggle = document.getElementById('menu-toggle');
                if (screen) screen.style.display = 'flex';
                if (menuToggle) menuToggle.style.display = 'none';
                // Ne pas cacher le loader — garder l'écran de maintenance visible
                return;
            }
        }

        // Cacher le loader une fois la session confirmée
        mainLoader.style.opacity = '0';
        setTimeout(() => { mainLoader.style.display = 'none'; }, 400);
    }

    function appliquerPermissions(role) {
        const btnAdmin = document.getElementById('btn-nav-admin'); if (btnAdmin) btnAdmin.classList.toggle('hidden', !hasPermission(role, 'view_admin'));
        const btnPo = document.getElementById('btn-nav-po'); if (btnPo) btnPo.classList.toggle('hidden', !hasPermission(role, 'access_po_tab'));
        const btnSoumissions = document.getElementById('btn-nav-soumissions'); if (btnSoumissions) btnSoumissions.classList.toggle('hidden', !hasPermission(role, 'access_soumissions_tab'));
        const btnCourriel = document.getElementById('btn-nav-courriel'); if (btnCourriel) btnCourriel.classList.toggle('hidden', !hasPermission(role, 'access_courriel_tab'));
    }

    initApp();

    // Routing pour les shortcuts PWA (?view=factures, ?view=temps, ?view=messagerie)
    function handlePWAShortcut() {
        try {
            const params = new URLSearchParams(window.location.search);
            const v = params.get('view');
            if (!v) return;
            const map = {
                'factures': 'view-factures',
                'soumissions': 'view-soumissions',
                'temps': 'view-temps',
                'feuilles': 'view-temps',
                'messagerie': 'view-messagerie',
                'courriel': 'view-courriel',
                'calendrier': 'view-calendrier',
                'clients': 'view-client',
                'client': 'view-client',
                'po': 'view-po',
                'outils': 'view-outils',
                'admin': 'view-admin',
                'profil': 'view-parametres',
                'parametres': 'view-parametres'
            };
            const targetId = map[v.toLowerCase()];
            if (!targetId) return;
            // Cliquer sur le bon nav-btn une fois que le DOM est prêt
            setTimeout(() => {
                const btn = document.querySelector(`.nav-btn[data-target="${targetId}"]`);
                if (btn && !btn.classList.contains('hidden')) {
                    btn.click();
                }
            }, 200);
        } catch (e) { /* ignorer */ }
    }
    handlePWAShortcut();

    const menuBtn = document.getElementById("menu-toggle"); const sidebar = document.getElementById("sidebar"); const overlay = document.getElementById("overlay"); const navButtons = document.querySelectorAll('.nav-btn[data-target]'); const views = document.querySelectorAll('.view-section');

    menuBtn.addEventListener("click", () => { sidebar.classList.add("open"); overlay.classList.add("active"); menuBtn.classList.add("hide"); });
    overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("active"); menuBtn.classList.remove("hide"); });

    navButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            navButtons.forEach(b => b.classList.remove('active')); this.classList.add('active');
            views.forEach(view => { view.classList.remove('active-view'); view.classList.remove('fade-in'); });
            currentTarget = this.getAttribute('data-target');
            const targetView = document.getElementById(currentTarget);
            if (targetView) {
                targetView.classList.add('active-view');
                // Fondu d'entrée au prochain rendu
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => { targetView.classList.add('fade-in'); });
                });
            }
            if (!readyModules.has(currentTarget)) { mainLoader.style.display = 'flex'; void mainLoader.offsetWidth; mainLoader.style.opacity = '1'; }
            if (window.innerWidth <= 768) { sidebar.classList.remove("open"); overlay.classList.remove("active"); menuBtn.classList.remove("hide"); }
            // Effacer badge messagerie si on clique dessus
            if (currentTarget === 'view-messagerie') {
                const badge = document.getElementById('badge-messagerie');
                if (badge) { badge.textContent = '0'; badge.classList.remove('visible'); }
            }
        });
    });

    // Fade-in initial du premier module
    requestAnimationFrame(() => {
        const activeView = document.querySelector('.view-section.active-view');
        if (activeView) requestAnimationFrame(() => activeView.classList.add('fade-in'));
    });

    // Fonctions globales instantanées — appelables directement par les iframes
    window.hideMenuBtn = function() {
        menuBtn.style.display = 'none';
    };
    window.showMenuBtn = function() {
        menuBtn.style.display = '';
    };

    // Setup du toast listener global (pour que les iframes puissent afficher des toasts)
    if (window.SharedFD && window.SharedFD.setupToastListener) {
        window.SharedFD.setupToastListener();
    }

    window.addEventListener('message', async function(event) {
        if (event.data && event.data.type === 'navigate') {
            const targetId = event.data.target; const btnToClick = document.querySelector(`.nav-btn[data-target="${targetId}"]`);
            if (btnToClick) { btnToClick.click(); }
        }
        if (event.data && event.data.type === 'module_ready') {
            readyModules.add(event.data.module); 
            if (currentTarget === event.data.module) { mainLoader.style.opacity = '0'; setTimeout(() => mainLoader.style.display = 'none', 400); }
        }
        // Recharger les rôles si l'admin les a mis à jour
        if (event.data && event.data.type === 'permissions_updated') {
            _cachedRolesIndex = null; // Invalider le cache
            await loadRolesCacheIndex(); // Recharger depuis Supabase
            appliquerPermissions(userRole); // Réappliquer
        }

        // Badge messagerie — nouveau message reçu
        if (event.data && event.data.type === 'new_message_notif') {
            const currentTarget = document.querySelector('.nav-btn.active')?.getAttribute('data-target');
            if (currentTarget !== 'view-messagerie') {
                const badge = document.getElementById('badge-messagerie');
                if (badge) {
                    const count = (parseInt(badge.textContent) || 0) + 1;
                    badge.textContent = count;
                    badge.classList.add('visible');
                }
            }
        }

        if (event.data && event.data.type === 'toggle_menu') {
            // requestAnimationFrame = exécution au prochain rendu du navigateur = instantané
            requestAnimationFrame(() => {
                if (event.data.action === 'hide') { menuBtn.style.display = 'none'; }
                else if (event.data.action === 'show') { menuBtn.style.display = ''; }
            });
        }
        // Mode signature plein écran : un module entre en mode signature → cacher sidebar
        if (event.data && event.data.type === 'signature_mode') {
            requestAnimationFrame(() => {
                if (event.data.action === 'enter') {
                    // Plein écran : cacher sidebar + hamburger + safe-area du body
                    sidebar.style.display = 'none';
                    if (overlay) overlay.classList.remove('active');
                    sidebar.classList.remove('open');
                    menuBtn.style.display = 'none';
                    document.body.style.padding = '0';
                } else {
                    // Sortie : restaurer
                    sidebar.style.display = '';
                    menuBtn.style.display = '';
                    document.body.style.padding = '';
                }
            });
        }
        if (event.data && event.data.type === 'permissions_updated') {
            initApp();
        }

        // --- MOTEUR VISUEL TEMPORAIRE (Réception) ---
        if (event.data && event.data.type === 'toggle_temp_maintenance') {
            const screen = document.getElementById('maintenance-screen');
            const menuToggle = document.getElementById('menu-toggle');
            
            if (event.data.action === 'show' && userRole !== 'A0') {
                // On affiche le blocage et on cache le menu
                screen.style.display = 'flex';
                sidebar.classList.remove("open"); overlay.classList.remove("active");
                if(menuToggle) menuToggle.style.display = 'none';
            } else {
                // On cache le blocage et on remet le menu
                screen.style.display = 'none';
                if(menuToggle) menuToggle.style.display = '';
            }
        }
    });

    // Indicateur connexion online/offline
    const connIndicator = document.getElementById('conn-indicator');
    const connText = document.getElementById('conn-text');
    let connTimer = null;

    function showConnStatus(online) {
        if (connTimer) clearTimeout(connTimer);
        connIndicator.className = online ? 'show' : 'offline show';
        connText.textContent = online ? 'Connecté' : 'Hors ligne';
        if (online) {
            connTimer = setTimeout(() => { connIndicator.classList.remove('show'); }, 2000);
        }
    }

    window.addEventListener('online', () => showConnStatus(true));
    window.addEventListener('offline', () => showConnStatus(false));

    // Enregistrement du Service Worker (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker enregistré'))
                .catch(err => console.log('Service Worker erreur:', err));
        });
    }

</script>
</body>
</html>
