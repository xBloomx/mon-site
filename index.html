<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interface F.Dussault</title>

    <link rel="apple-touch-icon" href="assets/logo_app.png">
    <link rel="icon" type="image/png" href="assets/logo_app.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F.Dussault">
    <meta name="theme-color" content="#1e1f26">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --app-bg: #1e1f26; --sidebar-bg: #fcca46; --btn-yellow: #fcca46; 
            --text-light: #e0e0e0; --card-bg: #2b2c36;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--app-bg); color: var(--text-light); margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden; }

        /* CORRECTION DU DÉFILEMENT DE LA BARRE LATÉRALE */
        .sidebar { 
            width: 80px; 
            background-color: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0; 
            z-index: 1000; 
            transition: left 0.3s ease; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* Défilement fluide sur mobile */
        }
        .sidebar::-webkit-scrollbar { display: none; }
        
        .sidebar-top { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        
        /* Le margin-top: auto pousse cette section vers le bas s'il y a de la place, 
           mais permet le défilement s'il n'y en a pas assez */
        .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; margin-top: auto; padding-top: 15px; }
        
        .nav-btn { background: none; border: none; cursor: pointer; padding: 10px; border-radius: 10px; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .nav-btn:hover { background-color: rgba(255,255,255, 0.3); }
        .nav-btn.active { background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .nav-btn img, .nav-btn svg { 
            width: 30px; height: 30px; object-fit: contain; display: block; 
            transition: transform 0.2s ease;
        }
        .nav-btn:hover img, .nav-btn:hover svg {
            transform: scale(1.15);
        }
        .nav-btn svg { stroke: black; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        .hidden { display: none !important; }

        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--app-bg); overflow: hidden; }
        .view-section { height: 100%; overflow-y: auto; display: none; flex-direction: column; padding: 0; }
        .view-section.active-view { display: flex; }
        .module-frame { width: 100%; height: 100%; border: none; display: block; }

        .menu-btn { 
            display: none; position: fixed; top: 25px; right: 25px; z-index: 1100; 
            background-color: var(--btn-yellow); border: none; width: 48px; height: 48px;
            border-radius: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            transition: all 0.3s ease; justify-content: center; align-items: center;
        }
        .menu-btn:active { transform: scale(0.90); }
        .menu-btn svg { width: 26px; height: 26px; stroke: black; stroke-width: 3; stroke-linecap: round; display: block; }
        
        .menu-btn.hide { opacity: 0; pointer-events: none; transform: scale(0.5); }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 900; backdrop-filter: blur(2px); }
        #overlay.active { display: block; }

        @media (min-width: 769px) and (max-width: 1024px) { .sidebar { position: relative; left: 0; width: 80px; } .menu-btn { display: none; } }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: -100px; width: 100px; height: 100vh; background: var(--sidebar-bg); transition: left 0.3s ease; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .menu-btn { display: flex; } 
        }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1e1f26; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease;">
    
    <img src="assets/logo+nom.png" alt="Logo F.Dussault" style="width: 220px; height: auto; margin-bottom: 25px; display: block; filter: none; padding: 0;">

    <svg width="200" height="3" viewBox="0 0 200 3">
        <rect width="200" height="3" fill="rgba(255,255,255,0.05)" rx="1.5"></rect>
        <rect width="70" height="3" fill="#fcca46" rx="1.5">
            <animate attributeName="x" values="-70; 200" dur="1.7s" repeatCount="indefinite" />
        </rect>
    </svg>

</div>
<button id="menu-toggle" class="menu-btn" title="Ouvrir le menu">
    <svg viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line></svg>
</button>

<aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
        <button class="nav-btn active" data-target="view-accueil" title="Accueil">
            <img src="assets/logo_accueil.png" alt="Accueil" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-factures" title="Factures">
            <img src="assets/logo_facture.png" alt="Factures" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" id="btn-nav-soumissions" data-target="view-soumissions" title="Soumissions">
            <img src="assets/logo_soumission.png" alt="Soumissions" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-temps" title="Feuille de temps">
            <img src="assets/logo_feuille_de_temps.png" alt="Temps" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-messagerie" title="Messagerie">
            <img src="assets/logo_messagerie.png" alt="Messagerie" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-courriel" title="Boîte Courriel">
            <img src="assets/logo_courriel.png" alt="Courriel" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-calendrier" title="Calendrier">
            <img src="assets/logo_calendrier.png" alt="Calendrier" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-client" title="Clients">
            <img src="assets/logo_client.png" alt="Clients" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" data-target="view-outils" title="Outils">
            <img src="assets/logo_outils.png" alt="Outils" onerror="this.style.display='none'">
        </button>
        <button class="nav-btn" id="btn-nav-po" data-target="view-po" title="Bons de commande">
            <img src="assets/logo_po.png" alt="PO" onerror="this.style.display='none'">
        </button>
    </div>
    
    <div class="sidebar-bottom">
        <button class="nav-btn hidden" id="btn-nav-admin" data-target="view-admin" title="Administration">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </button>
        <button class="nav-btn" data-target="view-parametres" title="Profil personnel">
            <img src="assets/logo_profil.png" alt="Profil" onerror="this.style.display='none'">
        </button>
    </div>
</aside>

<div class="main-content">
    <div id="view-accueil" class="view-section active-view"><iframe class="module-frame" src="code_accueil/code_accueil.html"></iframe></div>
    <div id="view-factures" class="view-section"><iframe class="module-frame" src="code_facture/code_facture.html"></iframe></div>
    <div id="view-soumissions" class="view-section"><iframe class="module-frame" src="code_soumissions/code_soumissions.html"></iframe></div>
    <div id="view-temps" class="view-section"><iframe class="module-frame" src="code_feuille_de_temps/code_feuille_de_temps.html"></iframe></div>
    <div id="view-messagerie" class="view-section"><iframe class="module-frame" src="code_messagerie/code_messagerie.html"></iframe></div>
    <div id="view-courriel" class="view-section"><iframe class="module-frame" src="code_courriel/code_courriel.html"></iframe></div>
    <div id="view-calendrier" class="view-section"><iframe class="module-frame" src="code_calendrier/code_calendrier.html"></iframe></div>
    <div id="view-client" class="view-section"><iframe class="module-frame" src="code_clients/code_clients.html"></iframe></div>
    <div id="view-outils" class="view-section"><iframe class="module-frame" src="code_outils/code_outils.html"></iframe></div>
    <div id="view-po" class="view-section"><iframe class="module-frame" src="code_po/code_po.html"></iframe></div>
    <div id="view-admin" class="view-section"><iframe class="module-frame" src="code_admin/code_admin.html"></iframe></div>
    <div id="view-parametres" class="view-section"><iframe class="module-frame" src="code_profil_parametres/code_profil_parametres.html"></iframe></div>
</div>

<div id="overlay"></div>

<script>
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'view_all_po', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'manage_news', 'view_admin', 'access_po_tab', 'access_soumissions_tab', 'access_courriel_tab'] },
        'A2': { perms: ['view_all_invoices', 'view_all_po', 'approve_timesheets', 'manage_tools', 'manage_calendar', 'manage_news', 'access_po_tab', 'access_soumissions_tab', 'access_courriel_tab'] },
        'A3': { perms: ['transfer_tools', 'access_po_tab', 'access_soumissions_tab'] }
    };

    function hasPermission(role, permId) {
        if (role === 'A0') return true; 
        const savedRoles = JSON.parse(localStorage.getItem('dussault_roles_v1')) || defaultRolesConfig;
        const roleData = savedRoles[role];
        if (!roleData || !roleData.perms) return false;
        return roleData.perms.includes(permId);
    }

    // --- VARIABLES DE CHARGEMENT GLOBAL ---
    const readyModules = new Set(); 
    let currentTarget = 'view-accueil'; 
    const mainLoader = document.getElementById('security-loader');

    async function initApp() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        const { data: profil } = await supabaseClient.from('profils').select('role').eq('id', user.id).limit(1);
        if (profil && profil.length > 0) {
            appliquerPermissions(profil[0].role);
        }
    }

    function appliquerPermissions(role) {
        const btnAdmin = document.getElementById('btn-nav-admin');
        if (hasPermission(role, 'view_admin')) { if (btnAdmin) btnAdmin.classList.remove('hidden'); } else { if (btnAdmin) btnAdmin.classList.add('hidden'); }

        const btnPo = document.getElementById('btn-nav-po');
        if (hasPermission(role, 'access_po_tab')) { if (btnPo) btnPo.classList.remove('hidden'); } else { if (btnPo) btnPo.classList.add('hidden'); }

        const btnSoumissions = document.getElementById('btn-nav-soumissions');
        if (hasPermission(role, 'access_soumissions_tab')) { if (btnSoumissions) btnSoumissions.classList.remove('hidden'); } else { if (btnSoumissions) btnSoumissions.classList.add('hidden'); }
    }

    initApp();

    const menuBtn = document.getElementById("menu-toggle");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const navButtons = document.querySelectorAll('.nav-btn[data-target]');
    const views = document.querySelectorAll('.view-section');

    menuBtn.addEventListener("click", () => { sidebar.classList.add("open"); overlay.classList.add("active"); menuBtn.classList.add("hide"); });
    overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("active"); menuBtn.classList.remove("hide"); });

    // --- GESTION DES CLICS SUR LE MENU ---
    navButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            navButtons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            views.forEach(view => view.classList.remove('active-view'));
            currentTarget = this.getAttribute('data-target');
            document.getElementById(currentTarget).classList.add('active-view');

            if (!readyModules.has(currentTarget)) {
                mainLoader.style.display = 'flex';
                void mainLoader.offsetWidth; 
                mainLoader.style.opacity = '1';
            }

            if (window.innerWidth <= 768) { sidebar.classList.remove("open"); overlay.classList.remove("active"); menuBtn.classList.remove("hide"); }
        });
    });

    // --- ÉCOUTE DES SOUS-FICHIERS ---
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'navigate') {
            const targetId = event.data.target;
            const btnToClick = document.querySelector(`.nav-btn[data-target="${targetId}"]`);
            if (btnToClick) { btnToClick.click(); }
        }
        
        if (event.data && event.data.type === 'module_ready') {
            readyModules.add(event.data.module); 
            
            if (currentTarget === event.data.module) {
                mainLoader.style.opacity = '0';
                setTimeout(() => mainLoader.style.display = 'none', 400);
            }
        }
    });

</script>

</body>
</html>
