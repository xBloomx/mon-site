<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demande de PO F.Dussault</title>

    <script>
        if (window.self === window.top) { window.location.href = '../login.html'; }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --app-bg: #1e1f26; 
            --text-light: #e0e0e0; 
            --card-bg: #2b2c36;
            --btn-yellow: #fcca46; 
            --btn-red: #ff4d4d; 
            --btn-green: #28a745; 
            --btn-blue: #3498db; 
            --border-color: #444;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--app-bg); 
            color: var(--text-light); 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }
        
        /* Utilitaires SVG */
        .svg-icon { 
            width: 18px; 
            height: 18px; 
            stroke: currentColor; 
            stroke-width: 2; 
            stroke-linecap: round; 
            stroke-linejoin: round; 
            fill: none; 
            display: inline-block; 
            vertical-align: middle; 
            flex-shrink: 0; 
        }

        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background-color: var(--app-bg); 
            overflow: hidden; 
        }
        
        #view-dashboard { 
            padding: 30px; 
            height: 100%; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .dash-header { display: flex; justify-content: space-between; align-items: center; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        
        .btn-action { 
            background-color: var(--btn-yellow); 
            color: black; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            white-space: nowrap; 
            transition: 0.2s; 
        }
        .btn-action:hover { background-color: #ffd66b; transform: translateY(-2px); }

        .toolbar { 
            display: flex; gap: 15px; align-items: center; 
            background-color: var(--card-bg); padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 5px; 
        }
        
        .search-box { flex: 1; position: relative; display: flex; align-items: center; }
        .search-box input { 
            width: 100%; background: #1e1f26; border: 1px solid #444; 
            color: white; padding: 14px 15px 14px 45px; border-radius: 8px; 
            font-size: 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus { border-color: var(--btn-yellow); box-shadow: 0 0 5px rgba(252, 202, 70, 0.3); }
        .search-icon { 
            position: absolute; left: 15px; color: #888; font-size: 18px; 
            pointer-events: none; display: flex; align-items: center; 
        }

        .tabs-container { display: flex; gap: 10px; }
        .btn-tab { 
            background: #1a1b23; 
            color: #aaa; 
            border: 1px solid #444; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 13px; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }

        .section-title { 
            font-size: 16px; 
            color: var(--btn-yellow); 
            text-transform: uppercase; 
            margin-top: 10px; 
            margin-bottom: 5px; 
            border-bottom: 1px solid #444; 
            padding-bottom: 5px; 
        }
        
        .po-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        
        .po-item { 
            background-color: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 5px solid var(--btn-green); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .po-info { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .po-number { 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--btn-yellow); 
            font-family: monospace; 
            letter-spacing: 1px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .po-details { 
            color: white; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: wrap; 
            margin-top: 5px;
        }
        .po-details span { display: flex; align-items: center; gap: 5px; }
        .po-subtext { 
            color: #aaa; 
            font-size: 13px; 
            margin-top: 5px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }

        .po-actions { 
            display: flex; 
            gap: 10px; 
            margin-left: 20px; 
            flex-wrap: wrap; 
            justify-content: flex-end;
        }
        
        .btn-copy { 
            background: #444; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            gap: 6px; 
            align-items: center;
        }
        .btn-copy:hover { background: #555; }
        
        .btn-delete { 
            background: rgba(255, 77, 77, 0.1); 
            color: var(--btn-red); 
            border: 1px solid transparent; 
            width: 40px; 
            height: 40px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.2s; 
            flex-shrink: 0;
        }
        .btn-delete:hover { background: var(--btn-red); color: white; }

        .status-badge { 
            font-size: 11px; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-family: sans-serif; 
            background: var(--btn-green); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 4px;
        }

        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; }
            .dash-header { flex-direction: column; align-items: flex-start; gap: 15px; width: 100%; }
            .dash-title { padding-right: 75px; width: 100%; }
            
            .dash-header .btn-action { width: 100%; justify-content: center; font-size: 14px; }
            .tabs-container { flex-direction: column; width: 100%; }
            .btn-tab { width: 100%; justify-content: center; }
            .po-item { flex-direction: column; align-items: flex-start; gap: 15px; padding: 15px; }
            .po-actions { align-self: stretch; margin-left: 0; display: flex; width: 100%; gap: 10px; }
            .btn-copy { flex: 1; justify-content: center; }
        }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; z-index: 4000; 
            justify-content: center; align-items: center; 
        }
        
        .modal-card-basic { 
            background: var(--card-bg); width: 350px; padding: 25px; 
            border-radius: 15px; text-align: center; border: 1px solid #555; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        
        .modal-actions { display: flex; justify-content: center; gap: 10px; margin-top: 20px;}
        .btn-modal-gray { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-modal-yellow { background: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight:bold; }
        .btn-modal-red { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight:bold; }

        .custom-form-card { 
            background: #252631; width: 90%; max-width: 450px; padding: 30px; 
            border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            position: relative; border: 1px solid #444; max-height: 90vh; overflow-y: auto; 
        }
        
        .modal-header-custom { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px; 
            color: white; font-size: 24px; font-weight: normal; 
        }
        .modal-header-custom svg { 
            width: 35px; height: 35px; stroke: currentColor; 
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none;
        }
        
        .custom-group { margin-bottom: 18px; text-align: left; }
        .custom-group label { display: block; color: white; margin-bottom: 7px; font-size: 14px; }
        .custom-group input { 
            width: 100%; padding: 12px 15px; background: #323443; 
            border: 1px solid transparent; color: white; border-radius: 8px; 
            font-size: 16px; outline: none; transition: border-color 0.2s; 
        }
        .custom-group input:focus { border-color: var(--btn-yellow); }
        
        .file-upload-btn { 
            background: #1a1b23; border: 1px dashed #888; color: #ccc; 
            padding: 12px; text-align: center; border-radius: 8px; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 8px; transition: 0.2s; font-size: 14px; 
        }
        .file-upload-btn:hover { border-color: var(--btn-yellow); color: white; }

        .btn-custom-submit { 
            background-color: var(--btn-yellow); color: black; border: none; 
            width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; 
            font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
        }
        .btn-custom-submit:hover { background-color: #ffd66b; }
        
        .btn-close-modal { 
            position: absolute; top: 15px; right: 20px; background: none; 
            border: none; color: #888; font-size: 30px; cursor: pointer; 
        }
        .btn-close-modal:hover { color: white; }

        .po-result-box { 
            background: #1a1b23; border-radius: 12px; padding: 20px; 
            text-align: center; margin-top: 20px; border: 1px dashed var(--border-color); 
            display: none; animation: fadeIn 0.5s ease; 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .po-result-title { color: #aaa; font-size: 13px; margin-bottom: 5px; text-transform: uppercase; }
        .po-result-number { 
            color: var(--btn-yellow); font-size: 24px; font-weight: bold; 
            font-family: monospace; letter-spacing: 1px; margin-bottom: 15px;
        }
        
        .btn-copy-large { 
            background: #444; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; 
            gap: 8px; align-items: center; width: 100%; justify-content: center; 
            margin-bottom: 10px;
        }
        .btn-copy-large:hover { background: #555; }
        .btn-copy-large.success { background: var(--btn-green); }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; inset: 0; background: #1e1f26; z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Chargement du module...</div>
</div>

<svg style="display: none;">
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>

    <symbol id="icon-inbox" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>

</svg>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Demande de PO</h1>
                <p>Générateur de numéros uniques</p>
            </div>
            <button class="btn-action" id="btn-new-po" onclick="openPoModal()">
                <svg class="svg-icon"><use href="#icon-plus"></use></svg> Demander un numéro de PO
            </button>
        </div>

        <div class="tabs-container" id="po-tabs" style="display:none;">
            <button id="tab-mine" class="btn-tab active" onclick="switchPoTab('mine')">
                <svg class="svg-icon" style="width:14px; height:14px;"><use href="#icon-user"></use></svg> Mes PO
            </button>
            <button id="tab-all" class="btn-tab" onclick="switchPoTab('all')">
                <svg class="svg-icon" style="width:14px; height:14px;"><use href="#icon-building"></use></svg> Tous les PO
            </button>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon"><svg class="svg-icon"><use href="#icon-search"></use></svg></span>
                <input type="text" id="poSearch" placeholder="Rechercher (Numéro, Fournisseur, Adresse, Date...)" onkeyup="filterPO()">
            </div>
        </div>

        <div class="section-title">Liste des PO</div>
        <div class="po-list" id="poListContainer"></div>
    </div>
</div>

<div class="modal-overlay" id="poModal">
    <div class="custom-form-card">
        <button class="btn-close-modal" onclick="closeModal('poModal')">×</button>
        
        <div class="modal-header-custom">
            <svg class="svg-icon"><use href="#icon-file-text"></use></svg>
            Nouveau Bon de Commande
        </div>

        <div id="poFormZone">
            <div class="custom-group">
                <label>Nom du plombier</label>
                <input type="text" id="inpPlombier" placeholder="Ex: François">
            </div>
            <div class="custom-group">
                <label>Fournisseur</label>
                <input type="text" id="inpFournisseur" placeholder="Ex: Deschênes, Wolseley...">
            </div>
            <div class="custom-group">
                <label>Adresse / Lieu du chantier</label>
                <input type="text" id="inpAdresse" placeholder="Adresse du chantier">
            </div>
            <div class="custom-group">
                <label>Date</label>
                <input type="date" id="inpDate">
            </div>
            <div class="custom-group">
                <label>Photo de la soumission / reçu (Optionnel)</label>
                <label class="file-upload-btn" for="inpPhoto">
                    <svg class="svg-icon"><use href="#icon-camera"></use></svg> <span id="labelPhotoText">Ajouter une photo...</span>
                </label>
                <input type="file" id="inpPhoto" accept="image/*" style="display:none;" onchange="updateFileLabel(this)">
            </div>

            <button class="btn-custom-submit" onclick="generatePO()">Générer le numéro</button>
        </div>

        <div id="poResultZone" class="po-result-box">
            <div class="po-result-title">Numéro généré avec succès</div>
            <div class="po-result-number" id="displayNewPoNumber">PO-XXXXXX-XXXX</div>
            <button class="btn-copy-large" id="btnCopyMain" onclick="copyPoNumber('displayNewPoNumber', this)">
                <svg class="svg-icon"><use href="#icon-copy"></use></svg> Copier le numéro
            </button>
            <p style="font-size:12px; color:#aaa; margin-top:10px;">Ce numéro est maintenant enregistré dans votre liste.</p>
        </div>
    </div>
</div>

<div class="modal-overlay z-high" id="alertModal">
    <div class="modal-card-basic">
        <div style="font-size: 20px; color: var(--btn-yellow); font-weight:bold; margin-bottom: 15px;">Information</div>
        <div style="color: #e0e0e0; margin-bottom: 25px; line-height: 1.4;" id="alertMsg">...</div>
        <div class="modal-actions">
            <button class="btn-modal-yellow" style="width: 100%" onclick="closeAlertModal()">Compris</button>
        </div>
    </div>
</div>

<div class="modal-overlay z-high" id="confirmModal">
    <div class="modal-card-basic">
        <div style="font-size: 20px; color: var(--btn-red); font-weight:bold; margin-bottom: 15px;" id="confirmTitle">Action</div>
        <div style="color: #e0e0e0; margin-bottom: 25px;" id="confirmMsg">Êtes-vous sûr ?</div>
        <div class="modal-actions">
            <button class="btn-modal-gray" onclick="closeConfirmModal()">Annuler</button>
            <button id="confirmActionBtn" class="btn-modal-red">Confirmer</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://ipxmloqgoukieuerbxtl.supabase.co';
    const supabaseKey = 'sb_publishable_jVOmm2g3WLxtIrr-rVRvtA_aWaUtB-E';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let myRole = 'A3';
    let myUserId = 'local-user';
    let myUserName = 'Employé';
    let currentPoTab = 'mine'; 

    // --- LE CERVEAU DES PERMISSIONS ---
    const defaultRolesConfig = {
        'A0': { name: 'A0 - Développeur', isSystem: true, perms: ['view_all_invoices', 'view_all_po', 'access_po_tab', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'manage_news', 'view_admin'] },
        'A1': { name: 'A1 - Administrateur', isSystem: true, perms: ['view_all_invoices', 'view_all_po', 'access_po_tab', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'manage_news', 'view_admin'] },
        'A2': { name: 'A2 - Bureau', isSystem: true, perms: ['view_all_invoices', 'view_all_po', 'access_po_tab', 'approve_timesheets', 'manage_tools', 'manage_calendar', 'manage_news'] },
        'A3': { name: 'A3 - Employé Terrain', isSystem: true, perms: ['transfer_tools', 'access_po_tab'] }
    };

    let roleDefinitions = JSON.parse(localStorage.getItem('dussault_roles_v1')) || defaultRolesConfig;

    function hasPermission(role, permId) {
        if (role === 'A0') return true; 
        const roleData = roleDefinitions[role] || defaultRolesConfig[role];
        if (!roleData || !roleData.perms) return false;
        return roleData.perms.includes(permId);
    }

    const KEY_POS = 'dussault_po_v1';
    let poLog = [];
    let itemToProcessId = null; 

    async function initAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        // LE VIDEUR : Expulsion si non connecté
        if (!user) {
            window.top.location.href = '../login.html';
            return;
        }

        if (user) {
            myUserId = user.id;
            const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).limit(1);
            if (profil && profil.length > 0) {
                myRole = profil[0].role;
                myUserName = profil[0].prenom_nom || user.email.split('@')[0];
                
                if (hasPermission(myRole, 'view_all_po')) {
                    document.getElementById('po-tabs').style.display = 'flex';
                } else {
                    currentPoTab = 'mine';
                }
            }
        }
        
        loadData();

        // TOUT EST VÉRIFIÉ : On lève le rideau local
        document.getElementById('security-loader').style.display = 'none';
        
        // Signal au Chef d'orchestre
        window.parent.postMessage({ type: 'module_ready', module: 'view-po' }, '*');
    }

    function switchPoTab(tab) {
        currentPoTab = tab;
        document.getElementById('tab-mine').classList.remove('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        filterPO(); 
    }

    function showAlert(msg) { 
        document.getElementById('alertMsg').innerHTML = msg; 
        document.getElementById('alertModal').style.display = 'flex'; 
    }
    
    function closeAlertModal() { 
        document.getElementById('alertModal').style.display = 'none'; 
    }
    
    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        
        // NOUVEAU : Réafficher le menu quand on ferme une fenêtre
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
    }

    function askDeletePO(id) {
        itemToProcessId = id; 
        document.getElementById('confirmTitle').textContent = "Supprimer";
        document.getElementById('confirmMsg').textContent = "Effacer définitivement ce PO ?";
        document.getElementById('confirmModal').style.display = 'flex';
        
        // NOUVEAU : Cacher le menu quand on demande une confirmation
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }
    
    function closeConfirmModal() { 
        document.getElementById('confirmModal').style.display = 'none'; 
        itemToProcessId = null; 
        
        // NOUVEAU : Réafficher le menu
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
    }

    document.getElementById('confirmActionBtn').addEventListener('click', function() {
        if (!itemToProcessId) return;
        poLog = poLog.filter(po => po.id !== itemToProcessId);
        saveData(); 
        closeConfirmModal();
    });

    function loadData() {
        const stored = localStorage.getItem(KEY_POS);
        if (stored) poLog = JSON.parse(stored);
        filterPO(); 
    }
    
    function saveData() { 
        localStorage.setItem(KEY_POS, JSON.stringify(poLog)); 
        filterPO(); 
    }

    function formatDateFR(isoDate) { 
        if(!isoDate) return ''; 
        const parts = isoDate.split('-'); 
        return `${parts[2]}/${parts[1]}/${parts[0]}`; 
    }

    function renderPOList(list) {
        const container = document.getElementById('poListContainer');
        container.innerHTML = '';
        
        const sortedList = [...list].sort((a,b) => b.timestamp - a.timestamp);

        if (sortedList.length === 0) {
            container.innerHTML = '<div style="color:#888; font-style:italic; padding:10px;">Aucun bon de commande trouvé.</div>';
            return;
        }

        const isBureau = hasPermission(myRole, 'view_all_po');

        sortedList.forEach(po => {
            const card = document.createElement('div');
            card.className = `po-item`;
            
            let photoBadge = po.hasPhoto ? `<span style="font-size:12px; color:var(--btn-green); display:flex; align-items:center; gap:4px;"><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-image"></use></svg> Photo jointe</span>` : '';

            let actionHtml = `<button class="btn-copy" onclick="copyTextToClipboard('${po.poNumber}', this)"><svg class="svg-icon"><use href="#icon-copy"></use></svg> Copier</button>`;
            
            if (isBureau || po.authorId === myUserId) {
                actionHtml += `<button class="btn-delete" onclick="askDeletePO('${po.id}')" title="Supprimer"><svg class="svg-icon"><use href="#icon-trash"></use></svg></button>`;
            }

            card.innerHTML = `
                <div class="po-info">
                    <div class="po-number" id="po-num-${po.id}">${po.poNumber} <span class="status-badge"><svg class="svg-icon" style="width:12px;height:12px;"><use href="#icon-check-circle"></use></svg> Enregistré</span></div>
                    <div class="po-details">
                        <span><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-user"></use></svg> <strong>${po.plumber}</strong></span>
                        <span><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-building"></use></svg> ${po.supplier}</span>
                        ${photoBadge}
                    </div>
                    <div class="po-subtext">
                        <span style="display:flex; align-items:center; gap:4px;"><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-map-pin"></use></svg> ${po.address}</span>
                        <span style="display:flex; align-items:center; gap:4px; margin-left:10px;"><svg class="svg-icon" style="width:14px;height:14px;"><use href="#icon-calendar"></use></svg> ${formatDateFR(po.date)}</span>
                    </div>
                </div>
                <div class="po-actions">${actionHtml}</div>
            `;
            container.appendChild(card);
        });
    }

    function filterPO() {
        const term = document.getElementById('poSearch').value.toLowerCase();
        
        const isBureau = hasPermission(myRole, 'view_all_po');
        let baseList = poLog;
        
        if (!isBureau || currentPoTab === 'mine') {
            baseList = poLog.filter(po => po.authorId === myUserId);
        }

        const filtered = baseList.filter(po => {
            const dateFR = formatDateFR(po.date).toLowerCase();
            return (po.poNumber || "").toLowerCase().includes(term) || 
                   (po.plumber || "").toLowerCase().includes(term) || 
                   (po.supplier || "").toLowerCase().includes(term) || 
                   (po.address || "").toLowerCase().includes(term) ||
                   (po.date || "").toLowerCase().includes(term) ||
                   dateFR.includes(term);
        });
        
        renderPOList(filtered);
    }

    function openPoModal() {
        document.getElementById('inpPlombier').value = myUserName; 
        document.getElementById('inpFournisseur').value = '';
        document.getElementById('inpAdresse').value = '';
        document.getElementById('inpDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('inpPhoto').value = '';
        document.getElementById('labelPhotoText').textContent = "Ajouter une photo...";
        
        document.getElementById('poResultZone').style.display = 'none';
        document.querySelector('.btn-custom-submit').style.display = 'flex';
        document.getElementById('poModal').style.display = 'flex';
        
        // NOUVEAU : Cacher le menu à l'ouverture de la demande
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function updateFileLabel(input) {
        const label = input.previousElementSibling;
        const spanText = document.getElementById('labelPhotoText');
        
        if (input.files && input.files.length > 0) { 
            spanText.textContent = "Photo sélectionnée (" + input.files[0].name + ")"; 
            label.style.borderColor = "var(--btn-green)"; 
            label.style.color = "var(--btn-green)"; 
            label.querySelector('use').setAttribute('href', '#icon-check-circle');
        } else { 
            spanText.textContent = "Ajouter une photo..."; 
            label.style.borderColor = "#888"; 
            label.style.color = "#ccc"; 
            label.querySelector('use').setAttribute('href', '#icon-camera');
        }
    }

    function generatePONumber(dateString) {
        const d = new Date(dateString);
        const yy = String(d.getFullYear()).slice(-2);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const random = Math.floor(1000 + Math.random() * 9000);
        return `PO-${yy}${mm}${dd}-${random}`;
    }

    function generatePO() {
        const plumber = document.getElementById('inpPlombier').value.trim();
        const supplier = document.getElementById('inpFournisseur').value.trim();
        const address = document.getElementById('inpAdresse').value.trim();
        const dateReq = document.getElementById('inpDate').value;
        const hasPhoto = document.getElementById('inpPhoto').files.length > 0;
        
        if (!plumber || !supplier || !address || !dateReq) { 
            showAlert("Remplissez tous les champs obligatoires."); 
            return; 
        }

        const newPoNumber = generatePONumber(dateReq);

        const newPo = {
            id: 'po-'+Date.now(),
            poNumber: newPoNumber,
            plumber: plumber,
            supplier: supplier,
            address: address,
            date: dateReq,
            hasPhoto: hasPhoto, 
            authorId: myUserId,
            status: 'enregistre',
            timestamp: Date.now()
        };

        poLog.push(newPo); 
        saveData();

        document.querySelector('.btn-custom-submit').style.display = 'none';
        document.getElementById('displayNewPoNumber').textContent = newPoNumber;
        
        const btnCopy = document.getElementById('btnCopyMain');
        btnCopy.innerHTML = `<svg class="svg-icon"><use href="#icon-copy"></use></svg> Copier le numéro`; 
        btnCopy.className = "btn-copy-large";
        
        document.getElementById('poResultZone').style.display = 'block';
        
        switchPoTab('mine');
    }

    function copyPoNumber(elementId, btnElement) {
        const text = document.getElementById(elementId).textContent;
        copyTextToClipboard(text, btnElement, true);
    }

    function copyTextToClipboard(text, btnElement, isLargeBtn = false) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btnElement.innerHTML; 
            const originalClass = btnElement.className;
            
            btnElement.innerHTML = `<svg class="svg-icon"><use href="#icon-check"></use></svg> Copié !`; 
            btnElement.className = isLargeBtn ? "btn-copy-large success" : "btn-copy success";
            btnElement.style.background = "var(--btn-green)"; 
            btnElement.style.color = "white";
            
            setTimeout(() => { 
                btnElement.innerHTML = originalText; 
                btnElement.className = originalClass; 
                btnElement.style.background = ""; 
            }, 2000);
        }).catch(err => {
            console.error('Erreur copie', err);
        });
    }

    initAuth();
</script>
</body>
</html>
