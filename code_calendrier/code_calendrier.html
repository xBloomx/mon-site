<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendrier F.Dussault</title>
    <script>if (window.self === window.top) { window.location.href = '../login.html'; }</script>
    <script src="../assets/shared/console-filter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <link rel="stylesheet" href="../assets/shared/shared.css">
    <script src="../assets/shared/shared.js"></script>
    <style>
        :root {
            --cal-grid-border: #444;
            --cal-header-bg: #333;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--app-bg); color: var(--text-light); margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--app-bg); overflow: hidden; }
        
        #view-dashboard { padding: 30px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .dash-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; flex-wrap: wrap; }
        .dash-title h1 { margin: 0; font-size: 28px; color: white; }
        .dash-title p { margin: 5px 0 0; color: #aaa; font-size: 14px; }
        
        .action-btn { background-color: var(--btn-yellow); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .action-btn:hover { background-color: #ffd66b; transform: translateY(-2px); }

        .tabs-container { display: flex; gap: 10px; margin-bottom: 5px; flex-wrap: wrap; }
        .btn-tab { background: #1a1b23; color: #aaa; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; display:flex; align-items:center; gap:8px;}
        .btn-tab.active { background: var(--btn-blue); color: white; border-color: var(--btn-blue); }
        .btn-tab-dashed { border: 1px dashed #888; background: transparent; color: #888; }
        .btn-tab-dashed:hover { border-color: white; color: white; }

        .cal-controls { display: flex; justify-content: space-between; align-items: center; background-color: var(--card-bg); padding: 15px; border-radius: 12px; }
        .cal-nav-btn { background: #444; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .cal-nav-btn:hover { background: var(--btn-yellow); color: black; }
        .cal-month-title { font-size: 24px; font-weight: bold; color: white; text-transform: capitalize; }

        .calendar-wrapper { flex: none; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--cal-grid-border); overflow-x: auto; display: flex; flex-direction: column; }
        .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); min-width: 700px; }
        .day-header { background: var(--cal-header-bg); color: #aaa; display: flex; align-items: center; justify-content: center; font-weight: bold; border-bottom: 1px solid var(--cal-grid-border); border-right: 1px solid var(--cal-grid-border); padding: 10px 0; position: sticky; top: 0; z-index: 20; }
        .cal-days-container { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 100px; align-content: start; min-width: 700px; }
        .cal-day { border-right: 1px solid var(--cal-grid-border); border-bottom: 1px solid var(--cal-grid-border); padding: 5px; position: relative; background: var(--card-bg); cursor: pointer; transition: background 0.2s; height: 100px; max-height: 100px; overflow-y: auto; -ms-overflow-style: none; scrollbar-width: none;}
        .cal-day::-webkit-scrollbar { display: none; }
        .cal-day:hover { background: #343542; }
        .cal-day.today { background: rgba(252, 202, 70, 0.05); }
        .cal-day.today .day-num { background: var(--btn-yellow); color: black; }
        .cal-day.other-month { opacity: 0.4; background: #222; pointer-events: none; }
        .day-num { font-weight: bold; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 5px; font-size: 14px; pointer-events: none; color: #ddd; }
        
        .event-bar { font-size: 11px; padding: 2px 6px; margin-bottom: 3px; border-radius: 4px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; position: relative; display: flex; justify-content: space-between; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .event-bar:hover { opacity: 0.9; transform: scale(1.01); }
        .event-mine { border-left: 3px solid var(--btn-yellow); } 

        .urgence-badge { position: absolute; top: 5px; right: 5px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; cursor: pointer; transition: transform 0.2s; }
        .urgence-badge:hover { transform: scale(1.15); }
        .urgence-badge.filled { background: #ff4757; color: white; border: 1px solid rgba(255,255,255,0.3); }
        .urgence-badge.empty { background: rgba(255,255,255,0.1); color: #777; border: 1px dashed #555; font-size: 16px; }
        
        .legend-container { display: flex; gap: 15px; font-size: 12px; color: #aaa; flex-wrap: wrap;}
        .legend-item { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px;}
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 3000; justify-content: center; align-items: center; }
        .modal-card { background: var(--card-bg); width: 90%; max-width: 450px; padding: 25px; border-radius: 15px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 20px; color: white; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #1e1f26; border: 1px solid #555; color: white; border-radius: 5px; font-family: sans-serif; outline: none; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--btn-yellow); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .guest-list-container { background: #1e1f26; border: 1px solid #555; border-radius: 5px; padding: 10px; max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .guest-item { display: flex; align-items: center; gap: 10px; color: white; font-size: 14px; cursor: pointer; }
        .guest-item input { width: 16px; height: 16px; cursor: pointer; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #444; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s;}
        .btn-submit { background: var(--btn-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight:bold; transition: 0.2s; display:flex; align-items:center; gap:6px;}
        .btn-delete { background: var(--btn-red); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight:bold; transition: 0.2s; display:flex; align-items:center; gap:6px;}
        
        .view-row { margin-bottom: 12px; font-size: 14px; }
        .view-label { color: #aaa; font-size: 12px; font-weight:bold; margin-bottom: 4px; }
        .view-value { color: white; font-weight: bold; font-size: 16px; margin-top: 2px;}
        .note-box { background: #1e1f26; padding: 12px; border-radius: 8px; border: 1px solid #444; font-weight: normal; font-size: 14px; white-space: pre-wrap; line-height: 1.4; }

        .day-detail-item { padding: 12px; background: #1e1f26; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; border: 1px solid #555; }
        .day-detail-item:hover { background: #343542; border-color: var(--btn-blue); }

        @media (max-width: 768px) {
            #view-dashboard { padding: 15px; gap: 12px; }
            .dash-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .dash-header .dash-title { margin-bottom: 0; }
            .dash-header > div:last-child { display: flex; gap: 10px; }
            .dash-header .action-btn { flex: 1; justify-content: center; border-radius: 12px; }
            .tabs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .btn-tab { justify-content: center; padding: 11px 8px; font-size: 13px; border-radius: 10px; }
            .btn-tab-dashed { grid-column: 1 / -1; justify-content: center; }
            .cal-controls { padding: 15px; } .cal-month-title { font-size: 18px; } .calendar-wrapper { border-radius: 8px; }
            .day-header { font-size: 11px; padding: 8px 0; } .cal-day { padding: 5px; height: 100px; max-height: 100px; } 
            .day-num { width: 22px; height: 22px; font-size: 11px; margin-bottom: 6px; }
            .event-bar { font-size: 10px; padding: 3px 5px; margin-bottom: 4px; border-radius: 3px; }
            .urgence-badge { top: 4px; right: 4px; width: 20px; height: 20px; font-size: 10px; border-width: 1px; }
            .modal-card { width: 95%; padding: 20px; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div id="security-loader" style="position: fixed; inset: 0; background: #1e1f26; z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="color: #444; font-size: 12px; font-family: sans-serif;">Connexion sécurisée...</div>
</div>

<svg style="display: none;">
    <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></symbol>
    <symbol id="icon-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></symbol>
    <symbol id="icon-save" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></symbol>
</svg>

<div class="main-content">
    <div id="view-dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>Calendriers</h1>
                <p>Personnel, Global et Équipes</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="action-btn" id="btnDeleteCal" style="display:none; background:var(--btn-red); color:white;" onclick="deleteCurrentCalendar()">
                    <svg class="svg-icon"><use href="#icon-trash"></use></svg> Effacer ce calendrier
                </button>
                <button class="action-btn" onclick="openAddModal()">
                    <svg class="svg-icon"><use href="#icon-plus"></use></svg> Événement
                </button>
            </div>
        </div>

        <div class="tabs-container" id="calTabsContainer">
            </div>

        <div class="legend-container" id="legendContainer"></div>

        <div class="cal-controls">
            <button class="cal-nav-btn" onclick="changeMonth(-1)"><svg class="svg-icon"><use href="#icon-chevron-left"></use></svg></button>
            <div class="cal-month-title" id="calTitle">...</div>
            <button class="cal-nav-btn" onclick="changeMonth(1)"><svg class="svg-icon"><use href="#icon-chevron-right"></use></svg></button>
        </div>

        <div class="calendar-wrapper">
            <div class="day-headers">
                <div class="day-header">Dim</div><div class="day-header">Lun</div><div class="day-header">Mar</div>
                <div class="day-header">Mer</div><div class="day-header">Jeu</div><div class="day-header">Ven</div><div class="day-header">Sam</div>
            </div>
            <div class="cal-days-container" id="calendarDays"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="newCalModal">
    <div class="modal-card">
        <div class="modal-title">Créer un calendrier partagé</div>
        <div class="form-group">
            <label>Nom du calendrier</label>
            <input type="text" id="newCalName" placeholder="Ex: Équipe Chantier B">
        </div>
        <div class="form-group">
            <label>Partager avec :</label>
            <div class="guest-list-container" id="calGuestListContainer"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('newCalModal')">Annuler</button>
            <button class="btn-submit" onclick="saveNewCalendar()"><svg class="svg-icon"><use href="#icon-save"></use></svg> Créer</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="dayModal">
    <div class="modal-card">
        <div class="modal-title" id="dayModalTitle">Événements du ...</div>
        <div id="dayModalContent" style="display:flex; flex-direction:column; max-height: 50vh; overflow-y:auto; margin-bottom: 15px;"></div>
        <div class="modal-actions" style="justify-content: space-between;">
            <button class="btn-cancel" onclick="closeModal('dayModal')">Fermer</button>
            <button class="action-btn" style="background-color: var(--btn-yellow); color: black;" onclick="triggerAddFromDay()">
                <svg class="svg-icon"><use href="#icon-plus"></use></svg> Ajouter ici
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-card">
        <div class="modal-title" id="modalTitle">Nouvel Événement</div>
        
        <div class="form-group" id="grpCalendar">
            <label>Calendrier de destination</label>
            <select id="evtCalendarId"></select>
        </div>

        <div class="form-group" id="grpCategory">
            <label>Catégorie</label>
            <select id="evtCategory"></select>
        </div>

        <div class="form-group">
            <label>Titre / Nom du chantier</label>
            <input type="text" id="evtTitle" placeholder="Ex: Rénovation école">
        </div>
        
        <div style="display:flex; gap:15px;">
            <div class="form-group" style="flex:1;">
                <label>Début</label>
                <input type="text" id="evtStart" placeholder="JJ/MM/AAAA" inputmode="numeric" onkeyup="autoFormatDate(this)" maxlength="10">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Fin (Inclus)</label>
                <input type="text" id="evtEnd" placeholder="JJ/MM/AAAA" inputmode="numeric" onkeyup="autoFormatDate(this)" maxlength="10">
            </div>
        </div>

        <div class="form-group" id="grpGuests">
            <label>Assigner / Partager l'événement avec :</label>
            <div class="guest-list-container" id="guestListContainer"></div>
        </div>

        <div class="form-group">
            <label>Notes & Adresse</label>
            <textarea id="evtNote" placeholder="Détails du travail, informations..."></textarea>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('addModal')">Annuler</button>
            <button class="btn-submit" onclick="saveEvent()"><svg class="svg-icon"><use href="#icon-save"></use></svg> Sauvegarder</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="viewModal">
    <div class="modal-card">
        <div class="modal-title" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Détails de l'événement</span>
            <span id="viewAuthorBadge" style="font-size:11px; background:#444; padding:3px 8px; border-radius:10px; font-weight:normal;"></span>
        </div>
        <div class="view-row">
            <div class="view-label">TITRE</div>
            <div class="view-value" id="viewTitle">...</div>
        </div>
        <div class="view-row">
            <div class="view-label">CATÉGORIE</div>
            <div class="view-value" id="viewCat" style="display:flex; align-items:center; gap:8px;">...</div>
        </div>
        <div class="view-row" id="viewDatesRow">
            <div class="view-label">DATES</div>
            <div class="view-value" id="viewDates">...</div>
        </div>
        <div class="view-row" id="viewGuestsContainer" style="display:none; margin-top:15px;">
            <div class="view-label">ASSIGNÉ(S) À</div>
            <div class="view-value" id="viewGuests" style="font-size:14px; color:#66b2ff;">...</div>
        </div>
        <div class="view-row" id="viewNoteContainer" style="display:none; margin-top:15px;">
            <div class="view-label">NOTES / DÉTAILS / ADRESSE</div>
            <div class="view-value note-box" id="viewNote">...</div>
        </div>

        <div class="modal-actions" style="justify-content: space-between; margin-top:25px;">
            <button class="btn-delete" id="btnDeleteEvent" onclick="deleteCurrentEvent()" style="display:none;">
                <svg class="svg-icon"><use href="#icon-trash"></use></svg> Supprimer
            </button>
            <div style="display:flex; gap:10px;">
                <button class="btn-cancel" onclick="closeModal('viewModal')">Fermer</button>
                <button class="action-btn" id="btnEditEvent" onclick="editCurrentEvent()" style="display:none;">
                    <svg class="svg-icon"><use href="#icon-edit"></use></svg> Modifier
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="alertModal" style="z-index: 5000;">
    <div class="modal-card" style="width: 320px; text-align: center;">
        <div class="modal-title" style="color: var(--btn-yellow); margin-bottom: 10px; border:none;">Information</div>
        <p id="alertMessage" style="color: #e0e0e0; margin-bottom: 25px; font-size: 15px;">...</p>
        <button class="action-btn" style="width: 100%; justify-content: center;" onclick="closeModal('alertModal')">Compris</button>
    </div>
</div>

<div class="modal-overlay" id="confirmModal" style="z-index: 6000;">
    <div class="modal-card" style="width: 320px; text-align: center;">
        <div class="modal-title" style="color: var(--btn-red); margin-bottom: 10px; border:none;">Attention</div>
        <p id="confirmMessage" style="color: #e0e0e0; margin-bottom: 25px; font-size: 15px;">...</p>
        <div style="display:flex; gap:10px;">
            <button class="btn-cancel" style="flex:1;" onclick="closeModal('confirmModal')">Non</button>
            <button class="btn-delete" style="flex:1; justify-content:center;" onclick="executeConfirm()">Oui</button>
        </div>
    </div>
</div>

<script>

    let myRole = 'A3'; let myUserId = ''; let myUserName = '';
    let currentCalId = 'perso'; 
    let teamMembers = [];
    let selectedDayForAdd = ''; 

    const defaultRolesConfig = {
        'A1': { perms: ['view_all_invoices', 'view_all_po', 'approve_timesheets', 'manage_tools', 'transfer_tools', 'delete_clients', 'manage_calendar', 'view_admin'] },
        'A2': { perms: ['view_all_invoices', 'view_all_po', 'approve_timesheets', 'manage_tools', 'manage_calendar'] },
        'A3': { perms: ['transfer_tools'] }
    };

    // Roles chargés depuis Supabase (cache local pour la session)
    let _cachedRoles = null;

    async function loadRolesCache() {
        if (_cachedRoles) return;
        try {
            const { data } = await supabaseClient
                .from('parametres_globaux')
                .select('valeur')
                .eq('cle', 'roles_config')
                .maybeSingle();
            _cachedRoles = data?.valeur ? JSON.parse(data.valeur) : defaultRolesConfig;
        } catch(e) { _cachedRoles = defaultRolesConfig; }
    }

    function hasPermission(role, permId) {
        if (role === 'A0') return true;
        const roles = _cachedRoles || defaultRolesConfig;
        const roleData = roles[role] || defaultRolesConfig[role];
        return roleData && roleData.perms ? roleData.perms.includes(permId) : false;
    }

    async function initAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.top.location.href = '../login.html'; return; }
        await loadRolesCache();

        myUserId = user.id;
        const { data: profil } = await supabaseClient.from('profils').select('role, prenom_nom').eq('id', user.id).maybeSingle();
        if (profil) { myRole = profil.role; myUserName = profil.prenom_nom || "Moi"; }

        await fetchTeamMembers();
        await loadData();

        document.getElementById('security-loader').style.display = 'none';
        window.parent.postMessage({ type: 'module_ready', module: 'view-calendrier' }, '*');
    }

    // Écoute des changements de formations (depuis Profil/Paramètres)
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'formations_updated') {
            // Recharger les données pour rafraîchir l'affichage des expirations
            loadData();
        }
    });

    async function fetchTeamMembers() {
        const { data } = await supabaseClient.from('profils').select('id, prenom_nom').order('role');
        if (data) teamMembers = data;
    }

    const FIXED_CATEGORIES = [
        { id: 'ferie',     name: 'Congé Férié',         color: '#ffc107' }, 
        { id: 'ccq',       name: 'Congés CCQ',          color: '#ff4d4d' }, 
        { id: 'job',       name: 'Job / Chantier',      color: '#007bff' }, 
        { id: 'perso',     name: 'Congés personnel',    color: 'var(--btn-purple)' }, 
        { id: 'note',      name: 'Note',                color: '#6c757d' },

    let confirmCallback = null;
    function showConfirm(msg, callback) { document.getElementById('confirmMessage').innerHTML = msg; confirmCallback = callback; document.getElementById('confirmModal').style.display = 'flex'; }

    function deleteCurrentCalendar() {
        const cal = calDefs.find(c => c.id === currentCalId);
        if(!cal || cal.author_id !== myUserId) return openAlert("Vous ne pouvez pas supprimer ce calendrier.");

            const r1 = await retry(() => supabaseClient.from('evenements').delete().eq('calendar_id', currentCalId));
            const r2 = await retry(() => supabaseClient.from('evenements').delete().eq('id', currentCalId));

    function formatDateFR(isoDate) { if(!isoDate) return ''; const parts = isoDate.split('-'); if(parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`; return isoDate; }

    function getSystemEvents(year) {
        const f = Math.floor, G = year % 19, C = f(year/100), H = (C - f(C/4) - f((8*C+13)/25) + 19*G + 15) % 30, I = H - f(H/28)*(1 - f(29/(H+1))*f((21-G)/11)), J = (year + f(year/4) + I + 2 - C + f(C/4)) % 7, L = I - J, m = 3 + f((L + 40)/44), d = L + 28 - 31 * f(m/4);
        const easter = new Date(year, m-1, d); const getVal = (date) => { const nd = new Date(date); return nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0')+'-'+String(nd.getDate()).padStart(2,'0'); };
        const addDay = (date, days) => { let r = new Date(date); r.setDate(r.getDate()+days); return r; };
        
        let list = [];
        list.push({ id: 'sys-1', d: `${year}-01-01`, t: "Jour de l'An", type:'ferie' });
        list.push({ id: 'sys-2', d: `${year}-06-24`, t: "St-Jean-Baptiste", type:'ferie' });
        list.push({ id: 'sys-3', d: `${year}-07-01`, t: "Fête du Canada", type:'ferie' });
        list.push({ id: 'sys-4', d: `${year}-12-25`, t: "Noël", type:'ferie' });
        list.push({ id: 'sys-5', d: getVal(addDay(easter, -2)), t: "Vendredi Saint", type:'ferie' });
        list.push({ id: 'sys-6', d: getVal(addDay(easter, 1)), t: "Lundi de Pâques", type:'ferie' });
        
        let sStart = new Date(year, 6, 19); while(sStart.getDay() !== 0) sStart.setDate(sStart.getDate()+1);
        let sEnd = new Date(sStart); sEnd.setDate(sStart.getDate()+13);
        list.push({ id: 'sys-7', start: getVal(sStart), end: getVal(sEnd), t: "Vacances CCQ", type:'ccq' });
        list.push({ id: 'sys-8', start: `${year}-12-21`, end: `${year+1}-01-04`, t: "Vacances Hiver", type:'ccq' });

        // Expirations de formations de l'utilisateur (synchronisé avec Profil/Paramètres)
        userFormations.forEach((f, idx) => {
            if (!f.date_expiration) return;
            // N'afficher que si l'expiration est dans l'année en cours
            const expDate = new Date(f.date_expiration);
            if (isNaN(expDate.getTime())) return;
            if (expDate.getFullYear() !== year) return;
            const dateStr = getVal(expDate);
            list.push({
                id: 'sys-form-' + (f.id || idx),
                d: dateStr,
                t: 'Expiration : ' + (f.nom || 'Formation'),
                type: 'formation'
            });
        });

        return list;
    }

    let currentSysEvents = [];

    function changeMonth(delta) { calDate.setMonth(calDate.getMonth() + delta); renderCalendar(); }

    function renderCalendar() {
        const year = calDate.getFullYear(); const month = calDate.getMonth();
        document.getElementById('calTitle').textContent = new Date(year, month).toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
        const container = document.getElementById('calendarDays'); container.innerHTML = '';
        const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate(); const prevMonthDays = new Date(year, month, 0).getDate();
        currentSysEvents = getSystemEvents(year);

        for(let i = firstDay - 1; i >= 0; i--) container.innerHTML += `<div class="cal-day other-month"><div class="day-num">${prevMonthDays - i}</div></div>`;

        for(let d=1; d<=daysInMonth; d++) {
            const curDt = new Date(year, month, d);
            const dateStr = curDt.getFullYear()+'-'+String(curDt.getMonth()+1).padStart(2,'0')+'-'+String(curDt.getDate()).padStart(2,'0');
            const div = document.createElement('div'); div.className = 'cal-day';
            if(dateStr === new Date().toISOString().split('T')[0]) div.classList.add('today');
            div.onclick = (e) => { if(e.target === div || e.target.classList.contains('day-num')) openDayDetails(dateStr); };

            let html = `<div class="day-num">${d}</div>`;

            // URGENCE (Visible partout)
            const urgEvent = events.find(e => e.cat_id === 'urgence' && dateStr >= e.start_date && dateStr <= e.end_date);
            if (urgEvent) {
                // La lettre représente la personne EN GARDE (titre de l'événement),
                // pas la personne qui a créé l'événement
                const letter = urgEvent.title ? urgEvent.title.trim().charAt(0).toUpperCase() : 'U';
                html += `<div class="urgence-badge filled" onclick="openViewEvent('${urgEvent.id}', event, false)" title="Garde: ${urgEvent.title}">${letter}</div>`;
            } else {
                if (hasPermission(myRole, 'manage_calendar')) { html += `<div class="urgence-badge empty" onclick="openAddModal('${dateStr}', true, event)" title="Ajouter Garde d'urgence"><svg class="svg-icon"><use href="#icon-plus"></use></svg></div>`; }
            }

            // SYSTÈME
            currentSysEvents.forEach(sys => {
                let show = false;
                if(sys.d && sys.d === dateStr) show = true;
                if(sys.start && dateStr >= sys.start && dateStr <= sys.end) show = true;
                if(show) {
                    const cat = FIXED_CATEGORIES.find(c => c.id === sys.type) || {color: '#888'};
                    const textColor = (cat.color === '#ffffff' || cat.color === '#ffc107') ? 'black' : 'white';
                    html += `<div class="event-bar" style="background:${cat.color}; color:${textColor}; font-weight:bold;" onclick="openViewEvent('${sys.id}', event, true)" title="${sys.t}">${sys.t}</div>`;
                }
            });

            // ÉVÉNEMENTS NORMAUX
            events.filter(e => dateStr >= e.start_date && dateStr <= e.end_date).forEach(evt => {
                if(evt.cat_id === 'urgence') return; 
                
                let canSee = false;
                const sIds = evt.shared_with ? evt.shared_with.map(s => s.id) : [];

                if (currentCalId === 'perso') {
                    if (evt.calendar_id === 'perso' && evt.author_id === myUserId) canSee = true;
                    if (sIds.includes(myUserId)) canSee = true; // Assigné à moi
                } else if (currentCalId === 'global') {
                    if (evt.calendar_id === 'global') canSee = true;
                } else {
                    if (evt.calendar_id === currentCalId) canSee = true;
                }

                if (canSee) {
                    const cat = FIXED_CATEGORIES.find(c => c.id === evt.cat_id) || {color: '#333'};
                    const isMine = (evt.author_id === myUserId);
                    const borderStyle = isMine ? 'event-mine' : '';
                    html += `<div class="event-bar ${borderStyle}" style="background:${cat.color};" onclick="openViewEvent('${evt.id}', event, false)" title="${evt.title}">${evt.title}</div>`;
                }
            });

            div.innerHTML = html; container.appendChild(div);
        }

        const totalCells = firstDay + daysInMonth; const remainingCells = 42 - totalCells;
        for(let i = 1; i <= remainingCells; i++) container.innerHTML += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
    }

    function renderLegend() {
        const leg = document.getElementById('legendContainer'); leg.innerHTML = '';
        FIXED_CATEGORIES.forEach(cat => {
            if (cat.id === 'urgence') return;
            leg.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${cat.color}"></div> ${cat.name}</div>`;
        });
    }

    function openDayDetails(dateStr) {
        selectedDayForAdd = dateStr; 
        document.getElementById('dayModalTitle').textContent = `Le ${formatDateFR(dateStr)}`;
        const content = document.getElementById('dayModalContent'); content.innerHTML = '';
        let dayEvents = [];

        const urgEvent = events.find(e => e.cat_id === 'urgence' && dateStr >= e.start_date && dateStr <= e.end_date);
        if (urgEvent) dayEvents.push({...urgEvent, isUrg: true});

        currentSysEvents.forEach(sys => {
            let show = false;
            if(sys.d && sys.d === dateStr) show = true;
            if(sys.start && dateStr >= sys.start && dateStr <= sys.end) show = true;
            if(show) dayEvents.push({...sys, isSys: true});
        });

        events.filter(e => dateStr >= e.start_date && dateStr <= e.end_date).forEach(evt => {
            if(evt.cat_id === 'urgence') return;
            let canSee = false; const sIds = evt.shared_with ? evt.shared_with.map(s => s.id) : [];
            if (currentCalId === 'perso') {
                if (evt.calendar_id === 'perso' && evt.author_id === myUserId) canSee = true;
                if (sIds.includes(myUserId)) canSee = true;
            } else if (currentCalId === 'global') { if (evt.calendar_id === 'global') canSee = true; } 
            else { if (evt.calendar_id === currentCalId) canSee = true; }
            if (canSee) dayEvents.push(evt);
        });

        if (dayEvents.length === 0) { content.innerHTML = '<div style="color:#aaa; font-style:italic; padding:15px 0; text-align:center;">Rien de prévu pour cette journée.</div>'; } 
        else {
            dayEvents.forEach(evt => {
                const cId = evt.type || evt.cat_id; const cat = FIXED_CATEGORIES.find(c => c.id === cId) || {color: '#888'};
                const div = document.createElement('div'); div.className = 'day-detail-item'; div.style.borderLeft = `4px solid ${cat.color}`;
                let subtitle = cat.name; if (evt.isUrg && evt.author_name) subtitle += ` - Assuré par ${evt.author_name}`;
                div.innerHTML = `<div style="font-weight:bold; color:white; font-size:15px;">${evt.t || evt.title}</div><div style="font-size:12px; color:#aaa;">${subtitle}</div>`;
                div.onclick = (e) => { closeModal('dayModal'); openViewEvent(evt.id, e, evt.isSys); };
                content.appendChild(div);
            });
        }
        document.getElementById('dayModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function openAlert(message) { document.getElementById('alertMessage').textContent = message; document.getElementById('alertModal').style.display = 'flex'; }

    async function saveEvent() {
        const title = document.getElementById('evtTitle').value.trim();
        // Convertir JJ/MM/AAAA → YYYY-MM-DD pour Supabase
        function toISO(d) { if(!d) return ''; const p=d.split('/'); return p.length===3 ? p[2]+'-'+p[1]+'-'+p[0] : d; }
        const start = toISO(document.getElementById('evtStart').value);
        const end = toISO(document.getElementById('evtEnd').value);
        const note = document.getElementById('evtNote').value.trim(); 
        if(!title || !start || !end) return openAlert("Remplir Titre et Dates !");
        if(end < start) return openAlert("Date de fin invalide.");

        let sharedWith = [];
        if(!isUrgenceMode) {
            document.querySelectorAll('.evt-guest-cb:checked').forEach(cb => { sharedWith.push({ id: cb.value, name: cb.getAttribute('data-name') }); });
        }

        const existingEvt = editingEventId ? events.find(e => e.id === editingEventId) : null;

        const payload = { 
            id: editingEventId || 'evt-'+Date.now(), type_entite: 'event',
            calendar_id: isUrgenceMode ? 'global' : document.getElementById('evtCalendarId').value,
            title: title, start_date: start, end_date: end, 
            cat_id: isUrgenceMode ? 'urgence' : document.getElementById('evtCategory').value,
            note: note,
            author_id: existingEvt ? existingEvt.author_id : myUserId,       
            author_name: existingEvt ? existingEvt.author_name : myUserName,   
            shared_with: sharedWith
        };

        // Désactiver le bouton pendant la sauvegarde
        const btnSave = document.querySelector('#addModal .btn-submit');
        const originalHtml = btnSave ? btnSave.innerHTML : '';
        if (btnSave) {
            btnSave.disabled = true;
            btnSave.innerHTML = '<svg class="svg-icon" style="animation:spin 1s linear infinite;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="40" stroke-dashoffset="10"></circle></svg> Sauvegarde...';
        }

        // Retry auto en cas d'erreur transitoire (lock Supabase entre iframes)
        const retry = window.SharedFD ? window.SharedFD.withRetry : (op) => op();
        const { error } = await retry(() => supabaseClient.from('evenements').upsert(payload));

        // Réactiver le bouton
        if (btnSave) { btnSave.disabled = false; btnSave.innerHTML = originalHtml; }

        if (error) {
            // Message user-friendly selon le type d'erreur
            const msg = (error.message || '').toLowerCase();
            let userMsg;
            if (msg.includes('lock broken') || error.name === 'AbortError') {
                userMsg = "❌ Une autre opération est en cours. Attends 2 secondes et réessaie.";
            } else if (msg.includes('failed to fetch') || msg.includes('network')) {
                userMsg = "❌ Pas de connexion internet. Vérifie ta connexion et réessaie.";
            } else if (msg.includes('row-level security') || error.code === '42501') {
                userMsg = "❌ Tu n'as pas la permission de créer cet événement.\n\nLes policies RLS pour la table 'evenements' n'ont peut-être pas été créées dans Supabase.";
            } else {
                userMsg = "❌ Erreur de sauvegarde : " + error.message;
            }
            openAlert(userMsg);
            return; // Ne pas fermer le modal, laisser l'utilisateur réessayer
        }

        closeModal('addModal');
        await loadData();
    }

    function openViewEvent(id, e, isSys) {
        if(e) e.stopPropagation(); isSystemEvent = isSys;
        let evt = isSys ? currentSysEvents.find(ev => ev.id === id) : events.find(ev => ev.id === id);
        if(!evt) return; currentViewId = id;

        const canEdit = !isSys && (
            evt.author_id === myUserId || 
            (evt.calendar_id === 'global' && hasPermission(myRole, 'manage_calendar')) ||
            evt.calendar_id.startsWith('cal-')
        );

        document.getElementById('btnEditEvent').style.display = canEdit ? 'flex' : 'none';
        document.getElementById('btnDeleteEvent').style.display = canEdit ? 'flex' : 'none';
        
        document.getElementById('viewAuthorBadge').textContent = isSys ? "Système" : (evt.author_name ? "Créé par " + evt.author_name : "");
        document.getElementById('viewAuthorBadge').style.background = isSys ? "#555" : "var(--btn-blue)";

        const cat = FIXED_CATEGORIES.find(c => c.id === (evt.type || evt.cat_id)) || {color: '#ccc', name: 'Inconnu'};
        document.getElementById('viewTitle').textContent = evt.t || evt.title;
        document.getElementById('viewCat').innerHTML = `<div style="width:12px; height:12px; background:${cat.color}; border-radius:50%;"></div> ${cat.name}`;

        else { document.getElementById('viewDates').textContent = `Du ${formatDateFR(evt.start_date || evt.start)} au ${formatDateFR(evt.end_date || evt.end)}`; }

        const gCont = document.getElementById('viewGuestsContainer'); const vG = document.getElementById('viewGuests');
        if (evt.shared_with && evt.shared_with.length > 0) { vG.textContent = evt.shared_with.map(s => s.name).join(', '); gCont.style.display = 'block'; } 
        else { gCont.style.display = 'none'; }

        const nCont = document.getElementById('viewNoteContainer'); const vN = document.getElementById('viewNote');
        if (evt.note && evt.note.trim() !== '') { vN.textContent = evt.note; nCont.style.display = 'block'; } 
        else { nCont.style.display = 'none'; }

        document.getElementById('viewModal').style.display = 'flex';
        window.parent.postMessage({ type: 'toggle_menu', action: 'hide' }, '*');
    }

    function editCurrentEvent() { const evt = events.find(e => e.id === currentViewId); closeModal('viewModal'); openAddModal('', evt.cat_id === 'urgence', null, evt); }

    function deleteCurrentEvent() {
        if(!currentViewId || isSystemEvent) return;
        showConfirm("Supprimer cet événement ?", async () => {
            const retry = window.SharedFD ? window.SharedFD.withRetry : (op) => op();
            const { error } = await retry(() => supabaseClient.from('evenements').delete().eq('id', currentViewId));
            if (error) {
                openAlert("❌ Erreur de suppression : " + error.message);
                return;
            }
            closeModal('viewModal');
            await loadData();
        });
    }

    function closeModal(id) {
        document.getElementById(id || 'alertModal').style.display = 'none';
        window.parent.postMessage({ type: 'toggle_menu', action: 'show' }, '*');
    }

    // Formatage automatique des champs de date JJ/MM/AAAA
    function autoFormatDate(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.length >= 3 && v.length <= 4) v = v.slice(0,2) + '/' + v.slice(2);
        else if (v.length >= 5) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4,8);
        input.value = v;
    }

    initAuth();
</script>
</body>
</html>
